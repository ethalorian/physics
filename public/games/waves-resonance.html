<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>RESONANCE // a waves arcade</title>
<!--
  RESONANCE — a waves arcade in three acts. Sixth cabinet (Unit 6: Waves,
  Sound & Light). Single file, no dependencies.

  This cabinet is the only one that can PLAY its physics: your emitter and
  the target crystals are real WebAudio tones, so beats are not a diagram —
  they are the throb you hear shrinking as you tune in. (M mutes.)

  ACT I   THE TUNER — match beacon crystals given λ and v; the dial IS f = v/λ
  ACT II  THE ORGAN — standing waves: fn = n·v/2L; shatter orbs at antinodes
  ACT III THE CHOIR — two-source interference; park bells on constructive
                      fringes and hush-zones on destructive ones

  Telemetry star: a live oscilloscope + the v = fλ triangle, always lit.
  Speaks the arcade bridge protocol (docs/ARCADE_PATTERN.md).
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root{
    --neon:#22d3ee; --neon2:#f472b6; --amber:#fbbf24; --red:#f87171;
    --ink:#e7ecf5; --dim:#8b96ad; --card:#051016ee; --edge:#22d3ee55;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;background:#030b10}
  body{font-family:'Share Tech Mono',ui-monospace,monospace;color:var(--ink)}
  #c{display:block;width:100vw;height:100vh;touch-action:none;cursor:crosshair}
  #crt{pointer-events:none;position:fixed;inset:0;z-index:5;
    background:repeating-linear-gradient(0deg,transparent 0 2px,#0001 2px 4px);
    mix-blend-mode:overlay}
  #vig{pointer-events:none;position:fixed;inset:0;z-index:5;
    background:radial-gradient(ellipse at center,transparent 55%,#000a 100%)}
  #overlay{position:fixed;left:0;top:0;bottom:0;width:63%;z-index:10;
    display:none;align-items:center;justify-content:center;padding:20px;overflow-y:auto}
  #overlay.show{display:flex}
  @media (max-width:900px){ #overlay{width:100%} }
  .card{background:var(--card);border:1px solid var(--edge);border-radius:14px;
    padding:26px 30px;max-width:540px;width:100%;
    box-shadow:0 0 40px #22d3ee22, inset 0 0 60px #0006;
    animation:pop .25s ease-out}
  @keyframes pop{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
  h1,h2{font-family:'Orbitron',sans-serif;letter-spacing:.06em}
  h1{font-size:42px;font-weight:900;color:var(--neon);text-shadow:0 0 18px #22d3ee88}
  h2{font-size:22px;color:var(--neon);text-shadow:0 0 12px #22d3ee66;margin-bottom:10px}
  .tag{color:var(--neon2);font-size:13px;letter-spacing:.35em;margin:4px 0 16px}
  .sub{color:var(--dim);font-size:14px;line-height:1.55;margin-bottom:14px}
  .stat{display:flex;justify-content:space-between;font-size:14px;padding:3px 0;
    border-bottom:1px dashed #ffffff14}
  .stat b{color:var(--amber)}
  .good{color:var(--neon)} .bad{color:var(--red)}
  .btn{display:inline-block;margin-top:18px;font-family:'Orbitron',sans-serif;
    font-size:15px;font-weight:700;letter-spacing:.12em;color:#03141a;
    background:var(--neon);border:none;border-radius:8px;padding:12px 26px;
    cursor:pointer;box-shadow:0 0 18px #22d3ee66;transition:transform .08s}
  .btn:hover{transform:scale(1.05)} .btn:active{transform:scale(.97)}
  .btn.alt{background:#1f2937;color:var(--ink);box-shadow:none;border:1px solid #ffffff22}
  .choices{display:grid;gap:8px;margin-top:12px}
  .choice{font-family:'Share Tech Mono',monospace;font-size:15px;text-align:left;
    background:#081820;border:1px solid #ffffff1c;border-radius:8px;color:var(--ink);
    padding:11px 14px;cursor:pointer;transition:all .1s}
  .choice:hover{border-color:var(--neon);background:#0a2030}
  .choice.right{background:#0c2a22;border-color:var(--neon);color:var(--neon)}
  .choice.wrong{background:#2a0c12;border-color:var(--red);color:var(--red)}
  .kbd{display:inline-block;border:1px solid #ffffff33;border-bottom-width:3px;
    border-radius:5px;padding:1px 7px;font-size:12px;color:var(--amber);background:#ffffff0a}
  .explain{margin-top:12px;padding:10px 12px;border-left:3px solid var(--amber);
    background:#fbbf2410;font-size:13px;line-height:1.5;color:#fde68a;display:none}
  .bigscore{font-family:'Orbitron',sans-serif;font-size:34px;font-weight:900;
    color:var(--amber);text-shadow:0 0 16px #fbbf2477;margin:8px 0}
  .planetchip{font-family:'Orbitron',sans-serif;font-size:12px;letter-spacing:.2em;
    color:var(--neon2);border:1px solid #f472b655;border-radius:99px;padding:4px 12px}
  .actgrid{display:grid;gap:12px;margin-top:14px}
  .actcard{display:block;width:100%;text-align:left;background:#08141c;cursor:pointer;
    border:1px solid #ffffff1c;border-radius:12px;padding:14px 18px;color:var(--ink);
    font-family:'Share Tech Mono',monospace;transition:all .12s}
  .actcard:hover:not(.locked){border-color:var(--ac);box-shadow:0 0 22px var(--acGlow);transform:translateX(4px)}
  .actcard.locked{opacity:.45;cursor:not-allowed}
  .actname{font-family:'Orbitron',sans-serif;font-weight:700;font-size:17px;
    letter-spacing:.08em;color:var(--ac)}
  .actsub{font-size:12.5px;color:var(--dim);margin-top:4px;line-height:1.45}
  .hiline{font-size:11px;color:var(--amber);margin-top:6px;letter-spacing:.08em}
  .teachlink{display:inline-block;margin-top:14px;font-size:11px;color:#57534e;
    letter-spacing:.15em;cursor:pointer;border-bottom:1px dotted #57534e}
  .teachlink:hover{color:var(--dim)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="crt"></div><div id="vig"></div>
<div id="overlay"></div>

<script>
"use strict";
/* ================================================== utils */
const $=q=>document.querySelector(q);
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const rnd=(a,b)=>a+Math.random()*(b-a);
const pick=a=>a[Math.floor(Math.random()*a.length)];
const fmt=(n,d=1)=>{const s=(+n).toFixed(d);return s.replace(/\.0+$/,'');};
const hyp=Math.hypot, TAU=Math.PI*2;
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

/* ================================================== canvas */
const cv=$('#c'),ctx=cv.getContext('2d');
let W=0,H=0,DPR=1;
function resize(){DPR=Math.min(2,window.devicePixelRatio||1);
  W=window.innerWidth;H=window.innerHeight;
  cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);}
window.addEventListener('resize',resize);resize();

/* ================================================== persistence */
let PROG={a2:false,a3:false,teacher:false}, HIS={1:0,2:0,3:0};
try{Object.assign(PROG,JSON.parse(localStorage.getItem('resonance2_prog')||'{}'));
    Object.assign(HIS, JSON.parse(localStorage.getItem('resonance2_hi')||'{}'));}catch(e){}
function saveProg(){try{localStorage.setItem('resonance2_prog',JSON.stringify(PROG));}catch(e){}}
function saveHi(){try{localStorage.setItem('resonance2_hi',JSON.stringify(HIS));}catch(e){}}
function unlocked(a){return a===1||PROG.teacher||(a===2&&PROG.a2)||(a===3&&PROG.a3);}

/* ================================================== audio — the physics, audible
   Two live oscillators: YOURS (the emitter you tune) and the nearest TARGET.
   Both faint; the beating between them is real, not simulated. */
let AC=null,muted=false,oscMine=null,gMine=null,oscTgt=null,gTgt=null;
function audio(){if(AC||muted)return;try{
  AC=new (window.AudioContext||window.webkitAudioContext)();
  oscMine=AC.createOscillator();oscMine.type='sine';oscMine.frequency.value=220;
  gMine=AC.createGain();gMine.gain.value=0;
  oscMine.connect(gMine);gMine.connect(AC.destination);oscMine.start();
  oscTgt=AC.createOscillator();oscTgt.type='sine';oscTgt.frequency.value=220;
  gTgt=AC.createGain();gTgt.gain.value=0;
  oscTgt.connect(gTgt);gTgt.connect(AC.destination);oscTgt.start();}catch(e){}}
function setTones(fMine,vMine,fTarget,vTarget){
  if(!AC)return;
  const tc=0.06,now2=AC.currentTime;
  if(oscMine){oscMine.frequency.setTargetAtTime(clamp(fMine,40,2000),now2,tc);
    gMine.gain.setTargetAtTime(muted?0:clamp(vMine,0,.07),now2,tc);}
  if(oscTgt){oscTgt.frequency.setTargetAtTime(clamp(fTarget||220,40,2000),now2,tc);
    gTgt.gain.setTargetAtTime(muted?0:clamp(vTarget,0,.05),now2,tc);}
}
function beep(f,dur=.12,type='square',vol=.12,slide=0){if(!AC||muted)return;
  const o=AC.createOscillator(),g=AC.createGain();o.type=type;o.frequency.value=f;
  if(slide)o.frequency.exponentialRampToValueAtTime(Math.max(30,f+slide),AC.currentTime+dur);
  g.gain.value=vol;g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+dur);
  o.connect(g);g.connect(AC.destination);o.start();o.stop(AC.currentTime+dur);}
function chord(notes,step=.09){notes.forEach((n,i)=>setTimeout(()=>beep(n,.22,'triangle',.12),i*step*1000));}
function shatterSnd(){if(!AC||muted)return;const len=AC.sampleRate*0.35,buf=AC.createBuffer(1,len,AC.sampleRate);
  const d=buf.getChannelData(0);for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,2);
  const s=AC.createBufferSource();s.buffer=buf;const g=AC.createGain();g.gain.value=.35;
  const hp=AC.createBiquadFilter();hp.type='highpass';hp.frequency.value=1800;
  s.connect(hp);hp.connect(g);g.connect(AC.destination);s.start();}

/* ================================================== host-app bridge */
const ARCADE={
  embedded:window.parent!==window,
  playId:null, pendingCoin:null,
  emit(type,data){if(this.embedded)
    window.parent.postMessage(Object.assign({source:'resonance-arcade',type},data||{}),'*');},
  requestCoin(cb){
    if(!this.embedded){cb({ok:true,practice:true});return;}
    this.pendingCoin=cb;
    this.emit('arcade:coinRequest');
    setTimeout(()=>{if(this.pendingCoin===cb){this.pendingCoin=null;cb({ok:true,practice:true});}},900);
  },
  reportScore(final){
    if(this.playId)this.emit('arcade:score',{score,act,final:!!final});
  },
};
window.addEventListener('message',e=>{
  const m=e.data||{};
  if(m.type==='arcade:coinAccepted'&&ARCADE.pendingCoin){
    ARCADE.playId=m.playId||null;
    const cb=ARCADE.pendingCoin;ARCADE.pendingCoin=null;cb({ok:true,practice:!m.playId});}
  if(m.type==='arcade:coinDenied'&&ARCADE.pendingCoin){
    const cb=ARCADE.pendingCoin;ARCADE.pendingCoin=null;cb({ok:false,reason:m.reason});}
});

/* ================================================== level data
   ACT I  crystals:[{f? λ? v}] — dial your f to match (lock ±4 Hz for 1.2 s).
          Some crystals state only λ (and the chamber's v): f = v/λ is the dial.
   ACT II string/pipe: {L, v, closed} — resonances at n·v/2L (string) or odd
          n·v/4L (closed pipe). orbs:[{frac}] sit along the string; an orb
          shatters only when YOUR mode has an antinode there and amp peaks.
   ACT III λ (maybe dial), towers A fixed/B movable; bells need constructive
          (Δd ≈ nλ), hushes need destructive (Δd ≈ (n+½)λ); hold all 3 s. */
const ACT_META={
 1:{name:'THE TUNER', col:'#34d399', blurb:'Beacon crystals hum at hidden frequencies. Your dial is f, the chamber sets v, the crystal states λ — and v = fλ is the lock pick. Listen for the beats: when the throb slows, you’re close.'},
 2:{name:'THE ORGAN', col:'#fbbf24', blurb:'A string, a driver, and the harmonic series. Hit fn = n·v/2L and the standing wave blooms; park an antinode under the orb and sing it to pieces. Closed pipes hide every other rung.'},
 3:{name:'THE CHOIR', col:'#f472b6', blurb:'Two towers, one field. Where paths differ by nλ the sound doubles; at (n+½)λ it dies. Drag tower B until every bell rings and every hush goes silent.'},
};
const ACT1=[
 {name:'FIRST LIGHT', dur:75, v:340,
  crystals:[{f:220},{f:330}],
  tip:'Two crystals, frequencies posted. Sweep with ↑/↓, fine-tune with taps. As your tone nears a crystal’s, listen: the slow WAH-WAH-WAH is the beat frequency — exactly |your f − its f|. Beats at 2 Hz means you are 2 Hz away. Zero the throb.'},
 {name:'READ THE WAVE', dur:80, v:340,
  crystals:[{lam:1.0},{lam:0.85},{lam:0.68}],
  tip:'These crystals post only their WAVELENGTH. The chamber speed is 340 m/s, so the dial setting is f = v/λ. The telemetry triangle does the bookkeeping — but the thinking is yours.'},
 {name:'MIXED SIGNALS', dur:80, v:340,
  crystals:[{f:262},{lam:0.773},{lam:0.515}],
  tip:'One posts f, two post λ. Same law either way: v = fλ never blinks. (And yes — those λ values were chosen so the answers land on real musical notes. The universe tunes in C.)'},
 {name:'TWO CHAMBERS', dur:85, v:340,
  crystals:[{lam:1.31,v:340},{lam:1.31,v:1480},{lam:2.96,v:1480}],
  tip:'Same λ, DIFFERENT chamber: the right-hand crystals sit in water, where sound runs at 1480 m/s. Wave speed belongs to the MEDIUM, not the wave — so identical wavelengths demand wildly different frequencies. f = v/λ, and v just changed.'},
 {name:'THE SILENT ONE', dur:85, v:340,
  crystals:[{f:392},{lam:0.62},{lam:0.97},{scope:1.55}],
  tip:'The last crystal posts NOTHING — but its waveform is drawn on the scope with a meter grid behind it. Read λ off the grid yourself, then dial f = v/λ. This is the whole unit in one move: see a wave, know its number.'},
];
const ACT2=[
 {name:'FUNDAMENTAL', dur:75, L:1.0, v:440, closed:false, fretMin:0, fretMax:0,
  orbs:[{frac:0.5}],
  tip:'One string, length 1 m, wave speed 440 m/s. The fundamental lives at f₁ = v/2L = 220 Hz: one fat antinode in the middle. Park your dial there, hold it, and watch the amplitude bloom — resonance is a swing pushed at exactly the right moment, ten times a second.'},
 {name:'THE SECOND RUNG', dur:75, L:1.0, v:440, closed:false, fretMin:0, fretMax:0,
  orbs:[{frac:0.25},{frac:0.75}],
  tip:'Two orbs at L/4 and 3L/4 — exactly the antinodes of the SECOND harmonic (440 Hz). The fundamental has a node where these orbs hang; it will never touch them. Pick the mode whose shape fits the job.'},
 {name:'THE FRET', dur:85, L:1.0, v:440, closed:false, fretMin:0.6, fretMax:1.2,
  orbs:[{frac:0.5},{frac:0.5,needL:0.75}],
  tip:'New lever: ←/→ slides the bridge, changing L itself. Same dial-f, but now fn = n·v/2L has TWO knobs. Shorter string, higher song — every guitarist’s left hand knows this equation.'},
 {name:'THE STOPPED PIPE', dur:85, L:1.0, v:340, closed:true, fretMin:0, fretMax:0,
  orbs:[{frac:0.999},{frac:0.33,n:3}],
  tip:'A pipe closed at one end: node at the cap, antinode at the mouth, and ONLY ODD harmonics — f = n·v/4L for n = 1, 3, 5… Sweep the dial and feel the missing rungs. The second orb answers only to n = 3.'},
 {name:'THE CARILLON', dur:90, L:1.0, v:440, closed:false, fretMin:0.6, fretMax:1.2,
  orbs:[{frac:0.5},{frac:0.25},{frac:0.167,n:3}],
  tip:'Three orbs, three different modes, one clock. Fundamental for the middle, second harmonic for the quarter-point, third for the sixth-point. Play the whole series — this is why one string can be a chord.'},
];
const ACT3=[
 {name:'ONE BELL', dur:75, lam:3.0, lamDial:false,
  bells:[{x:34,y:10}], hushes:[],
  tip:'Tower A is fixed; drag tower B with the arrows. The bell rings where the two path lengths differ by a WHOLE number of wavelengths — crest meets crest, Δd = nλ. The bright fringes on the floor are exactly those places. Park one on the bell.'},
 {name:'BELL AND LIBRARY', dur:80, lam:3.0, lamDial:false,
  bells:[{x:36,y:8}], hushes:[{x:30,y:22}],
  tip:'Ring the bell AND silence the library: it needs Δd = (n+½)λ — crest meets trough, perfect cancellation. Two constraints, one tower position. The dark fringes are real places; the library wants to live in one.'},
 {name:'TWO BELLS', dur:85, lam:2.6, lamDial:false,
  bells:[{x:34,y:7},{x:38,y:18}], hushes:[{x:26,y:14}],
  tip:'Three constraints now. Notice you can’t fix one without moving the others — fringes come as a SET, spaced by geometry and λ. Hunt the position where the whole pattern fits the room.'},
 {name:'THE λ DIAL', dur:90, lam:3.0, lamDial:true,
  bells:[{x:35,y:9},{x:30,y:23}], hushes:[{x:40,y:16},{x:24,y:6}],
  tip:'New lever: ↑/↓ changes the wavelength itself. Longer λ spreads the fringes apart; shorter λ packs them tight. When no tower position works, change the RULER the room is measured with.'},
 {name:'FULL CHOIR', dur:95, lam:2.8, lamDial:true,
  bells:[{x:34,y:6},{x:40,y:14},{x:28,y:25}], hushes:[{x:24,y:12},{x:38,y:24}],
  tip:'Five constraints, two levers, one held breath. Everything Act III taught: fringes are path-difference contours, λ sets their spacing, and somewhere in this room is the one chord that satisfies them all. Find it and hold it.'},
];
const HALLS=['THE UNDERCROFT','GLASS GALLERY','THE BELFRY','ECHO COURT','THE STACKS','NAVE NINE','THE CISTERN'];
function endless1(w){
  const n=Math.min(5,2+Math.ceil(w/2)),cs=[];
  for(let i=0;i<n;i++){
    const f=Math.round(rnd(180,720));
    const mode=pick(w>1?['f','lam','lam']:['f','lam']);
    if(mode==='f')cs.push({f});
    else cs.push({lam:+(340/f).toFixed(2)});
  }
  return {name:pick(HALLS)+' · SET '+w, dur:Math.max(55,80-w*2), v:340, crystals:cs,
    tip:'Unscheduled chime order. The triangle still holds.'};
}
function endless2(w){
  const L=+rnd(0.8,1.2).toFixed(2),v=Math.round(rnd(380,500));
  const closed=w>2&&Math.random()<.4;
  const orbs=[{frac:0.5}];
  if(w>1)orbs.push({frac:0.25});
  if(w>3)orbs.push({frac:0.167,n:3});
  return {name:pick(HALLS)+' · SET '+w, dur:Math.max(60,85-w*2), L, v, closed,
    fretMin:w>2?0.6:0, fretMax:w>2?1.2:0, orbs,
    tip:'New string, same series.'};
}
function endless3(w){
  const bells=[],hushes=[];
  const nb=Math.min(3,1+Math.ceil(w/2)),nh=Math.min(2,Math.floor(w/2));
  for(let i=0;i<nb;i++)bells.push({x:Math.round(rnd(24,42)),y:Math.round(rnd(5,25))});
  for(let i=0;i<nh;i++)hushes.push({x:Math.round(rnd(22,42)),y:Math.round(rnd(5,25))});
  return {name:pick(HALLS)+' · SET '+w, dur:Math.max(65,90-w*2),
    lam:+rnd(2.4,3.4).toFixed(1), lamDial:w>1, bells, hushes,
    tip:'More rooms to please. Same two levers.'};
}
const ACT_LEVELS={1:ACT1,2:ACT2,3:ACT3};
const ENDLESS={1:endless1,2:endless2,3:endless3};

/* ================================================== state */
let act=1, state='title', lv=null, levelIdx=0, wave=0, lives=3, score=0, streak=0;
let myF=220, up=false, down=false, left=false, right=false;
let crystals=[], lockT=0, lockIdx=-1, doneCount=0;
let amp=0, fret=1.0, orbs=[];                 // act II
let towerA={x:10,y:15}, towerB={x:20,y:15}, lam=3, zoneT=0;  // act III
let t=0, acc=0, attemptT=0;
let particles=[], popups=[], shake=0, flash=0;
let landedOK=false, downTimer=0, lastResult=null, primary=null;
function bumpHi(){if(score>HIS[act]){HIS[act]=score;saveHi();}}
function popup(text,col,size){popups.push({text,col:col||'#fbbf24',size:size||24,t:0,jx:rnd(-12,12)});}
function burstPx(px,py,n,cols,sp){for(let i=0;i<n;i++){const a=rnd(0,TAU),s2=rnd(20,sp||90);
  particles.push({px,py,vx:Math.cos(a)*s2,vy:Math.sin(a)*s2,
    life:rnd(.3,.9),col:pick(cols),size:rnd(1.5,3.5)});}}
function crystalF(c){ // every crystal resolves to a target frequency
  if(c.f)return c.f;
  if(c.lam)return (c.v||lv.v)/c.lam;
  if(c.scope)return lv.v/c.scope;
  return 220;}
function modeFreqs(){ // act II resonance ladder for current string/pipe
  const L=lv.fretMax>0?fret:lv.L, v=lv.v, out=[];
  if(lv.closed){for(let n=1;n<=9;n+=2)out.push({n,f:n*v/(4*L)});}
  else{for(let n=1;n<=6;n++)out.push({n,f:n*v/(2*L)});}
  return out;}
function nearestMode(){
  let best=null;
  for(const m of modeFreqs()){
    if(!best||Math.abs(m.f-myF)<Math.abs(best.f-myF))best=m;}
  return best;}

/* ================================================== overlay + screens */
function overlay(html){const o=$('#overlay');o.innerHTML=html;o.classList.add('show');}
function hideOverlay(){$('#overlay').classList.remove('show');}
function title(){
  state='title';act=1;lv=ACT1[0];setupLevel();
  overlay(`
   <div class="card" style="text-align:center">
     <h1>RESONANCE</h1>
     <div class="tag">A WAVES ARCADE · THREE ACTS</div>
     <div class="sub" style="text-align:left">
       The only cabinet that can <b style="color:var(--ink)">play its own physics</b>.
       Your emitter is a real tone; the targets are real tones; the throbbing
       you hear when you’re close is real beats. Tune with your ears.<br><br>
       <b style="color:#34d399">ACT I — THE TUNER</b> &nbsp;v = fλ is the lock pick<br>
       <b style="color:#fbbf24">ACT II — THE ORGAN</b> &nbsp;standing waves; fn = n·v/2L<br>
       <b style="color:#f472b6">ACT III — THE CHOIR</b> &nbsp;interference; Δd = nλ or (n+½)λ<br><br>
       <span class="kbd">↑</span><span class="kbd">↓</span> tune f ·
       <span class="kbd">←</span><span class="kbd">→</span> fret / move tower ·
       <span class="kbd">M</span> mute (but you’ll be tuning blind)
     </div>

function qNum(text,ans,unit,distractors,explain){
  const vals=[+fmt(ans)];
  for(const d of distractors){let v=+fmt(d);
    while(vals.some(x=>Math.abs(x-v)<0.05))v=+fmt(v+rnd(0.8,2.2));
    vals.push(v);}
  const choices=shuffle(vals.map((v,i)=>({s:fmt(v)+' '+unit,ok:i===0?1:0})));
  return {text,choices,explain};
}
function qCon(text,right,wrongs,explain){
  return {text,choices:shuffle([{s:right,ok:1}].concat(wrongs.map(s=>({s,ok:0})))),explain};
}

/* ================================================== physics */
const DT=1/120;
function step(dt){
  t+=dt;attemptT+=dt;
  // dials
  const sweep=60*dt;
  if(act<3){
    if(up)myF=clamp(myF+sweep,60,900);
    if(down)myF=clamp(myF-sweep,60,900);
    if(act===2&&lv.fretMax>0){
      if(right)fret=clamp(fret+0.12*dt*3,lv.fretMin,lv.fretMax);
      if(left)fret=clamp(fret-0.12*dt*3,lv.fretMin,lv.fretMax);}
  }else{
    const mv=9*dt;
    if(left)towerB.x=clamp(towerB.x-mv,14,46);
    if(right)towerB.x=clamp(towerB.x+mv,14,46);
    if(up)towerB.y=clamp(towerB.y-mv,3,27);
    if(down)towerB.y=clamp(towerB.y+mv,3,27);
  }
  if(act===1){
    // nearest unmatched crystal & lock logic
    let near=null,nd=1e9;
    crystals.forEach((c,i)=>{if(c.got)return;
      const d=Math.abs(c.target-myF);if(d<nd){nd=d;near=i;}});
    if(near!==null){
      const c=crystals[near];
      setTones(myF,0.05,c.target,clamp(1-nd/60,0,1)*0.04);
      if(nd<=4){if(lockIdx!==near){lockIdx=near;lockT=0;}
        lockT+=dt;
        if(lockT>=1.2){
          c.got=true;doneCount++;lockIdx=-1;lockT=0;
          popup('LOCKED — '+fmt(c.target)+' Hz','#34d399',24);
          shatterSnd();chord([c.target,c.target*1.5],.05);
          flash=.3;shake=.3;
          if(doneCount>=crystals.length){
            succeed(`All ${crystals.length} crystals matched — the hall is in tune.`);return;}
        }
      }else{lockIdx=-1;lockT=0;}
    }else setTones(myF,0.05,220,0);
  }else if(act===2){
    // resonance response: Lorentzian peak around nearest mode
    const m=nearestMode();
    const width=6;
    const resp=1/(1+Math.pow((myF-m.f)/width,2));
    amp+=(resp*2.2-1.4*amp)*dt;
    amp=clamp(amp,0,1);
    setTones(myF,0.05,m.f,resp*0.03);
    const L=lv.fretMax>0?fret:lv.L;
    for(const o of orbs){
      if(o.got)continue;
      // does the CURRENT mode put an antinode at the orb? (within 6% of L)
      // open string, mode n: antinodes at x = (k+½)·L/n
      // closed pipe, mode n (odd): λ = 4L/n; antinodes every λ/2 down from the open end
      let anti=false;
      if(resp>0.5&&(!o.n||o.n===m.n)){
        const n=m.n;
        if(lv.closed){
          const lam2=4*L/n;
          for(let k=0;k*lam2/2<=L+1e-6;k++)
            if(Math.abs((L-k*lam2/2)-o.frac*L)<L*0.06){anti=true;break;}
        }else{
          for(let k=0;k<n;k++)
            if(Math.abs((k+0.5)*L/n-o.frac*L)<L*0.06){anti=true;break;}
        }
      }
      if(anti&&amp>0.85&&(!o.needL||Math.abs(L-o.needL)<0.04)){
        o.charge+=dt;
        if(o.charge>0.8){
          o.got=true;doneCount++;
          popup('SHATTERED — n = '+m.n,'#fbbf24',26);
          shatterSnd();flash=.4;shake=.5;
          if(orbs.every(x=>x.got)){
            succeed(`Every orb met its antinode — the harmonic series, played in full.`);return;}
        }
      }else o.charge=Math.max(0,o.charge-dt*0.7);
    }
  }else{
    // interference: each zone checks its path difference
    setTones(0,0,220,0);
    let allOk=true;
    const chk=(z,wantHalf)=>{
      const d1=hyp(z.x-towerA.x,z.y-towerA.y),d2=hyp(z.x-towerB.x,z.y-towerB.y);
      const dd=Math.abs(d1-d2)/lam;          // in wavelengths
      const frac=dd-Math.floor(dd);
      const distTo=wantHalf?Math.abs(frac-0.5):Math.min(frac,1-frac);
      z.ok=distTo<0.12;
      if(!z.ok)allOk=false;
    };
    for(const b of lv.bells)chk(b,false);
    for(const h of lv.hushes)chk(h,true);
    if(allOk){zoneT+=dt;
      if(zoneT>=3){succeed('Every bell on a bright fringe, every hush in a dark one — one position, all conditions.');return;}}
    else zoneT=0;
  }
  if(attemptT>=lv.dur){

function antiClosed(n,k,L){ // closed pipe (node at x=0, antinode at x=L): antinodes at L·(2k+1)/n? — use x = L·(2k+1)/(n+? ) — for mode n (odd), antinodes at x = L·(2k+1)/n · ... simplified: spacing λ/2 starting at the open end
  // mode n (odd): λ = 4L/n. Antinodes at x = L − m·(λ/2), m = 0,1,…
  const lam2=4*L/n,out=[];
  for(let m2=0;m2*lam2/2<=L;m2++)out.push(L-m2*lam2/2);
  return out[k]!==undefined?out[k]:-99;
}

  let y3=gy+gh-30;
  if(act===1){ctx.fillStyle='#8b96ad';
    ctx.fillText('dial f; the medium owns v; λ follows',gx+10,y3);
    const rem=crystals.filter(c=>!c.got).length;
    ctx.fillStyle='#34d399';
    ctx.fillText(rem?rem+' crystal'+(rem>1?'s':'')+' still humming':'hall in tune',gx+10,y3+16);}
  else if(act===2){const m2=nearestMode();
    ctx.fillStyle='#8b96ad';
    ctx.fillText('rungs: '+modeFreqs().map(x=>Math.round(x.f)).join(' · '),gx+10,y3);
    ctx.fillStyle=Math.abs(myF-m2.f)<6?'#34d399':'#fbbf24';
    ctx.fillText('drive '+fmt(myF)+' Hz → n='+m2.n+' ('+fmt(m2.f)+')',gx+10,y3+16);}
  else{ctx.fillStyle='#8b96ad';
    ctx.fillText('bright fringe: Δd = nλ · dark: (n+½)λ',gx+10,y3);
    const okN=[...lv.bells,...lv.hushes].filter(z=>z.ok).length;
    ctx.fillStyle='#34d399';
    ctx.fillText(okN+' / '+(lv.bells.length+lv.hushes.length)+' zones satisfied',gx+10,y3+16);}
}

/* ================================================== loop + input */
let last=performance.now();
function frame(now){
  const el=Math.min(.05,(now-last)/1000);last=now;
  if(state==='play'){
    acc+=el;
    while(acc>=DT&&state==='play'){step(DT);acc-=DT;}
  }
  if(state==='down'){downTimer+=el;
    if(downTimer>1.1&&!$('#overlay').classList.contains('show'))showResult();}
  render();
  requestAnimationFrame(frame);
}
window.addEventListener('keydown',e=>{
  if(['Space','ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.code))e.preventDefault();
  if(e.repeat)return;
  if(state==='play'){
    if(e.code==='ArrowUp')up=true;
    if(e.code==='ArrowDown')down=true;
    if(e.code==='ArrowLeft')left=true;
    if(e.code==='ArrowRight')right=true;
    if(act===3&&lv.lamDial){
      if(e.code==='KeyW')lam=clamp(lam+0.2,1.6,4.5);
      if(e.code==='KeyS')lam=clamp(lam-0.2,1.6,4.5);}
    if(act<3){ // fine tune taps
      if(e.code==='KeyW')myF=clamp(myF+1,60,900);
      if(e.code==='KeyS')myF=clamp(myF-1,60,900);}
  }
  if(e.code==='Enter'&&primary&&$('#overlay').classList.contains('show'))primary();
  if(e.code==='KeyP'&&(state==='play'||state==='paused')){
    state=state==='play'?'paused':'play';
    up=down=left=right=false;setTones(myF,0,220,0);}
  if(e.code==='KeyM'){muted=!muted;setTones(myF,0,220,0);}
});
window.addEventListener('keyup',e=>{
  if(e.code==='ArrowUp')up=false;
  if(e.code==='ArrowDown')down=false;
  if(e.code==='ArrowLeft')left=false;
  if(e.code==='ArrowRight')right=false;
});
let dragY=null;
cv.addEventListener('pointerdown',e=>{audio();dragY=e.clientY;
  if(state==='play'&&act===3){
    const {w:SW}=sceneRect();
    const ww=48,wh=30,s=Math.min((SW-40)/ww,(H-80)/wh);
    const ox=(SW-ww*s)/2,oy=(H-wh*s)/2+10;
    towerB.x=clamp((e.clientX-ox)/s,14,46);
    towerB.y=clamp((e.clientY-oy)/s,3,27);
  }
});
cv.addEventListener('pointermove',e=>{
  if(dragY===null||state!=='play')return;
  if(act<3){myF=clamp(myF+(dragY-e.clientY)*0.5,60,900);dragY=e.clientY;}
  else{
    const {w:SW}=sceneRect();
    const ww=48,wh=30,s=Math.min((SW-40)/ww,(H-80)/wh);
    const ox=(SW-ww*s)/2,oy=(H-wh*s)/2+10;
    towerB.x=clamp((e.clientX-ox)/s,14,46);
    towerB.y=clamp((e.clientY-oy)/s,3,27);
  }
});
window.addEventListener('pointerup',()=>{dragY=null;});
window.addEventListener('blur',()=>{up=down=left=right=false;dragY=null;});
document.addEventListener('click',audio,{once:true});

/* ================================================== go */
title();
requestAnimationFrame(frame);
</script>
