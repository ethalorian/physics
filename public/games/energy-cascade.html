<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CASCADE // an energy arcade</title>
<!--
  CASCADE — an energy arcade in three acts. Fourth cabinet, after DESCENT
  (kinematics), PUSH (dynamics), IMPACT (momentum). Single file, no deps.

  You drive a gravity-powered mine cart. You cannot create energy — only
  store it (spring, battery), convert it (KE ↔ PE), and spend it (heat).
  The ledger is EXACT: spring + PE + KE + budget + battery + heat is
  constant to the joule, every frame. Heat only ever grows.

  ACT I   DROP IN       — charge the spring, clear the hills, dock soft
  ACT II  ROUGH ROAD    — friction taxes by DISTANCE; a work budget to spend
  ACT III THE GENERATOR — regen braking (75%) banks descents into a battery

  Signature visuals: the ENERGY STACK (total never moves, heat ratchets) and
  the ENERGY HORIZON — a dashed line at h = E/mg across the mountains, the
  height you can still reach. Brake, and watch your horizon sink.

  Speaks the arcade bridge protocol (docs/ARCADE_PATTERN.md).
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root{
    --neon:#34d399; --neon2:#fbbf24; --amber:#fbbf24; --red:#f87171;
    --ink:#e7ecf5; --dim:#8b96ad; --card:#06120bee; --edge:#34d39955;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;background:#040b07}
  body{font-family:'Share Tech Mono',ui-monospace,monospace;color:var(--ink)}
  #c{display:block;width:100vw;height:100vh;touch-action:none;cursor:crosshair}
  #crt{pointer-events:none;position:fixed;inset:0;z-index:5;
    background:repeating-linear-gradient(0deg,transparent 0 2px,#0001 2px 4px);
    mix-blend-mode:overlay}
  #vig{pointer-events:none;position:fixed;inset:0;z-index:5;
    background:radial-gradient(ellipse at center,transparent 55%,#000a 100%)}
  #overlay{position:fixed;left:0;top:0;bottom:0;width:63%;z-index:10;
    display:none;align-items:center;justify-content:center;padding:20px;overflow-y:auto}
  #overlay.show{display:flex}
  @media (max-width:900px){ #overlay{width:100%} }
  .card{background:var(--card);border:1px solid var(--edge);border-radius:14px;
    padding:26px 30px;max-width:540px;width:100%;
    box-shadow:0 0 40px #34d39922, inset 0 0 60px #0006;
    animation:pop .25s ease-out}
  @keyframes pop{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
  h1,h2{font-family:'Orbitron',sans-serif;letter-spacing:.06em}
  h1{font-size:42px;font-weight:900;color:var(--neon);text-shadow:0 0 18px #34d39988}
  h2{font-size:22px;color:var(--neon);text-shadow:0 0 12px #34d39966;margin-bottom:10px}
  .tag{color:var(--neon2);font-size:13px;letter-spacing:.35em;margin:4px 0 16px}
  .sub{color:var(--dim);font-size:14px;line-height:1.55;margin-bottom:14px}
  .stat{display:flex;justify-content:space-between;font-size:14px;padding:3px 0;
    border-bottom:1px dashed #ffffff14}
  .stat b{color:var(--amber)}
  .good{color:var(--neon)} .bad{color:var(--red)}
  .btn{display:inline-block;margin-top:18px;font-family:'Orbitron',sans-serif;
    font-size:15px;font-weight:700;letter-spacing:.12em;color:#04150c;
    background:var(--neon);border:none;border-radius:8px;padding:12px 26px;
    cursor:pointer;box-shadow:0 0 18px #34d39966;transition:transform .08s}
  .btn:hover{transform:scale(1.05)} .btn:active{transform:scale(.97)}
  .btn.alt{background:#1f2937;color:var(--ink);box-shadow:none;border:1px solid #ffffff22}
  .choices{display:grid;gap:8px;margin-top:12px}
  .choice{font-family:'Share Tech Mono',monospace;font-size:15px;text-align:left;
    background:#0a1a11;border:1px solid #ffffff1c;border-radius:8px;color:var(--ink);
    padding:11px 14px;cursor:pointer;transition:all .1s}
  .choice:hover{border-color:var(--neon);background:#0d2416}
  .choice.right{background:#0c2a22;border-color:var(--neon);color:var(--neon)}
  .choice.wrong{background:#2a0c12;border-color:var(--red);color:var(--red)}
  .kbd{display:inline-block;border:1px solid #ffffff33;border-bottom-width:3px;
    border-radius:5px;padding:1px 7px;font-size:12px;color:var(--amber);background:#ffffff0a}
  .explain{margin-top:12px;padding:10px 12px;border-left:3px solid var(--amber);
    background:#fbbf2410;font-size:13px;line-height:1.5;color:#fde68a;display:none}
  .bigscore{font-family:'Orbitron',sans-serif;font-size:34px;font-weight:900;
    color:var(--amber);text-shadow:0 0 16px #fbbf2477;margin:8px 0}
  .planetchip{font-family:'Orbitron',sans-serif;font-size:12px;letter-spacing:.2em;
    color:var(--neon2);border:1px solid #fbbf2455;border-radius:99px;padding:4px 12px}
  .actgrid{display:grid;gap:12px;margin-top:14px}
  .actcard{display:block;width:100%;text-align:left;background:#0a1810;cursor:pointer;
    border:1px solid #ffffff1c;border-radius:12px;padding:14px 18px;color:var(--ink);
    font-family:'Share Tech Mono',monospace;transition:all .12s}
  .actcard:hover:not(.locked){border-color:var(--ac);box-shadow:0 0 22px var(--acGlow);transform:translateX(4px)}
  .actcard.locked{opacity:.45;cursor:not-allowed}
  .actname{font-family:'Orbitron',sans-serif;font-weight:700;font-size:17px;
    letter-spacing:.08em;color:var(--ac)}
  .actsub{font-size:12.5px;color:var(--dim);margin-top:4px;line-height:1.45}
  .hiline{font-size:11px;color:var(--amber);margin-top:6px;letter-spacing:.08em}
  .teachlink{display:inline-block;margin-top:14px;font-size:11px;color:#57534e;
    letter-spacing:.15em;cursor:pointer;border-bottom:1px dotted #57534e}
  .teachlink:hover{color:var(--dim)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="crt"></div><div id="vig"></div>
<div id="overlay"></div>

<script>
"use strict";
/* ================================================== utils */
const $=q=>document.querySelector(q);
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const rnd=(a,b)=>a+Math.random()*(b-a);
const pick=a=>a[Math.floor(Math.random()*a.length)];
const fmt=(n,d=1)=>{const s=(+n).toFixed(d);return s.replace(/\.0+$/,'');};
const fmtE=j=>Math.abs(j)>=1000?(j/1000).toFixed(1)+' kJ':Math.round(j)+' J';
const G=9.8;
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

/* ================================================== canvas */
const cv=$('#c'),ctx=cv.getContext('2d');
let W=0,H=0,DPR=1;
function resize(){DPR=Math.min(2,window.devicePixelRatio||1);
  W=window.innerWidth;H=window.innerHeight;
  cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);}
window.addEventListener('resize',resize);resize();

/* ================================================== persistence */
let PROG={a2:false,a3:false,teacher:false}, HIS={1:0,2:0,3:0};
try{Object.assign(PROG,JSON.parse(localStorage.getItem('cascade2_prog')||'{}'));
    Object.assign(HIS, JSON.parse(localStorage.getItem('cascade2_hi')||'{}'));}catch(e){}
function saveProg(){try{localStorage.setItem('cascade2_prog',JSON.stringify(PROG));}catch(e){}}
function saveHi(){try{localStorage.setItem('cascade2_hi',JSON.stringify(HIS));}catch(e){}}
function unlocked(a){return a===1||PROG.teacher||(a===2&&PROG.a2)||(a===3&&PROG.a3);}

/* ================================================== audio */
let AC=null,muted=false,rollGain=null;
function audio(){if(AC||muted)return;try{
  AC=new (window.AudioContext||window.webkitAudioContext)();
  const o=AC.createOscillator();o.type='sawtooth';o.frequency.value=36;
  const lp=AC.createBiquadFilter();lp.type='lowpass';lp.frequency.value=180;
  rollGain=AC.createGain();rollGain.gain.value=0;
  o.connect(lp);lp.connect(rollGain);rollGain.connect(AC.destination);o.start();}catch(e){}}
function setRoll(speed){if(!AC||!rollGain)return;
  rollGain.gain.setTargetAtTime(muted?0:clamp(speed/40,0,0.06),AC.currentTime,0.1);}
function beep(f,dur=.12,type='square',vol=.12,slide=0){if(!AC||muted)return;
  const o=AC.createOscillator(),g=AC.createGain();o.type=type;o.frequency.value=f;
  if(slide)o.frequency.exponentialRampToValueAtTime(Math.max(30,f+slide),AC.currentTime+dur);
  g.gain.value=vol;g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+dur);
  o.connect(g);g.connect(AC.destination);o.start();o.stop(AC.currentTime+dur);}
function chord(notes,step=.09){notes.forEach((n,i)=>setTimeout(()=>beep(n,.22,'triangle',.12),i*step*1000));}
function boom(){if(!AC||muted)return;const len=AC.sampleRate*0.6,buf=AC.createBuffer(1,len,AC.sampleRate);
  const d=buf.getChannelData(0);for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,2);
  const s=AC.createBufferSource();s.buffer=buf;const g=AC.createGain();g.gain.value=.5;
  const lp=AC.createBiquadFilter();lp.type='lowpass';lp.frequency.value=380;
  s.connect(lp);lp.connect(g);g.connect(AC.destination);s.start();}

/* ================================================== host-app bridge */
const ARCADE={
  embedded:window.parent!==window,
  playId:null, pendingCoin:null,
  emit(type,data){if(this.embedded)
    window.parent.postMessage(Object.assign({source:'cascade-arcade',type},data||{}),'*');},
  requestCoin(cb){
    if(!this.embedded){cb({ok:true,practice:true});return;}
    this.pendingCoin=cb;
    this.emit('arcade:coinRequest');
    setTimeout(()=>{if(this.pendingCoin===cb){this.pendingCoin=null;cb({ok:true,practice:true});}},900);
  },
  reportScore(final){
    if(this.playId)this.emit('arcade:score',{score,act,final:!!final});
  },
};
window.addEventListener('message',e=>{
  const m=e.data||{};
  if(m.type==='arcade:coinAccepted'&&ARCADE.pendingCoin){
    ARCADE.playId=m.playId||null;
    const cb=ARCADE.pendingCoin;ARCADE.pendingCoin=null;cb({ok:true,practice:!m.playId});}
  if(m.type==='arcade:coinDenied'&&ARCADE.pendingCoin){
    const cb=ARCADE.pendingCoin;ARCADE.pendingCoin=null;cb({ok:false,reason:m.reason});}
});

/* ================================================== level data
   Track = smooth cosine-blended profile through [x, y] points (m, y up).
   Cart m = 80 kg. Spring charges at 2600 J/s up to springMax. Brake decel
   6 m/s² (→ heat). Booster (act II) 400 N from a work budget. Regen (act
   III) banks 75% of braking into the battery, 25% to heat.
   rough: [{x0,x1,mu}] friction zones. dock: stop inside [x0,x1].
   Energy needs noted per level so headroom is auditable. */
const ACT_META={
 1:{name:'DROP IN',       col:'#34d399', blurb:'Charge the spring, clear the hills, stop in the dock. The stack does not lie: what the hills don’t take, your brake must turn to heat.'},
 2:{name:'ROUGH ROAD',    col:'#fbbf24', blurb:'Friction charges by the meter, not by the hurry. You get a work budget — W = F·d — and the efficiency board grades every joule.'},
 3:{name:'THE GENERATOR', col:'#c084fc', blurb:'Your brake becomes a generator: bank descents into the battery at 75 cents on the joule. Every conversion pays the house.'},
};
const CART_M=80, CHARGE_RATE=2600, BRK=6, BST=5, REGEN_EFF=0.75;
const ACT1=[
 {name:'FIRST DROP', springMax:6000, budget:0, battery0:0,
  pts:[[0,0],[20,0],[30,3],[40,0],[70,0]], rough:[], dock:[58,64],
  tip:'Hold to compress the spring — you are buying energy and the purple band shows every joule. The hill costs mgh = 2.35 kJ to clear (the tick on the stack). Whatever is left arrives as speed, and only the brake can take it away.'},
 {name:'TWIN PEAKS', springMax:8500, budget:0, battery0:0,
  pts:[[0,0],[15,0],[25,5],[33,2],[42,7],[52,0],[78,0]], rough:[], dock:[66,72],
  tip:'Two crests: 5 m and 7 m. Only the TALLEST tick matters — energy doesn’t care how many hills you cross, only how high the highest one is. Watch the horizon line: if it sits below a crest, you will roll back.'},
 {name:'THE PIT', springMax:7000, budget:0, battery0:0,
  pts:[[0,0],[12,0],[20,4],[30,-6],[40,4],[48,0],[72,0]], rough:[], dock:[60,66],
  tip:'The pit drops 10 m below the crests. At the bottom you will be FLYING — all that PE turned to KE. Don’t panic-brake in the pit: the far wall gives it all back. The stack just sloshes.'},
 {name:'JUST ENOUGH', springMax:6800, budget:0, battery0:0,
  pts:[[0,0],[14,0],[26,8],[38,0],[58,0]], rough:[], dock:[46,52],
  tip:'The hill costs 6.27 kJ. Your spring holds 6.8 — eight percent of headroom. Overcharge and you arrive too hot to stop; undercharge and you stall on the face. Charge like you mean it.'},
 {name:'THE CATHEDRAL', springMax:9500, budget:0, battery0:0,
  pts:[[0,0],[10,0],[18,3],[26,1],[34,6],[42,3],[50,9],[60,0],[84,0]], rough:[], dock:[72,78],
  tip:'Three naves, the last one 9 m tall, then a long fall to the dock. Everything you bought at the spring comes due as speed at the bottom. Brake early, brake long — the heat band remembers everything.'},
];
const ACT2=[
 {name:'ROUGH WELCOME', springMax:5500, budget:2500, battery0:0,
  pts:[[0,0],[18,0],[28,2],[36,0],[64,0]], rough:[{x0:40,x1:50,mu:0.15}], dock:[54,60],
  tip:'The brown stretch is rough rail: it taxes you μmg per meter — about 118 J/m here, 1.18 kJ for the whole patch, NO MATTER YOUR SPEED. Hurrying through costs exactly the same as crawling. Budget for it.'},
 {name:'THE SLOG', springMax:6000, budget:3000, battery0:0,
  pts:[[0,0],[12,0],[22,-5],[40,-5],[50,0],[72,0]], rough:[{x0:22,x1:40,mu:0.12}], dock:[60,66],
  tip:'A long rough valley floor. Friction’s bill is fixed by DISTANCE — so the booster exists for exactly this: hold → and watch W = F·d tick off your budget as work done on the cart.'},
 {name:'HIGH PASS', springMax:6500, budget:4500, battery0:0,
  pts:[[0,0],[14,0],[30,9],[44,0],[68,0]], rough:[{x0:14,x1:30,mu:0.10}], dock:[56,62],
  tip:'The pass costs 7.06 kJ of height and the rough climb adds its own tax — more than your spring holds. You MUST boost on the face. Spend the budget where gravity is against you; that’s what it’s for.'},
 {name:'GREASE THE RAILS', springMax:7000, budget:3500, battery0:0,
  pts:[[0,0],[12,0],[20,4],[30,0],[40,4],[52,0],[76,0]],
  rough:[{x0:12,x1:20,mu:0.08},{x0:30,x1:40,mu:0.12},{x0:52,x1:60,mu:0.08}], dock:[64,70],
  tip:'Patchwork rail. Tally the bill before you launch: Σ μmg·d for every brown stretch, plus the tallest hill. The efficiency board pays a bonus for every joule of budget you DON’T spend.'},
 {name:'THE LONG HAUL', springMax:8000, budget:4000, battery0:0,
  pts:[[0,0],[10,0],[20,6],[32,-3],[46,8],[58,0],[80,0]],
  rough:[{x0:10,x1:20,mu:0.08},{x0:32,x1:46,mu:0.12}], dock:[68,74],
  tip:'Two climbs, two taxes, one budget. The masters’ line: spring for the first hill, gravity through the dip, budget for the second face, brake only at the end. Heat you didn’t make is score you keep.'},
];
const ACT3=[
 {name:'THE HARVEST', springMax:0, budget:0, battery0:0,
  pts:[[0,10],[7,10],[21,0],[36,0],[46,4],[56,0],[74,0]], rough:[], dock:[64,70],
  tip:'No spring this time — you START with 7.84 kJ of height. Hold ← on the descent: the brake becomes a GENERATOR, banking 75% into the battery (the rest still leaks as heat — every conversion pays the house). You’ll need about 3.2 kJ banked for the far hill.'},
 {name:'SAWTOOTH', springMax:0, budget:0, battery0:0,
  pts:[[0,12],[7,12],[19,4],[31,9],[43,1],[55,6],[65,0],[82,0]], rough:[], dock:[72,78],
  tip:'Down, up, down, up. You could coast it all — or harvest each descent and boost each climb, arriving with control instead of terror. The battery is a savings account for gravity’s paydays.'},
 {name:'LEAKY BUCKET', springMax:0, budget:0, battery0:0,
  pts:[[0,11],[7,11],[19,2],[31,7],[43,0],[53,5],[63,0],[80,0]],
  rough:[{x0:19,x1:31,mu:0.08},{x0:43,x1:53,mu:0.08}], dock:[70,76],
  tip:'Rough patches on the climbs now — friction taxes the track while the regen taxes your conversions. Double taxation. Harvest hard on the clean descents; spend only where the rail is smooth.'},
 {name:'THE SUMMIT', springMax:5200, budget:0, battery0:0,
  pts:[[0,6],[12,6],[24,0],[40,0],[56,11],[68,8],[82,8]], rough:[], dock:[74,80],
  tip:'The dock sits HIGHER than your start — a net climb. Spring plus your starting height won’t cover the 11 m crest unless you harvest the first descent nearly perfectly. At 75% efficiency, greed on the regen is the only way up.'},
 {name:'FULL CIRCUIT', springMax:4500, budget:0, battery0:0,
  pts:[[0,9],[10,9],[20,2],[30,7],[42,-2],[54,8],[66,3],[74,3],[88,0],[100,0]],
  rough:[{x0:20,x1:30,mu:0.07},{x0:54,x1:66,mu:0.09}], dock:[90,96],
  tip:'Everything: spring, harvest, friction, a pit, and a summit. One run, one ledger. When you dock, read the stack like a receipt — every joule you started with is either height, speed, battery, or heat. None are missing. None ever are.'},
];
const MINES=['BLUE SEAM','THE GORGE','NORTH FACE','COPPER CUT','THE INCLINE','SILVERLINE','BIG EMPTY'];
function genProfile(w,hMax){
  const pts=[[0,0],[10+rnd(0,4),0]];
  let x=pts[1][0];
  const n=2+Math.min(3,Math.ceil(w/2));
  for(let i=0;i<n;i++){
    x+=rnd(8,14);pts.push([x,rnd(2,hMax)]);
    x+=rnd(8,14);pts.push([x,i===n-1?0:rnd(-3,1.5)]);
  }
  x+=22;pts.push([x,0]);
  return pts;
}
function maxCrest(pts){let m=0;for(const p of pts)m=Math.max(m,p[1]);return m;}
function endless1(w){
  const pts=genProfile(w,4+Math.min(6,w));
  const need=CART_M*G*maxCrest(pts);
  const L=pts[pts.length-1][0];
  return {name:pick(MINES)+' · RUN '+w, springMax:Math.round(need*rnd(1.18,1.4)), budget:0, battery0:0,
    pts, rough:[], dock:[L-12,L-6],
    tip:'Unmapped seam. The ledger still balances.'};
}
function endless2(w){
  const pts=genProfile(w,4+Math.min(5,w));
  const L=pts[pts.length-1][0];
  const rough=[{x0:L*0.25,x1:L*0.25+rnd(8,12),mu:+rnd(0.07,0.14).toFixed(2)}];
  if(w>2)rough.push({x0:L*0.6,x1:L*0.6+rnd(6,10),mu:+rnd(0.07,0.12).toFixed(2)});
  const need=CART_M*G*maxCrest(pts);
  const tax=rough.reduce((s,r)=>s+r.mu*CART_M*G*(r.x1-r.x0),0);
  return {name:pick(MINES)+' · RUN '+w, springMax:Math.round(need*1.1), budget:Math.round(tax*rnd(1.3,1.6)), battery0:0,
    pts, rough, dock:[L-12,L-6],
    tip:'Rough seam ahead. Count the meters.'};
}
function endless3(w){
  const h0=8+Math.min(6,w);
  const pts=[[0,h0],[7,h0]];
  let x=7;
  const n=2+Math.min(3,Math.ceil(w/2));
  for(let i=0;i<n;i++){x+=rnd(10,14);pts.push([x,rnd(0,2)]);
    x+=rnd(10,14);pts.push([x,rnd(3,h0*0.7)]);}
  x+=rnd(10,14);pts.push([x,0]);x+=20;pts.push([x,0]);
  const L=x;
  return {name:pick(MINES)+' · RUN '+w, springMax:0, budget:0, battery0:0,
    pts, rough:w>2?[{x0:L*0.4,x1:L*0.4+8,mu:0.07}]:[], dock:[L-12,L-6],
    tip:'Gravity pays out below. Bank it.'};
}
const ACT_LEVELS={1:ACT1,2:ACT2,3:ACT3};
const ENDLESS={1:endless1,2:endless2,3:endless3};

/* ================================================== track (smooth cosine hills) */
let TRK={pts:[],L:0,ymin:0,crests:[]};
function buildTrack(){
  TRK.pts=lv.pts;TRK.L=lv.pts[lv.pts.length-1][0];
  TRK.ymin=Math.min(...lv.pts.map(p=>p[1]));
  TRK.crests=[];
  for(let i=1;i<lv.pts.length-1;i++)
    if(lv.pts[i][1]>lv.pts[i-1][1]&&lv.pts[i][1]>=lv.pts[i+1][1])
      TRK.crests.push({x:lv.pts[i][0],y:lv.pts[i][1]});
}
function segIdx(x){const p=TRK.pts;
  for(let i=0;i<p.length-1;i++)if(x<=p[i+1][0])return i;
  return p.length-2;}
function yAt(x){x=clamp(x,0,TRK.L);
  const i=segIdx(x),x0=TRK.pts[i][0],y0=TRK.pts[i][1],x1=TRK.pts[i+1][0],y1=TRK.pts[i+1][1];
  const t=(x-x0)/(x1-x0);
  return y0+(y1-y0)*(1-Math.cos(Math.PI*t))/2;}
function slopeAt(x){x=clamp(x,0,TRK.L);
  const i=segIdx(x),x0=TRK.pts[i][0],y0=TRK.pts[i][1],x1=TRK.pts[i+1][0],y1=TRK.pts[i+1][1];
  const t=(x-x0)/(x1-x0);
  return (y1-y0)*Math.PI*Math.sin(Math.PI*t)/(2*(x1-x0));}
function muAt(x){for(const r of lv.rough)if(x>=r.x0&&x<=r.x1)return r.mu;return 0;}

/* ================================================== state */
let act=1, state='title', lv=null, levelIdx=0, wave=0, lives=3, score=0, streak=0;
let cart={x:2,v:0}, spring=0, budget=0, battery=0, heat=0, E0=1;
let charging=false, braking=false, boosting=false;
let t=0, acc=0, attemptT=0, settleT=0, samples=[], lastSamp=-1;
let particles=[], popups=[], shake=0, flash=0;
let landedOK=false, downTimer=0, lastResult=null, primary=null;
function ke(){return 0.5*CART_M*cart.v*cart.v;}
function pe(){return CART_M*G*(yAt(cart.x)-TRK.ymin);}
function mech(){return ke()+pe()+spring+budget+battery;}
function bumpHi(){if(score>HIS[act]){HIS[act]=score;saveHi();}}
function popup(text,col,size){popups.push({text,col:col||'#fbbf24',size:size||24,t:0,jx:rnd(-12,12)});}
function burst(wx,wy,n,cols,sp){for(let i=0;i<n;i++){const a=rnd(0,6.28),s2=rnd(.3,sp||3);
  particles.push({x:wx,y:wy,vx:Math.cos(a)*s2,vy:Math.abs(Math.sin(a))*s2,
    life:rnd(.3,.9),col:pick(cols),size:rnd(1.5,3.5)});}}

/* ================================================== flow */
function startAct(a){
  audio();
  const begin=()=>{act=a;score=0;streak=0;lives=3;levelIdx=0;wave=0;
    ARCADE.emit('arcade:start',{act:a});
    showMission(ACT_LEVELS[a][0]);};
  if(ARCADE.playId||!ARCADE.embedded){begin();return;}
  overlay(`<div class="card" style="text-align:center">
    <div class="tag">INSERT COIN</div>
    <h2>CONTACTING CABINET…</h2>
    <div class="sub">one credit = play until GAME OVER</div></div>`);
  primary=null;
  ARCADE.requestCoin(res=>{
    if(res.ok){begin();return;}
    overlay(`<div class="card">
      <h2 class="bad">COIN REJECTED</h2>
      <div class="sub">Not enough XP for a ranked run. Vocabulary games and lessons are the earners — the arcade only spends.</div>
      <button class="btn alt" onclick="select_()">BACK TO THE TIPPLE</button></div>`);
    primary=select_;
  });
}
function showMission(level){
  lv=level;state='mission';buildTrack();
  const crest=TRK.crests.length?Math.max(...TRK.crests.map(c=>c.y)):0;
  let params=`cart <b>${CART_M} kg</b> · tallest crest <b>${fmt(crest)} m</b> (${fmtE(CART_M*G*(crest-TRK.ymin))} from the low point)`;
  if(lv.springMax>0)params+=` · spring up to <b>${fmtE(lv.springMax)}</b>`;
  if(lv.budget>0)params+=` · work budget <b>${fmtE(lv.budget)}</b>`;
  if(act===3)params+=` · regen banks <b>${Math.round(REGEN_EFF*100)}%</b>`;
  if(lv.rough.length)params+=` · <b style="color:var(--red)">${lv.rough.length} rough stretch${lv.rough.length>1?'es':''}</b>`;
  let controls=lv.springMax>0
    ?`Hold <span class="kbd">SPACE</span> to charge the spring, release to LAUNCH. Then <span class="kbd">←</span>/<span class="kbd">SPACE</span> brake`
    :`You start at altitude — you ARE the energy. <span class="kbd">←</span>/<span class="kbd">SPACE</span> ${act===3?'regen-brake (banks the battery)':'brake'}`;
  if(act===2)controls+=' · <span class="kbd">→</span> booster (spends the budget)';
  if(act===3)controls+=' · <span class="kbd">→</span> boost (spends the battery)';
  controls+='. Stop INSIDE the dock.';
  overlay(`
   <div class="card">
     <div class="planetchip" style="border-color:${ACT_META[act].col}55;color:${ACT_META[act].col}">ACT ${'I'.repeat(act)} · ${ACT_META[act].name}</div>
     <h2 style="font-size:28px;margin:8px 0 2px">${lv.name}</h2>
     <div class="sub">${params}</div>
     <div class="explain" style="display:block">${lv.tip}</div>
     <div class="sub" style="margin-top:12px">${controls}</div>
     <button class="btn" onclick="launch()">▶ ${lv.springMax>0?'TO THE SPRING':'RELEASE THE CART'}</button>
   </div>`);
  primary=launch;
}
function launch(){
  t=0;acc=0;attemptT=0;settleT=0;samples=[];lastSamp=-1;
  particles=[];popups=[];shake=0;flash=0;
  cart={x:2,v:lv.springMax>0?0:2.4}; // springless carts get a release-push off the ledge
  spring=0;budget=lv.budget;battery=lv.battery0;heat=0;
  charging=false;braking=false;boosting=false;
  E0=Math.max(1,lv.springMax+lv.budget+lv.battery0
    +CART_M*G*(yAt(2)-TRK.ymin)+0.5*CART_M*cart.v*cart.v); // push KE counted — ledger stays exact
  hideOverlay();
  state=lv.springMax>0?'charge':'play';
  beep(440,.08,'square',.1);beep(660,.08,'square',.1);
}
function launchGo(){ // spring → KE, exactly
  if(state!=='charge')return;
  cart.v=Math.sqrt(2*spring/CART_M);
  spring=0;state='play';
  beep(220,.18,'square',.16,300);shake=.3;
  popup('LAUNCH!','#34d399',26);
  burst(cart.x,yAt(cart.x)+1,14,['#c084fc','#34d399'],4);
}
function succeed(){
  state='down';landedOK=true;downTimer=0;streak++;flash=.5;setRoll(0);
  const d0=lv.dock[0],d1=lv.dock[1],center=(d0+d1)/2,hw=(d1-d0)/2;
  const err=Math.abs(cart.x-center)/hw;
  const tier=err<=0.25?'BULLSEYE':err<=0.6?'GREAT':'CLEAN';
  let base=tier==='BULLSEYE'?1400:tier==='GREAT'?950:650;
  let bonus=0,btxt='';
  if(act===1){const b=Math.round(Math.max(0,1-heat/E0)*300);
    if(b>50){bonus=b;btxt='COOL RUNNING +'+b;}}
  if(act===2){const b=Math.round(budget*0.1);
    if(b>0){bonus=b;btxt='BUDGET BANKED +'+b;}}
  if(act===3){const b=Math.round(battery*0.08);
    if(b>0){bonus=b;btxt='CHARGE TO SPARE +'+b;}}
  const mult=Math.min(3,streak);
  const pts=Math.round((base+bonus)*mult);
  lastResult={tier,pts,mult,btxt,
    heatF:heat/E0,stop:cart.x};
  score+=pts;bumpHi();
  popup(tier+'!','#34d399',38);
  if(btxt)setTimeout(()=>popup(btxt,'#fbbf24',20),350);
  chord(tier==='BULLSEYE'?[659,830,988,1318]:[523,659,784,1046]);
  burst(cart.x,yAt(cart.x)+1.5,40,['#34d399','#fbbf24','#c084fc'],4);
}
function failAttempt(msg,hint){
  state='down';landedOK=false;downTimer=0;streak=0;lives--;shake=1;flash=1;setRoll(0);
  boom();
  lastResult={failMsg:msg,hint};
  popup(msg,'#f87171',28);
  burst(cart.x,yAt(cart.x)+1,50,['#f87171','#fbbf24','#fb923c','#fff'],5);
}
function showResult(){
  const r=lastResult;
  if(landedOK){
    overlay(`
     <div class="card">
       <h2 class="good">${r.tier} — ${lv.name}</h2>
       <div class="stat"><span>Docked at</span><b>${fmt(r.stop)} m</b></div>

       <div class="bigscore">+${r.pts.toLocaleString()}</div>

    if(lives<=0){gameOver();return;}

       <h2 class="bad">${r.failMsg}</h2>
       <div class="sub">${r.hint||''}</div>
       <div class="stat"><span>Carts left</span><b>${'▣ '.repeat(lives)}</b></div>
       <button class="btn" onclick="retry()">ANOTHER CART</button>

function retry(){showMission(lv);}
function nextLevel(){
  levelIdx++;
  const L=ACT_LEVELS[act];
  if(wave===0&&levelIdx<L.length)showMission(L[levelIdx]);
  else if(wave===0)actCleared();
  else {wave++;showMission(ENDLESS[act](wave));}
}
function actCleared(){
  let unlockMsg='';
  if(act===1&&!PROG.a2){PROG.a2=true;saveProg();unlockMsg='<b style="color:#fbbf24">ACT II — ROUGH ROAD unlocked.</b> The rail gets a toll booth.';}
  else if(act===2&&!PROG.a3){PROG.a3=true;saveProg();unlockMsg='<b style="color:#c084fc">ACT III — THE GENERATOR unlocked.</b> Your brake learns a better trick.';}
  else if(act===3)unlockMsg='<b style="color:#34d399">You completed the energy campaign.</b> Every joule, accounted for.';
  ARCADE.emit('arcade:actCleared',{act,score});
  ARCADE.reportScore(false);
  chord([523,659,784,1046,1318],.11);
  overlay(`

/* ================================================== questions */
function qNum(text,ans,unit,distractors,explain){
  const vals=[+fmt(ans)];
  for(const d of distractors){let v=+fmt(d);
    while(vals.some(x=>Math.abs(x-v)<0.05))v=+fmt(v+rnd(0.8,2.2));
    vals.push(v);}
  const choices=shuffle(vals.map((v,i)=>({s:fmt(v)+' '+unit,ok:i===0?1:0})));
  return {text,choices,explain};
}
function qCon(text,right,wrongs,explain){
  return {text,choices:shuffle([{s:right,ok:1}].concat(wrongs.map(s=>({s,ok:0})))),explain};
}
function makeQuestion(){
  const bank1=[
   ()=>{const m=pick([2,4,80]),v=pick([3,5,10]);
     return qNum(`A ${m} kg cart rolls at ${v} m/s. What is its kinetic energy?`,
       0.5*m*v*v,'J',[m*v,m*v*v,0.5*m*v],
       `KE = ½mv² = ½ · ${m} · ${v}² = ${fmt(0.5*m*v*v)} J. Note the square — speed counts twice.`);},
   ()=>{const m=pick([2,10,80]),h=pick([3,5,8]);
     return qNum(`A ${m} kg cart sits ${h} m above the valley floor. Its gravitational PE (relative to the floor)?`,
       m*G*h,'J',[m*h,m*G,m*G*h/2],
       `PE = mgh = ${m} · 9.8 · ${h} = ${fmt(m*G*h)} J — exactly the height tick you saw on the stack.`);},
   ()=>{const h=pick([5,8,11]);
     return qNum(`A cart rolls from rest down a frictionless ${h} m drop. Speed at the bottom?`,
       Math.sqrt(2*G*h),'m/s',[G*h,Math.sqrt(G*h),2*G*h/10],
       `mgh = ½mv² → v = √(2gh) = √(2 · 9.8 · ${h}) = ${fmt(Math.sqrt(2*G*h))} m/s. The mass cancels — every cart, same speed.`);},
   ()=>qCon('Your cart doubles its speed. Its kinetic energy…',
     'quadruples — KE goes as v²',['doubles','triples','stays the same if mass is constant'],
     'KE = ½mv²: double v, and v² is ×4. This is why braking from high speed makes so much more heat than from low speed.'),
   ()=>qCon('A loaded cart and an empty cart roll from rest down the same frictionless hill. At the bottom…',
     'they move at the SAME speed',['the heavy one is faster','the light one is faster','the heavy one never reaches the bottom'],
     'mgh = ½mv² and the m cancels: v = √(2gh) for everyone. Mass buys you more ENERGY, not more speed.'),
   ()=>qCon('You hold the brake and the cart slows. Where did its kinetic energy GO?',
     'into heat at the brake — still energy, just spread out',['it was destroyed','back into the spring','into the cart’s mass'],
     'Energy is never destroyed — the gray band on your stack grew by exactly what KE lost. Heat is energy’s retirement, not its grave.'),
  ];
  const bank2=[
   ()=>{const F=pick([200,400]),d=pick([5,8,12]);
     return qNum(`Your booster pushes with ${F} N over ${d} m of track. How much work does it do on the cart?`,
       F*d,'J',[F+d,F/d,F*d/2],
       `W = F·d = ${F} · ${d} = ${F*d} J — exactly what ticked off your budget while you held the button.`);},
   ()=>{const mu=pick([0.1,0.12,0.15]),d=pick([10,15,18]);
     return qNum(`An ${CART_M} kg cart crosses a ${d} m rough stretch (μ = ${mu}, flat). How much energy does friction take?`,
       mu*CART_M*G*d,'J',[mu*CART_M*G,mu*d*100,mu*CART_M*G*d/2],
       `Heat = μmg·d = ${mu} · ${CART_M} · 9.8 · ${d} = ${fmt(mu*CART_M*G*d)} J. Distance is the only variable you control.`);},
   ()=>qCon('To pay LESS to a rough stretch of flat rail, you should cross it…',
     'you can’t pay less — the toll is μmg·d, fixed by distance',['as fast as possible','as slowly as possible','while braking'],
     'Friction’s bill is force × distance, and neither depends on speed. Hurrying changes how LONG you pay, not how MUCH. The only escape is a shorter path — or smoother rail.'),
   ()=>qCon('Lifting a cart 5 m straight up versus pushing it 5 m higher along a long frictionless ramp. The WORK against gravity is…',
     'identical — mgh either way',['less on the ramp','more on the ramp','zero on the ramp'],
     'Gravity only bills the height change: W = mgh. The ramp trades a smaller force for a longer distance — same product. (Friction, of course, bills the ramp extra.)'),
   ()=>{const Wk=pick([1200,2400]),tt=pick([4,6]);
     return qNum(`Your booster delivers ${Wk} J of work in ${tt} s. Average power?`,
       Wk/tt,'W',[Wk*tt,Wk,Wk/tt/2],
       `P = W/t = ${Wk}/${tt} = ${fmt(Wk/tt)} W. Power is the RATE of spending energy — same joules, faster meter.`);},
  ];
  const bank3=[
   ()=>{const h=pick([6,8,10]);
     const banked=CART_M*G*h*REGEN_EFF;
     return qNum(`Your ${CART_M} kg cart regen-brakes down a full ${h} m descent at 75% efficiency. How much lands in the battery?`,
       banked,'J',[CART_M*G*h,banked/2,CART_M*G*h*0.25],
       `Available: mgh = ${fmt(CART_M*G*h)} J. Banked: 75% of it = ${fmt(banked)} J. The missing quarter is in the gray band — every conversion pays the house.`);},
   ()=>qCon('Energy goes PE → battery (75%) → KE (100% here). What fraction of the original PE reaches KE?',
     '75% — each conversion multiplies, and only one taxed you',['100% — it balances out','56%','25%'],
     'Chained conversions MULTIPLY their efficiencies: 0.75 × 1.0 = 0.75. Add a second 75% step and you’d keep just 56%. Long energy chains leak at every link.'),
   ()=>qCon('After a whole run, your stack shows height + battery + heat exactly equal to what you started with. This is because…',
     'energy is conserved — it changes form, never amount',['the game rounds the numbers','heat doesn’t count as energy','the cart is special'],
     'That receipt is the first law of thermodynamics wearing a hard hat. No exceptions have ever been found. None.'),
   ()=>{const k=2000,x=pick([0.5,0.8,1.0]);
     return qNum(`The launch spring (k = ${k} N/m) is compressed ${fmt(x)} m. How much energy is stored?`,
       0.5*k*x*x,'J',[k*x,0.5*k*x,k*x*x],
       `E = ½kx² = ½ · ${k} · ${fmt(x)}² = ${fmt(0.5*k*x*x)} J. Compression counts twice — just like speed does in KE.`);},
   ()=>qCon('You double the spring compression. The stored energy…',
     'quadruples — ½kx² goes as x²',['doubles','halves','stays the same'],
     'Same square law as kinetic energy: the second centimeter of compression stores more than the first, because you’re pushing against a harder spring the whole way.'),
  ];
  /* CROSSOVER bank — bridges back to IMPACT, PUSH, and DESCENT. The first
     one is the payoff the whole arcade was building to. +1000 each. */
  const cross=[
   ()=>qCon('CROSSOVER · IMPACT — In the momentum cabinet, two equal rail cars coupled and rolled off at HALF the speed. Momentum survived perfectly. How much of the kinetic energy survived?',
     'half — the other half became heat and bent metal in the crash',['all of it — energy is always conserved as KE','none; coupling destroys energy','double; the cars share it'],
     'KE before: ½mv². After: ½(2m)(v/2)² = ¼mv² — exactly half. If you ever wondered where IMPACT’s missing speed went: it has been sitting in CASCADE’s gray heat band all along. Momentum is conserved in EVERY collision; kinetic energy only in the perfectly bouncy ones.'),
   ()=>{const f=pick([47,59,71]),d=pick([8,12,15]);
     return qNum(`CROSSOVER · PUSH — In the dynamics cabinet, friction pulled ${f} N backward on your sliding crate. After ${d} m of sliding, how much energy became heat?`,
       f*d,'J',[f/d,f,f*d/2],
       `Heat = F·d = ${f} × ${d} = ${f*d} J. PUSH measured friction as a force; CASCADE bills it as energy. Same villain, two ledgers — and the FBD arrow you watched there is the gray band you watch here.`);},
   ()=>qCon('CROSSOVER · DESCENT — The kinematics cabinet taught v² = 2gΔy for a falling ship. CASCADE teaches mgh = ½mv². Solve the second for v and you get…',
     'v = √(2gh) — they are one equation in two costumes',['something completely different','v = gh','v = 2gh'],
     'Divide out the m, multiply by 2, take the root: ½mv² = mgh becomes v² = 2gh. DESCENT derived it from motion; CASCADE derives it from bookkeeping. Physics keeps arriving at the same place by different roads — that is how you know the roads are real.'),
  ];
  if(Math.random()<0.35)return Object.assign(pick(cross)(),{cross:true});
  const bank=act===1?bank1:act===2?bank2:bank3;
  return pick(bank)();
}
let curQ=null;
function askQuestion(){
  state='question';curQ=makeQuestion();
  overlay(`
   <div class="card">
     <div class="tag" style="${curQ.cross?'color:#facc15;border:1px solid #facc1555;border-radius:99px;padding:3px 10px':''}">${curQ.cross?'★ CROSSOVER BONUS · +1000':'PHYSICS BONUS · +750'}</div>
     <div style="font-size:16px;line-height:1.5">${curQ.text}</div>
     <div class="choices">${curQ.choices.map((c,i)=>
       `<button class="choice" id="ch${i}" onclick="answer(${i})">${'ABCD'[i]}&nbsp;·&nbsp;${c.s}</button>`).join('')}</div>
     <div class="explain" id="explain">${curQ.explain}</div>
     <button class="btn" id="contBtn" style="display:none" onclick="nextLevel()">CONTINUE →</button>
   </div>`);
  primary=null;
}
function answer(i){
  if(primary)return;
  const right=curQ.choices.findIndex(c=>c.ok);
  curQ.choices.forEach((c,j)=>{const el=$('#ch'+j);el.disabled=true;
    if(j===right)el.classList.add('right');else if(j===i)el.classList.add('wrong');});
  $('#explain').style.display='block';
  $('#contBtn').style.display='inline-block';
  if(i===right){score+=curQ.cross?1000:750;bumpHi();chord([784,988,1175]);flash=.4;}
  else beep(180,.3,'sawtooth',.15,-100);
  primary=nextLevel;
}

/* ================================================== physics — exact ledger */
const DT=1/120;
function step(dt){
  const sl=slopeAt(cart.x), cs=1/Math.sqrt(1+sl*sl), sn=sl*cs;
  const sp=Math.abs(cart.v);
  let a=-G*sn;
  const mu=muAt(cart.x);
  if(mu>0&&sp>0.01){
    a+=-Math.sign(cart.v)*mu*G*cs;
    heat+=mu*CART_M*G*cs*sp*dt;
    if(Math.random()<sp*0.05)particles.push({x:cart.x+rnd(-.5,.5),y:yAt(cart.x)+0.1,
      vx:-Math.sign(cart.v)*rnd(.5,2),vy:rnd(.5,2),life:rnd(.2,.5),col:'#b08b4a',size:2});
  }
  if(braking&&sp>0.01){
    const dec=Math.min(BRK,sp/dt);
    a+=-Math.sign(cart.v)*dec;
    const dE=CART_M*dec*sp*dt;
    if(act===3){battery+=dE*REGEN_EFF;heat+=dE*(1-REGEN_EFF);}
    else heat+=dE;
    if(Math.random()<.5)particles.push({x:cart.x-Math.sign(cart.v)*0.8,y:yAt(cart.x)+0.15,
      vx:-Math.sign(cart.v)*rnd(1,3),vy:rnd(.5,2.5),life:rnd(.15,.4),
      col:act===3?'#c084fc':'#fbbf24',size:2});
  }
  if(boosting&&act>=2&&cart.v>=0){
    const drain=CART_M*BST*Math.max(sp,1)*dt;
    const pool=act===3?battery:budget;
    if(pool>=drain){
      a+=BST;
      const work=CART_M*BST*sp*dt;
      heat+=drain-work; // idle burn while crawling — the ledger stays exact
      if(act===3)battery-=drain;else budget-=drain;
      if(Math.random()<.5)particles.push({x:cart.x-0.9,y:yAt(cart.x)+0.4,
        vx:-rnd(1,3),vy:rnd(-.5,1),life:rnd(.15,.4),col:'#fb923c',size:2});
    }
  }
  cart.v+=a*dt;
  cart.x+=cart.v*cs*dt;
  // start bumper + end of line
  if(cart.x<0.6){cart.x=0.6;
    if(cart.v<0){heat+=0.5*CART_M*cart.v*cart.v*(1-0.09);cart.v=-cart.v*0.3;beep(120,.1,'square',.1);}}
  if(cart.x>TRK.L-0.5){
    if(Math.abs(cart.v)>4){failAttempt('END OF THE LINE',
      'Past the dock the rail just stops. KE = ½mv² has to go SOMEWHERE before the buffers — and the brake is politer than the wall.');return;}
    cart.x=TRK.L-0.5;
    heat+=0.5*CART_M*cart.v*cart.v*(1-0.09);cart.v=-cart.v*0.3;beep(120,.1,'square',.1);
  }
  t+=dt;attemptT+=dt;
  setRoll(sp);
  if(t-lastSamp>=1/30){
    samples.push({t,ke:ke(),pe:pe(),heat,store:spring+budget+battery});
    lastSamp=t;if(samples.length>6000)samples.shift();}
  // dock / stranded / timeout
  const inDock=cart.x>=lv.dock[0]&&cart.x<=lv.dock[1];
  if(sp<0.22){
    settleT+=dt;
    if(settleT>0.8){
      if(inDock){succeed();return;}
      const pool=act===3?battery:budget;
      const canBoost=act>=2&&pool>300;
      if(!canBoost&&settleT>1.8){
        failAttempt('STRANDED — ENERGY SPENT',
          act===1?'The cart stopped where your energy ran out. Next launch, check the stack against the tallest tick BEFORE you release — mgh does not negotiate.'
                 :'Out of budget, out of height, out of luck. Spend less on speed you’ll only brake away, and none at all on rough rail you could have coasted before.');
        return;}
    }
  }else settleT=0;
  if(attemptT>150){failAttempt('SHIFT EXPIRED','One hundred fifty seconds is a long time to be lost on a mountain.');return;}
}

/* ================================================== render */
const STARS=[];for(let i=0;i<90;i++)STARS.push({x:Math.random(),y:Math.random(),r:rnd(.4,1.4),tw:rnd(0,6.28)});
let VKX=1,VKY=1,VBY=0;
function sceneRect(){const pw=Math.min(420,W*0.36);return {w:W-pw,pw};}
function PX(x){return 30+x*VKX;}
function PY(y){return VBY-(y-TRK.ymin)*VKY;}
function render(){
  const {w:SW,pw}=sceneRect();
  const now=performance.now()/1000;
  const yTop=Math.max(...TRK.pts.map(p=>p[1]))+4;
  VKX=(SW-60)/TRK.L;
  VKY=Math.min(VKX*2.2,(H*0.62)/Math.max(6,yTop-TRK.ymin));
  VBY=H-100;
  ctx.clearRect(0,0,W,H);
  ctx.save();
  if(shake>0){ctx.translate(rnd(-1,1)*shake*12,rnd(-1,1)*shake*12);shake=Math.max(0,shake-0.02);}
  // dusk sky + stars + distant ridges
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#03100a');bg.addColorStop(.6,'#07221606');bg.addColorStop(1,'#0a1f14');
  ctx.fillStyle='#03100a';ctx.fillRect(-20,-20,SW+40,H+40);
  ctx.fillStyle=bg;ctx.fillRect(-20,-20,SW+40,H+40);
  for(const s of STARS){ctx.globalAlpha=(.3+.7*Math.abs(Math.sin(now+s.tw)))*.5;
    ctx.fillStyle='#cfe8ff';ctx.fillRect(s.x*SW,s.y*H*0.4,s.r,s.r);}
  ctx.globalAlpha=1;
  ctx.fillStyle='#07140d';
  ctx.beginPath();ctx.moveTo(0,H*0.5);
  for(let i=0;i<=8;i++)ctx.lineTo(SW*i/8,H*0.5-Math.abs(Math.sin(i*2.1))*H*0.13);
  ctx.lineTo(SW,H);ctx.lineTo(0,H);ctx.closePath();ctx.fill();
  // terrain under the track
  ctx.fillStyle='#0d2417';
  ctx.beginPath();ctx.moveTo(PX(0),PY(yAt(0)));
  for(let x=0;x<=TRK.L;x+=0.6)ctx.lineTo(PX(x),PY(yAt(x)));
  ctx.lineTo(PX(TRK.L),H+20);ctx.lineTo(PX(0),H+20);ctx.closePath();ctx.fill();
  // strata lines
  ctx.strokeStyle='#ffffff08';
  for(let i=1;i<5;i++){ctx.beginPath();
    for(let x=0;x<=TRK.L;x+=1.2){const py=PY(yAt(x))+i*22;
      x===0?ctx.moveTo(PX(x),py):ctx.lineTo(PX(x),py);}
    ctx.stroke();}
  // rough patches (under-rail hatch)
  for(const r of lv.rough){
    ctx.strokeStyle='#b08b4a';ctx.lineWidth=2;
    ctx.beginPath();
    for(let x=r.x0;x<=r.x1;x+=0.5)
      x===r.x0?ctx.moveTo(PX(x),PY(yAt(x))+3):ctx.lineTo(PX(x),PY(yAt(x))+3);
    ctx.stroke();
    ctx.lineWidth=1;ctx.strokeStyle='#b08b4a88';
    for(let x=r.x0;x<=r.x1;x+=1.1){
      ctx.beginPath();ctx.moveTo(PX(x),PY(yAt(x))+4);ctx.lineTo(PX(x)+5,PY(yAt(x))+9);ctx.stroke();}
    ctx.fillStyle='#b08b4a';ctx.font='9px "Share Tech Mono",monospace';ctx.textAlign='center';
    ctx.fillText('μ '+fmt(r.mu,2),PX((r.x0+r.x1)/2),PY(Math.max(yAt(r.x0),yAt(r.x1)))+22);
    ctx.textAlign='left';
  }
  // the rail
  ctx.strokeStyle='#6b7280';ctx.lineWidth=2.5;
  ctx.beginPath();
  for(let x=0;x<=TRK.L;x+=0.5)
    x===0?ctx.moveTo(PX(x),PY(yAt(x))):ctx.lineTo(PX(x),PY(yAt(x)));
  ctx.stroke();ctx.lineWidth=1;
  // ties
  ctx.strokeStyle='#3f3f46';
  for(let x=1;x<TRK.L;x+=2){
    ctx.beginPath();ctx.moveTo(PX(x),PY(yAt(x))+1);ctx.lineTo(PX(x),PY(yAt(x))+5);ctx.stroke();}
  // crest flags + height labels
  ctx.font='9px "Share Tech Mono",monospace';
  for(const c of TRK.crests){
    ctx.strokeStyle='#ffffff33';
    ctx.beginPath();ctx.moveTo(PX(c.x),PY(c.y)-2);ctx.lineTo(PX(c.x),PY(c.y)-16);ctx.stroke();
    ctx.fillStyle='#34d399';
    ctx.beginPath();ctx.moveTo(PX(c.x),PY(c.y)-16);ctx.lineTo(PX(c.x)+9,PY(c.y)-13);ctx.lineTo(PX(c.x),PY(c.y)-10);ctx.closePath();ctx.fill();
    ctx.fillStyle='#8b96ad';ctx.textAlign='center';
    ctx.fillText(fmt(c.y)+' m',PX(c.x),PY(c.y)-20);ctx.textAlign='left';
  }
  // dock
  {const d0=lv.dock[0],d1=lv.dock[1],mid=(d0+d1)/2;
   const glow=.5+.5*Math.sin(now*4);
   const gd=ctx.createLinearGradient(0,PY(yAt(mid))-70,0,PY(yAt(mid)));
   gd.addColorStop(0,`rgba(52,211,153,${.14+.08*glow})`);gd.addColorStop(1,'rgba(52,211,153,0.02)');
   ctx.fillStyle=gd;
   ctx.beginPath();ctx.moveTo(PX(mid)-8,PY(yAt(mid))-70);ctx.lineTo(PX(mid)+8,PY(yAt(mid))-70);
   ctx.lineTo(PX(d1),PY(yAt(d1)));ctx.lineTo(PX(d0),PY(yAt(d0)));ctx.closePath();ctx.fill();
   ctx.strokeStyle=`rgba(52,211,153,${.45+.4*glow})`;ctx.lineWidth=6;
   ctx.beginPath();
   for(let x=d0;x<=d1;x+=0.4)x===d0?ctx.moveTo(PX(x),PY(yAt(x))+5):ctx.lineTo(PX(x),PY(yAt(x))+5);
   ctx.stroke();ctx.lineWidth=1;
   ctx.fillStyle='#34d399';ctx.font='9px "Share Tech Mono",monospace';ctx.textAlign='center';
   ctx.fillText('▼ DOCK — stop inside',PX(mid),PY(yAt(mid))-74);ctx.textAlign='left';}
  // end buffers
  {const p=PY(yAt(TRK.L));
   ctx.fillStyle='#272c33';ctx.fillRect(PX(TRK.L)-2,p-26,8,28);
   ctx.fillStyle='#fbbf24';
   for(let i=0;i<3;i++)ctx.fillRect(PX(TRK.L)-2,p-26+i*10,8,4);}
  // ENERGY HORIZON — the height you can still reach (coasting)
  if(state==='charge'||state==='play'||state==='paused'||state==='down'){
    const hReach=TRK.ymin+(ke()+pe()+spring)/(CART_M*G);
    const py=PY(Math.min(hReach,yTop));
    ctx.strokeStyle='#34d399aa';ctx.setLineDash([7,6]);
    ctx.beginPath();ctx.moveTo(PX(0),py);ctx.lineTo(PX(TRK.L),py);ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle='#34d399cc';ctx.font='9px "Share Tech Mono",monospace';
    ctx.fillText('energy horizon — '+fmt(hReach-TRK.ymin)+' m',PX(0)+4,py-5);
  }
  // launch spring
  if(lv.springMax>0&&(state==='charge'||state==='mission')){
    const frac=spring/lv.springMax;
    const sx=PX(0.4),sy=PY(yAt(0.6));
    const coils=6,len=26*(1-frac*0.6);
    ctx.strokeStyle='#c084fc';ctx.lineWidth=2.5;
    ctx.beginPath();ctx.moveTo(sx-14,sy-4);
    for(let i=0;i<=coils;i++)
      ctx.lineTo(sx-14+(i/coils)*len,sy-4+((i%2)?-6:6));
    ctx.stroke();ctx.lineWidth=1;
  }
  drawCart(now);
  // particles (world coords, y up)
  for(let i=particles.length-1;i>=0;i--){const p=particles[i];
    p.life-=1/60;if(p.life<=0){particles.splice(i,1);continue;}
    p.x+=p.vx/60;p.y+=p.vy/60;p.vy-=5/60;
    ctx.globalAlpha=clamp(p.life,0,1);ctx.fillStyle=p.col;
    ctx.fillRect(PX(p.x),PY(p.y),p.size,p.size);}
  ctx.globalAlpha=1;
  // popups
  for(let i=popups.length-1;i>=0;i--){const p=popups[i];
    p.t+=1/60;if(p.t>1.3){popups.splice(i,1);continue;}
    ctx.globalAlpha=clamp(1.4-p.t,0,1);
    ctx.fillStyle=p.col;ctx.font=`900 ${p.size}px Orbitron,monospace`;ctx.textAlign='center';
    ctx.fillText(p.text,clamp(PX(cart.x),80,SW-80)+p.jx,PY(yAt(cart.x))-46-p.t*40);}
  ctx.globalAlpha=1;ctx.textAlign='left';
  drawHUD(SW);
  if(state==='paused'){ctx.fillStyle='#000a';ctx.fillRect(0,0,SW,H);
    ctx.fillStyle='#34d399';ctx.font='900 30px Orbitron,monospace';ctx.textAlign='center';
    ctx.fillText('PAUSED',SW/2,H/2);ctx.textAlign='left';}
  ctx.restore();
  if(flash>0){ctx.fillStyle=landedOK?'#34d399':'#f87171';
    ctx.globalAlpha=flash*.35;ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;
    flash=Math.max(0,flash-0.03);}
  drawPanel(SW,pw);
}
function drawCart(now){
  const x=cart.x,y=yAt(x),sl=slopeAt(x),th=Math.atan(sl);
  const px=PX(x),py=PY(y);
  ctx.save();ctx.translate(px,py);ctx.rotate(-th);
  // wheels
  const wa=x*2.2;
  for(const wx of[-9,9]){
    ctx.fillStyle='#1c1917';ctx.beginPath();ctx.arc(wx,-4,5,0,7);ctx.fill();
    ctx.strokeStyle='#6b7280';
    ctx.beginPath();ctx.moveTo(wx-4*Math.cos(wa),-4-4*Math.sin(wa));
    ctx.lineTo(wx+4*Math.cos(wa),-4+4*Math.sin(wa));ctx.stroke();}
  // body (trapezoid hopper)
  ctx.fillStyle='#7f1d1d';ctx.strokeStyle='#0b0407';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(-14,-8);ctx.lineTo(14,-8);ctx.lineTo(10,-22);ctx.lineTo(-10,-22);
  ctx.closePath();ctx.fill();ctx.stroke();
  ctx.strokeStyle='#00000044';
  ctx.beginPath();ctx.moveTo(-12,-13);ctx.lineTo(12,-13);ctx.stroke();
  // ore
  ctx.fillStyle='#fbbf24';
  for(const[ox,oy,or]of[[-5,-23,3],[1,-25,3.5],[6,-22,2.5]]){
    ctx.beginPath();ctx.arc(ox,oy,or,0,7);ctx.fill();}
  // brake pads / boost flame / regen glow
  if(braking&&state==='play'){
    ctx.fillStyle=act===3?'#c084fc':'#fbbf24';
    ctx.fillRect(-16,-7,3,6);ctx.fillRect(13,-7,3,6);
    if(act===3){ctx.globalAlpha=.4+.3*Math.sin(now*14);
      ctx.strokeStyle='#c084fc';ctx.beginPath();ctx.arc(0,-14,17,0,7);ctx.stroke();ctx.globalAlpha=1;}}
  if(boosting&&state==='play'&&act>=2){
    ctx.fillStyle='#fb923c';
    ctx.beginPath();ctx.moveTo(-14,-10);ctx.lineTo(-14-rnd(8,16),-13);ctx.lineTo(-14,-16);
    ctx.closePath();ctx.fill();}
  ctx.restore();ctx.lineWidth=1;
}
function drawHUD(SW){
  if(!(state==='charge'||state==='play'||state==='paused'||state==='down'))return;
  ctx.fillStyle='#0008';ctx.fillRect(8,8,224,act===1?48:66);
  ctx.font='12px "Share Tech Mono",monospace';
  ctx.fillStyle='#8b96ad';ctx.fillText('SPEED',16,26);
  ctx.fillStyle='#fbbf24';ctx.font='700 15px Orbitron,monospace';
  ctx.fillText(fmt(Math.abs(cart.v))+' m/s',70,27);
  ctx.font='11px "Share Tech Mono",monospace';
  if(state==='charge'){
    ctx.fillStyle='#c084fc';
    ctx.fillText('SPRING '+fmtE(spring)+' / '+fmtE(lv.springMax)+'  — release to launch',16,44);
  }else{
    ctx.fillStyle='#8b96ad';ctx.fillText('HEAT '+fmtE(heat),16,44);
  }
  if(act>=2&&state!=='charge'){
    const pool=act===3?battery:budget;
    const cap=act===3?Math.max(battery,2000,lv.battery0+4000):lv.budget;
    ctx.fillStyle='#8b96ad';ctx.fillText(act===3?'BATT':'BUDGET',16,62);
    ctx.fillStyle='#1f2937';ctx.fillRect(70,53,120,11);
    ctx.fillStyle=act===3?'#34d399':'#fbbf24';
    ctx.fillRect(70,53,120*clamp(pool/Math.max(1,cap),0,1),11);
    ctx.fillStyle='#fff';ctx.font='10px "Share Tech Mono",monospace';
    ctx.fillText(fmtE(pool),196,62);
  }
  // top bar
  ctx.textAlign='right';
  ctx.fillStyle='#0008';ctx.fillRect(SW-238,8,230,52);
  ctx.fillStyle='#fbbf24';ctx.font='700 16px Orbitron,monospace';
  ctx.fillText(score.toLocaleString(),SW-16,28);
  ctx.font='11px "Share Tech Mono",monospace';ctx.fillStyle='#8b96ad';
  ctx.fillText((ARCADE.embedded?(ARCADE.playId?'★RANKED  ':'PRACTICE  '):'')+
    '▣'.repeat(Math.max(0,lives))+'  COMBO ×'+Math.min(3,Math.max(1,streak+1)),SW-16,48);
  ctx.textAlign='left';
}
/* ================================================== the energy ledger panel */
function drawPanel(SW,pw){
  ctx.fillStyle='#06120b';ctx.fillRect(SW,0,pw,H);
  ctx.strokeStyle='#34d39933';ctx.beginPath();ctx.moveTo(SW+.5,0);ctx.lineTo(SW+.5,H);ctx.stroke();
  ctx.fillStyle='#34d399';ctx.font='700 13px Orbitron,monospace';
  ctx.fillText('ENERGY LEDGER',SW+18,28);
  ctx.fillStyle='#8b96ad';ctx.font='11px "Share Tech Mono",monospace';
  ctx.fillText(lv?lv.name:'',SW+158,28);
  const m=18,gx=SW+m,gw=pw-2*m,top=44,gap=14;
  const ch2=H-top-2*gap-14;
  drawStack(gx,top,gw,ch2*0.52);
  drawEGraph(gx,top+ch2*0.52+gap,gw,ch2*0.48);
}
function drawStack(gx,gy,gw,gh){
  ctx.fillStyle='#0a1a11';ctx.fillRect(gx,gy,gw,gh);
  ctx.strokeStyle='#ffffff14';ctx.strokeRect(gx+.5,gy+.5,gw-1,gh-1);
  ctx.fillStyle='#8b96ad';ctx.font='10px "Share Tech Mono",monospace';
  ctx.fillText('THE STACK — total never moves; heat only climbs',gx+8,gy+14);
  const bx=gx+gw*0.18,bw=gw*0.3,by1=gy+gh-12,bh=gh-36;
  const segs=[
    {v:pe(),col:'#60a5fa',label:'PE'},
    {v:ke(),col:'#fb923c',label:'KE'},
    {v:spring,col:'#c084fc',label:'SPR'},
    {v:battery,col:'#34d399',label:'BAT'},
    {v:budget,col:'#fbbf24',label:'BUD'},
    {v:heat,col:'#6b7280',label:'HEAT'},
  ];
  let acc2=0;
  ctx.font='9px "Share Tech Mono",monospace';
  for(const s of segs){
    if(s.v<E0*0.004){acc2+=s.v;continue;}
    const h0=(acc2/E0)*bh,h1=((acc2+s.v)/E0)*bh;
    ctx.fillStyle=s.col;
    ctx.fillRect(bx,by1-h1,bw,h1-h0);
    if(h1-h0>11){ctx.fillStyle='#0b0407';ctx.textAlign='center';
      ctx.fillText(s.label,bx+bw/2,by1-h0-(h1-h0)/2+3);ctx.textAlign='left';}
    acc2+=s.v;
  }
  ctx.strokeStyle='#fff';ctx.lineWidth=1.5;
  ctx.strokeRect(bx,by1-bh,bw,bh);ctx.lineWidth=1;
  // crest ticks: the energy each hill demands
  ctx.textAlign='left';
  TRK.crests.forEach((c,i)=>{
    const eNeed=CART_M*G*(c.y-TRK.ymin);
    const ty=by1-(clamp(eNeed/E0,0,1))*bh;
    ctx.strokeStyle='#34d399aa';ctx.setLineDash([3,3]);
    ctx.beginPath();ctx.moveTo(bx+bw+2,ty);ctx.lineTo(bx+bw+26,ty);ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle='#34d399';
    ctx.fillText('H'+(i+1)+' '+fmt(c.y)+'m',bx+bw+30,ty+3);
  });
  // readouts
  ctx.fillStyle='#8b96ad';
  ctx.fillText('total '+fmtE(mech()+heat),gx+8,gy+gh-26);
  ctx.fillStyle='#6b7280';
  ctx.fillText('heat '+fmtE(heat)+'  ('+Math.round(100*heat/E0)+'%)',gx+8,gy+gh-12);
}
function drawEGraph(gx,gy,gw,gh){
  ctx.fillStyle='#0a1a11';ctx.fillRect(gx,gy,gw,gh);
  ctx.strokeStyle='#ffffff14';ctx.strokeRect(gx+.5,gy+.5,gw-1,gh-1);
  ctx.fillStyle='#8b96ad';ctx.font='10px "Share Tech Mono",monospace';
  ctx.fillText('E–t  · KE, PE, heat — and the flat white TOTAL',gx+8,gy+14);
  if(samples.length<2)return;
  const WIN=14,t1=Math.max(t,WIN),t0=t1-WIN;
  const vis=samples.filter(s=>s.t>=t0);
  if(vis.length<2)return;
  const series=[
    {color:'#60a5fa',get:s=>s.pe,w:2},
    {color:'#fb923c',get:s=>s.ke,w:2},
    {color:'#6b7280',get:s=>s.heat,w:2},
    {color:'#e7ecf5',get:s=>s.ke+s.pe+s.heat+s.store,w:3},
  ];
  const lo=0,hi2=E0*1.08;
  const X=tt=>gx+8+((tt-t0)/WIN)*(gw-16);
  const Y=v=>gy+gh-8-(clamp(v,0,hi2)/hi2)*(gh-28);
  for(const ser of series){
    ctx.strokeStyle=ser.color;ctx.lineWidth=ser.w;
    ctx.shadowColor=ser.color;ctx.shadowBlur=ser.w>2?7:3;
    ctx.beginPath();
    vis.forEach((s,i)=>{const px=X(s.t),py=Y(ser.get(s));
      i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);});
    ctx.stroke();ctx.shadowBlur=0;ctx.lineWidth=1;
  }
}

/* ================================================== loop + input */
let last=performance.now();
function frame(now){
  const el=Math.min(.05,(now-last)/1000);last=now;
  if(state==='charge'&&charging){
    spring=Math.min(lv.springMax,spring+CHARGE_RATE*el);
    if(spring>=lv.springMax&&Math.random()<.1)popup('FULL CHARGE','#c084fc',14);
  }
  if(state==='play'){
    acc+=el;
    while(acc>=DT&&state==='play'){step(DT);acc-=DT;}
  }
  if(state==='down'){downTimer+=el;
    if(downTimer>1.1&&!$('#overlay').classList.contains('show'))showResult();}
  render();
  requestAnimationFrame(frame);
}
window.addEventListener('keydown',e=>{
  if(['Space','ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.code))e.preventDefault();
  if(e.repeat)return;
  if(state==='charge'&&(e.code==='Space'||e.code==='ArrowUp'))charging=true;
  if(state==='play'){
    if(e.code==='Space'||e.code==='ArrowLeft')braking=true;
    if(e.code==='ArrowRight'&&act>=2)boosting=true;
  }
  if(e.code==='Enter'&&primary&&$('#overlay').classList.contains('show'))primary();
  if(e.code==='KeyP'&&(state==='play'||state==='paused')){
    state=state==='play'?'paused':'play';
    braking=boosting=false;setRoll(0);}
  if(e.code==='KeyM'){muted=!muted;setRoll(0);}
});
window.addEventListener('keyup',e=>{
  if(state==='charge'&&(e.code==='Space'||e.code==='ArrowUp')&&charging){
    charging=false;launchGo();return;}
  if(e.code==='Space'||e.code==='ArrowLeft')braking=false;
  if(e.code==='ArrowRight')boosting=false;
});
cv.addEventListener('pointerdown',e=>{audio();
  if(state==='charge'){charging=true;return;}
  if(state==='play'){
    const {w:SW}=sceneRect();
    if(act>=2&&e.clientX>SW/2&&e.clientX<SW)boosting=true;
    else braking=true;
  }
});
window.addEventListener('pointerup',()=>{
  if(state==='charge'&&charging){charging=false;launchGo();return;}
  braking=boosting=false;
});
window.addEventListener('blur',()=>{braking=boosting=false;charging=false;});
document.addEventListener('click',audio,{once:true});

/* ================================================== go */
title();
requestAnimationFrame(frame);
</script>
</body>
</html>
