<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>IMPACT // a momentum arcade</title>
<!--
  IMPACT v2 — a momentum arcade, rebuilt around ONE continuous verb.

  You are a salvage tug with NO ENGINE. Throwing and catching mass is your
  only control. Every throw recoils you (conservation, exactly); every catch
  yanks you (the cargo's momentum is yours now). 2D field, mouse-aimed,
  real-time, zero consoles to type into — the recoil preview on your cursor
  IS the physics.

  ACT I   DRIFT GOLF  — dock through rings under speed limits; par = throws
  ACT II  THE RELAY   — intercept flying cargo, redirect it into chutes
  ACT III BREAKWATER  — deflect incoming rock by throwing mass into it

  DESIGN RULE: NO ENERGY. Momentum only. Energy gets its own cabinet.
  Speaks the arcade bridge protocol (docs/ARCADE_PATTERN.md).
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root{
    --neon:#fb7185; --neon2:#5eead4; --amber:#fbbf24; --red:#f87171;
    --ink:#e7ecf5; --dim:#8b96ad; --card:#120609ee; --edge:#fb718555;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;background:#0b0407}
  body{font-family:'Share Tech Mono',ui-monospace,monospace;color:var(--ink)}
  #c{display:block;width:100vw;height:100vh;touch-action:none;cursor:crosshair}
  #crt{pointer-events:none;position:fixed;inset:0;z-index:5;
    background:repeating-linear-gradient(0deg,transparent 0 2px,#0001 2px 4px);
    mix-blend-mode:overlay}
  #vig{pointer-events:none;position:fixed;inset:0;z-index:5;
    background:radial-gradient(ellipse at center,transparent 55%,#000a 100%)}
  #overlay{position:fixed;left:0;top:0;bottom:0;width:63%;z-index:10;
    display:none;align-items:center;justify-content:center;padding:20px;overflow-y:auto}
  #overlay.show{display:flex}
  @media (max-width:900px){ #overlay{width:100%} }
  .card{background:var(--card);border:1px solid var(--edge);border-radius:14px;
    padding:26px 30px;max-width:540px;width:100%;
    box-shadow:0 0 40px #fb718522, inset 0 0 60px #0006;
    animation:pop .25s ease-out}
  @keyframes pop{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
  h1,h2{font-family:'Orbitron',sans-serif;letter-spacing:.06em}
  h1{font-size:42px;font-weight:900;color:var(--neon);text-shadow:0 0 18px #fb718588}
  h2{font-size:22px;color:var(--neon);text-shadow:0 0 12px #fb718566;margin-bottom:10px}
  .tag{color:var(--neon2);font-size:13px;letter-spacing:.35em;margin:4px 0 16px}
  .sub{color:var(--dim);font-size:14px;line-height:1.55;margin-bottom:14px}
  .stat{display:flex;justify-content:space-between;font-size:14px;padding:3px 0;
    border-bottom:1px dashed #ffffff14}
  .stat b{color:var(--amber)}
  .good{color:var(--neon2)} .bad{color:var(--red)}
  .btn{display:inline-block;margin-top:18px;font-family:'Orbitron',sans-serif;
    font-size:15px;font-weight:700;letter-spacing:.12em;color:#1a040a;
    background:var(--neon);border:none;border-radius:8px;padding:12px 26px;
    cursor:pointer;box-shadow:0 0 18px #fb718566;transition:transform .08s}
  .btn:hover{transform:scale(1.05)} .btn:active{transform:scale(.97)}
  .btn.alt{background:#1f2937;color:var(--ink);box-shadow:none;border:1px solid #ffffff22}
  .choices{display:grid;gap:8px;margin-top:12px}
  .choice{font-family:'Share Tech Mono',monospace;font-size:15px;text-align:left;
    background:#1c0a10;border:1px solid #ffffff1c;border-radius:8px;color:var(--ink);
    padding:11px 14px;cursor:pointer;transition:all .1s}
  .choice:hover{border-color:var(--neon);background:#260d15}
  .choice.right{background:#0c2a22;border-color:var(--neon2);color:var(--neon2)}
  .choice.wrong{background:#2a0c12;border-color:var(--red);color:var(--red)}
  .kbd{display:inline-block;border:1px solid #ffffff33;border-bottom-width:3px;
    border-radius:5px;padding:1px 7px;font-size:12px;color:var(--amber);background:#ffffff0a}
  .explain{margin-top:12px;padding:10px 12px;border-left:3px solid var(--amber);
    background:#fbbf2410;font-size:13px;line-height:1.5;color:#fde68a;display:none}
  .bigscore{font-family:'Orbitron',sans-serif;font-size:34px;font-weight:900;
    color:var(--amber);text-shadow:0 0 16px #fbbf2477;margin:8px 0}
  .planetchip{font-family:'Orbitron',sans-serif;font-size:12px;letter-spacing:.2em;
    color:var(--neon2);border:1px solid #5eead455;border-radius:99px;padding:4px 12px}
  .actgrid{display:grid;gap:12px;margin-top:14px}
  .actcard{display:block;width:100%;text-align:left;background:#190a10;cursor:pointer;
    border:1px solid #ffffff1c;border-radius:12px;padding:14px 18px;color:var(--ink);
    font-family:'Share Tech Mono',monospace;transition:all .12s}
  .actcard:hover:not(.locked){border-color:var(--ac);box-shadow:0 0 22px var(--acGlow);transform:translateX(4px)}
  .actcard.locked{opacity:.45;cursor:not-allowed}
  .actname{font-family:'Orbitron',sans-serif;font-weight:700;font-size:17px;
    letter-spacing:.08em;color:var(--ac)}
  .actsub{font-size:12.5px;color:var(--dim);margin-top:4px;line-height:1.45}
  .hiline{font-size:11px;color:var(--amber);margin-top:6px;letter-spacing:.08em}
  .teachlink{display:inline-block;margin-top:14px;font-size:11px;color:#57534e;
    letter-spacing:.15em;cursor:pointer;border-bottom:1px dotted #57534e}
  .teachlink:hover{color:var(--dim)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="crt"></div><div id="vig"></div>
<div id="overlay"></div>

<script>
"use strict";
/* ================================================== utils */
const $=q=>document.querySelector(q);
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const rnd=(a,b)=>a+Math.random()*(b-a);
const pick=a=>a[Math.floor(Math.random()*a.length)];
const fmt=(n,d=1)=>{const s=(+n).toFixed(d);return s.replace(/\.0+$/,'');};
const hyp=Math.hypot;
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

/* ================================================== canvas */
const cv=$('#c'),ctx=cv.getContext('2d');
let W=0,H=0,DPR=1;
function resize(){DPR=Math.min(2,window.devicePixelRatio||1);
  W=window.innerWidth;H=window.innerHeight;
  cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);}
window.addEventListener('resize',resize);resize();

/* ================================================== persistence */
let PROG={a2:false,a3:false,teacher:false}, HIS={1:0,2:0,3:0};
try{Object.assign(PROG,JSON.parse(localStorage.getItem('impact3_prog')||'{}'));
    Object.assign(HIS, JSON.parse(localStorage.getItem('impact3_hi')||'{}'));}catch(e){}
function saveProg(){try{localStorage.setItem('impact3_prog',JSON.stringify(PROG));}catch(e){}}
function saveHi(){try{localStorage.setItem('impact3_hi',JSON.stringify(HIS));}catch(e){}}
function unlocked(a){return a===1||PROG.teacher||(a===2&&PROG.a2)||(a===3&&PROG.a3);}

/* ================================================== audio */
let AC=null,muted=false;
function audio(){if(AC||muted)return;try{
  AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}}
function beep(f,dur=.12,type='square',vol=.12,slide=0){if(!AC||muted)return;
  const o=AC.createOscillator(),g=AC.createGain();o.type=type;o.frequency.value=f;
  if(slide)o.frequency.exponentialRampToValueAtTime(Math.max(30,f+slide),AC.currentTime+dur);
  g.gain.value=vol;g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+dur);
  o.connect(g);g.connect(AC.destination);o.start();o.stop(AC.currentTime+dur);}
function chord(notes,step=.09){notes.forEach((n,i)=>setTimeout(()=>beep(n,.22,'triangle',.12),i*step*1000));}
function thunk(big){if(!AC||muted)return;
  beep(big?70:120,.16,'sawtooth',big?.22:.15,-30);
  const len=AC.sampleRate*0.18,buf=AC.createBuffer(1,len,AC.sampleRate);
  const d=buf.getChannelData(0);for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,3);
  const s=AC.createBufferSource();s.buffer=buf;const g=AC.createGain();g.gain.value=big?.4:.22;
  const lp=AC.createBiquadFilter();lp.type='lowpass';lp.frequency.value=500;
  s.connect(lp);lp.connect(g);g.connect(AC.destination);s.start();}
function boom(){if(!AC||muted)return;const len=AC.sampleRate*0.6,buf=AC.createBuffer(1,len,AC.sampleRate);
  const d=buf.getChannelData(0);for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,2);
  const s=AC.createBufferSource();s.buffer=buf;const g=AC.createGain();g.gain.value=.5;
  const lp=AC.createBiquadFilter();lp.type='lowpass';lp.frequency.value=380;
  s.connect(lp);lp.connect(g);g.connect(AC.destination);s.start();}

/* ================================================== host-app bridge */
const ARCADE={
  embedded:window.parent!==window,
  playId:null, pendingCoin:null,
  emit(type,data){if(this.embedded)
    window.parent.postMessage(Object.assign({source:'impact-arcade',type},data||{}),'*');},
  requestCoin(cb){
    if(!this.embedded){cb({ok:true,practice:true});return;}
    this.pendingCoin=cb;
    this.emit('arcade:coinRequest');
    setTimeout(()=>{if(this.pendingCoin===cb){this.pendingCoin=null;cb({ok:true,practice:true});}},900);
  },
  reportScore(final){
    if(this.playId)this.emit('arcade:score',{score,act,final:!!final,stats:{solved:STATS.solved,right:STATS.right,wrong:STATS.wrong,bestStreak:0,startLv:act,mode:'physics'}});
  },
};
window.addEventListener('message',e=>{
  const m=e.data||{};
  if(m.type==='arcade:coinAccepted'&&ARCADE.pendingCoin){
    ARCADE.playId=m.playId||null;
    const cb=ARCADE.pendingCoin;ARCADE.pendingCoin=null;cb({ok:true,practice:!m.playId});}
  if(m.type==='arcade:coinDenied'&&ARCADE.pendingCoin){
    const cb=ARCADE.pendingCoin;ARCADE.pendingCoin=null;cb({ok:false,reason:m.reason});}
});

/* ================================================== world + level data
   World units: meters. Field WLD.w × WLD.h, y points DOWN (screen-aligned).
   The tug: dry mass 28 kg, throw speed u = 12 m/s relative, carry cap 4.
   Recoil per throw: Δv = m·u/(M−m). A 12 kg crate kicks ~2.6–4.3 m/s. */
const WLD={w:48,h:30}, TUG_DRY=28, THROW_U=12, CARRY_CAP=4, TUG_R=1.3;
const ACT_META={
 1:{name:'DRIFT GOLF', col:'#5eead4', blurb:'Dock through the ring under its speed limit. Par is counted in THROWS. Angled throws shed exactly the velocity you choose — that’s the whole short game.'},
 2:{name:'THE RELAY',  col:'#fbbf24', blurb:'Cargo flies across the field. Catch it (it yanks you), sling it into the chute (you recoil). Sixty seconds. Make quota.'},
 3:{name:'BREAKWATER', col:'#f472b6', blurb:'Rock is falling toward the station window. The only thing between them is you — and whatever you can throw at it.'},
};
/* ACT I — holes: {par, tug, cargo, ring:{x,y,r,vmax}, rocks, pickups} */
const ACT1=[
 {name:'HOLE 1 · STRAIGHT DRIVE', par:1,
  tug:{x:8,y:15}, cargo:[12,12], ring:{x:40,y:15,r:3,vmax:9}, rocks:[], pickups:[],
  tip:'Aim AWAY from the ring and throw: the crate goes one way, you go exactly the other. One clean throw, then let Newton’s first law do the putting.'},
 {name:'HOLE 2 · THE BRAKE', par:2,
  tug:{x:8,y:15}, cargo:[12,12,12], ring:{x:38,y:15,r:2.6,vmax:1.2}, rocks:[], pickups:[],
  tip:'The ring’s limit is 1.2 m/s — you’ll arrive hot. Throw a crate AHEAD of you to brake. Pro secret: your tug gets lighter with every throw, so brakes kick harder than drives. Angle the brake throw to shed exactly what you need.'},
 {name:'HOLE 3 · THE DOGLEG', par:2,
  tug:{x:8,y:22}, cargo:[10,10,10], ring:{x:40,y:7,r:2.8,vmax:2.5},
  rocks:[{x:24,y:13,r:2.2,m:420},{x:24,y:18,r:2.0,m:380},{x:24,y:23,r:2.4,m:460}], pickups:[],
  tip:'A rock wall blocks the straight line. Momentum is a VECTOR: two throws at angles add up to any path you want. Drive past the wall, then turn with a sideways throw.'},
 {name:'HOLE 4 · REFUEL', par:2,
  tug:{x:8,y:15}, cargo:[12], ring:{x:40,y:15,r:2.6,vmax:1.5},
  rocks:[], pickups:[{x:30,y:4,m:12,vx:0,vy:1.6}],
  tip:'One crate aboard — not enough to drive AND brake. A supply crate is drifting down across your path: CATCH it. Careful: catching it means absorbing its momentum. The catch is part of your flight plan.'},
 {name:'HOLE 5 · THE MOUSEHOLE', par:3,
  tug:{x:6,y:26}, cargo:[8,8,12,12], ring:{x:42,y:5,r:2.2,vmax:1.2},
  rocks:[{x:20,y:10,r:2.6,m:460},{x:28,y:20,r:2.6,m:460},{x:36,y:12,r:2.2,m:420}], pickups:[],
  tip:'Tight ring, hard limit, three boulders in the lane. Plan the whole ledger before the first throw: every kilogram you spend early is a brake you won’t have late.'},
];
/* ACT II — shifts: {dur, quota, cargo, dispensers:[{x,y,dir°,m,speed,every,col}], chutes:[{x,y,col}]} */
const C_TEAL='#5eead4', C_AMBER='#fbbf24';
const ACT2=[
 {name:'SHIFT 1 · FIRST CATCH', dur:60, quota:4, cargo:[10],
  dispensers:[{x:1,y:15,dir:0,m:10,speed:4.5,every:6,col:C_TEAL}],
  chutes:[{x:47,y:15,col:C_TEAL}],
  tip:'Crates cross the field; the chute wants them. CATCH one — feel it yank you in its direction of travel; that’s its momentum joining yours. Then sling it home and feel the recoil. You are a momentum middleman.'},
 {name:'SHIFT 2 · CROSSFIRE', dur:60, quota:6, cargo:[10],
  dispensers:[{x:1,y:10,dir:0,m:10,speed:4.5,every:5,col:C_TEAL},
              {x:24,y:1,dir:90,m:8,speed:4,every:5,col:C_TEAL}],
  chutes:[{x:47,y:15,col:C_TEAL}],
  tip:'Two streams now. Every catch bends your course — use the yank as free transport toward the next interception. Good players don’t fight the momentum they’re handed; they ride it.'},
 {name:'SHIFT 3 · SORTED', dur:65, quota:6, cargo:[10],
  dispensers:[{x:1,y:8,dir:0,m:10,speed:4.5,every:6,col:C_TEAL},
              {x:1,y:22,dir:0,m:10,speed:4.5,every:6,col:C_AMBER}],
  chutes:[{x:47,y:8,col:C_TEAL},{x:47,y:22,col:C_AMBER}],
  tip:'Color-matched chutes. Same physics, more decisions: WHICH crate you’re carrying decides where you must go — and its mass decides how hard getting there kicks.'},
 {name:'SHIFT 4 · HEAVY FREIGHT', dur:65, quota:7, cargo:[10],
  dispensers:[{x:1,y:12,dir:0,m:8,speed:5,every:5,col:C_TEAL},
              {x:1,y:20,dir:0,m:22,speed:3.5,every:8,col:C_TEAL}],
  chutes:[{x:47,y:15,col:C_TEAL}],
  tip:'The 22 kg crates carry nearly triple the momentum at the same speed — catching one yanks HARD, and throwing it kicks harder. Heavy cargo pays the same at the chute. Choose your battles by m·v, not by size on screen.'},
 {name:'SHIFT 5 · RUSH HOUR', dur:70, quota:9, cargo:[10,10],
  dispensers:[{x:1,y:8,dir:0,m:10,speed:5,every:4.5,col:C_TEAL},
              {x:24,y:1,dir:90,m:8,speed:4.5,every:5,col:C_AMBER},
              {x:1,y:24,dir:0,m:14,speed:4,every:6,col:C_AMBER}],
  chutes:[{x:47,y:10,col:C_TEAL},{x:47,y:21,col:C_AMBER}],
  tip:'Three streams, two chutes, seventy seconds. There is no time to stop — so don’t. Chain catches into throws and let the recoils carry you station to station.'},
];
/* ACT III — waves: {dur, hp, ammoEvery, spawns:[{at,x,m,r,vx,vy,split}]} */
const ACT3=[
 {name:'WAVE 1 · PEBBLES', dur:55, hp:3, ammoEvery:7,
  spawns:[{at:2,x:10,m:10,r:1.2,vx:.3,vy:1.6},{at:9,x:30,m:10,r:1.2,vx:-.3,vy:1.6},
          {at:17,x:20,m:12,r:1.3,vx:.2,vy:1.8},{at:26,x:38,m:10,r:1.2,vx:-.5,vy:1.7},
          {at:35,x:14,m:12,r:1.3,vx:.4,vy:1.9},{at:43,x:33,m:10,r:1.2,vx:-.2,vy:2}],
  tip:'Rock falls toward the window. Throw mass INTO it — your crate’s momentum joins the rock’s, and the sum sets its new course. Hit it early: a small nudge far out beats a big one up close. Small rocks (≤12 kg) can simply be CAUGHT.'},
 {name:'WAVE 2 · THE BOULDER', dur:55, hp:3, ammoEvery:6,
  spawns:[{at:3,x:24,m:60,r:2.6,vx:0,vy:1.1},{at:14,x:10,m:10,r:1.2,vx:.4,vy:1.7},
          {at:24,x:38,m:10,r:1.2,vx:-.4,vy:1.7},{at:34,x:18,m:12,r:1.3,vx:.3,vy:1.9}],
  tip:'Sixty kilograms. Your 8 kg crate at 12 m/s carries 96 kg·m/s — the boulder carries 66 straight down. One perfect side-on hit can turn it; two sloppy ones might not. Lead it, and spend momentum where it counts.'},
 {name:'WAVE 3 · THE SPLITTER', dur:60, hp:3, ammoEvery:6,
  spawns:[{at:3,x:24,m:50,r:2.4,vx:0,vy:1.2,split:true},{at:18,x:12,m:10,r:1.2,vx:.4,vy:1.8},
          {at:28,x:36,m:50,r:2.4,vx:-.3,vy:1.3,split:true},{at:44,x:20,m:12,r:1.3,vx:.2,vy:2}],
  tip:'These rocks SHATTER when hit hard. Watch the ledger when one splits: the pieces fly apart, but their momenta still sum to rock-plus-crate. Conservation doesn’t care how many pieces you make — aim so the pieces miss.'},
 {name:'WAVE 4 · CROSSWINDS', dur:60, hp:3, ammoEvery:5,
  spawns:[{at:2,x:2,m:14,r:1.4,vx:1.4,vy:1.2},{at:10,x:46,m:14,r:1.4,vx:-1.4,vy:1.2},
          {at:19,x:4,m:30,r:1.9,vx:1.1,vy:1.1},{at:30,x:44,m:30,r:1.9,vx:-1.1,vy:1.2},
          {at:41,x:2,m:14,r:1.4,vx:1.6,vy:1.4},{at:49,x:46,m:12,r:1.3,vx:-1.5,vy:1.5}],
  tip:'Now the rock comes in sideways — so must your answer. To cancel a crosswind rock you throw ACROSS its path, not at its nose. Think in components: kill the vx, and gravity-of-the-situation handles the rest. (Figure of speech. No gravity out here.)'},
 {name:'WAVE 5 · THE SWARM', dur:70, hp:3, ammoEvery:4.5,
  spawns:[{at:2,x:8,m:10,r:1.2,vx:.5,vy:1.8},{at:7,x:28,m:10,r:1.2,vx:-.2,vy:1.9},
          {at:13,x:40,m:14,r:1.4,vx:-.8,vy:1.6},{at:19,x:16,m:50,r:2.4,vx:.3,vy:1.2,split:true},
          {at:27,x:34,m:12,r:1.3,vx:-.4,vy:2},{at:33,x:6,m:14,r:1.4,vx:1,vy:1.5},
          {at:40,x:42,m:60,r:2.6,vx:-.5,vy:1.1},{at:50,x:22,m:10,r:1.2,vx:.2,vy:2.2},
          {at:56,x:12,m:12,r:1.3,vx:.6,vy:2},{at:61,x:36,m:14,r:1.4,vx:-.7,vy:1.9}],
  tip:'Everything at once. Catch the small ones for ammunition, shoulder-check the medium ones, and save your heaviest throws for what you cannot stop any other way. The window is counting on you.'},
];
const SITES=['BAY K','SPUR 9','SIDING 4','OUTPOST 12','AIRLOCK 7','SECTOR Z','GANTRY 5'];
function endless1(w){
  const ring={x:rnd(36,44),y:rnd(6,24),r:Math.max(1.8,3-w*.15),vmax:Math.max(1,2.6-w*.2)};
  const rocks=[];const n=Math.min(4,1+Math.floor(w/2));
  for(let i=0;i<n;i++)rocks.push({x:rnd(16,34),y:rnd(5,25),r:rnd(1.8,2.6),m:rnd(350,500)});
  return {name:pick(SITES)+' · HOLE '+w, par:Math.min(4,2+Math.floor(w/3)),
    tug:{x:rnd(5,9),y:rnd(8,22)}, cargo:[10,10,12,12].slice(0,Math.max(2,4-Math.floor(w/4))),
    ring, rocks, pickups:w>2?[{x:rnd(20,30),y:3,m:12,vx:0,vy:rnd(1.2,1.8)}]:[],
    tip:'Unmapped fairway. Same ledger.'};
}
function endless2(w){
  const two=w>1;
  return {name:pick(SITES)+' · SHIFT '+w, dur:60+Math.min(20,w*2),
    quota:4+Math.ceil(w*1.5), cargo:[10],
    dispensers:[{x:1,y:rnd(8,14),dir:0,m:10,speed:4.5+w*.1,every:Math.max(3.5,6-w*.3),col:C_TEAL}]
      .concat(two?[{x:rnd(18,30),y:1,dir:90,m:pick([8,14,22]),speed:4,every:Math.max(4,7-w*.3),col:w>2?C_AMBER:C_TEAL}]:[]),
    chutes:two&&w>2?[{x:47,y:9,col:C_TEAL},{x:47,y:21,col:C_AMBER}]:[{x:47,y:15,col:C_TEAL}],
    tip:'Another shift on the manifest.'};
}
function endless3(w){
  const spawns=[];const n=5+Math.min(7,w);let at=2;
  for(let i=0;i<n;i++){
    const big=Math.random()<.25+w*.03;

/* ================================================== questions (momentum only — never energy) */
function qNum(text,ans,unit,distractors,explain){
  const vals=[+fmt(ans)];
  for(const d of distractors){let v=+fmt(d);
    while(vals.some(x=>Math.abs(x-v)<0.05))v=+fmt(v+rnd(0.8,2.2));
    vals.push(v);}
  const choices=shuffle(vals.map((v,i)=>({s:fmt(v)+' '+unit,ok:i===0?1:0})));
  return {text,choices,explain};
}
function qCon(text,right,wrongs,explain){
  return {text,choices:shuffle([{s:right,ok:1}].concat(wrongs.map(s=>({s,ok:0})))),explain};
}
function makeQuestion(){
  const bank1=[
   ()=>{const m=pick([8,12,22]),v=pick([4,6,12]);
     return qNum(`A ${m} kg crate flies at ${v} m/s. What is its momentum?`,
       m*v,'kg·m/s',[m+v,m*v/2,m*v*2],
       `p = m·v = ${m} × ${v} = ${m*v} kg·m/s. Mass times velocity — the only currency your tug spends.`);},
   ()=>{const M=pick([40,52]),m=12;
     return qNum(`Your tug (${M} kg total, at rest) throws a ${m} kg crate at 12 m/s. Your recoil speed?`,
       m*12/(M-m),'m/s',[m*12/M,12*m/100,12/(M-m)],
       `0 = ${m}·12 + ${M-m}·v → v = ${m*12}/${M-m} = ${fmt(m*12/(M-m))} m/s opposite the throw. You bought velocity and paid in mass.`);},
   ()=>qCon('Why does throwing a crate FORWARD slow your tug down?',
     'the crate gains forward momentum, so you must lose exactly that much',['air resistance from the throw','the crate pushes space backward','it doesn’t — throwing always speeds you up'],
     'Conservation is bookkeeping: total p is fixed, so every kg·m/s the crate carries off forward is subtracted from you. A forward throw is a brake.'),
   ()=>qCon('You catch a crate drifting straight DOWN while you drift RIGHT. Just after the catch you move…',
     'right and slightly down — its momentum added to yours',['right, unchanged — you absorbed it','straight down — the crate wins','you stop — catches cancel motion'],
     'A catch is a merger: p_total = p_you + p_crate, new velocity = that total over the combined mass. Its downward momentum is yours now. Vectors add; they don’t argue.'),
   ()=>qCon('Your loaded tug is heavier than your empty tug. The SAME throw kicks the loaded tug…',
     'less — same Δp spread over more mass',['more — heavier things push harder','exactly the same','backward instead of forward'],
     'The throw changes your momentum by the same m·u either way, but Δv = Δp/M. More M, less Δv. This is why your last crate kicks hardest — the rocket equation in miniature.'),
  ];
  const bank2=[
   ()=>{const dp=pick([24,36,60]);
     return qNum(`Your thrown crate changes a rock's momentum by ${dp} kg·m/s. The crate's own momentum changed by…`,
       -dp,'kg·m/s',[dp,0,-dp/2],
       `−${dp} kg·m/s — exactly opposite. Δp_A = −Δp_B in every collision, no exceptions. One object's gain is the other's loss, to the decimal.`);},
   ()=>{const dp=pick([30,48]),dt2=pick([0.05,0.1]);
     return qNum(`A collision transfers ${dp} kg·m/s of momentum in ${dt2} s of contact. Average force during the hit?`,
       dp/dt2,'N',[dp*dt2,dp,dp/dt2/2],
       `F = Δp/Δt = ${dp}/${dt2} = ${fmt(dp/dt2)} N. Same momentum change, shorter contact, bigger force — why hard objects hit harder than soft ones.`);},
   ()=>qCon('To deflect a heavy rock most effectively with one thrown crate, you want the crate to arrive with…',
     'the largest possible momentum (its m·v)',['the largest possible size','the brightest color','the longest flight time'],
     'The rock’s course changes by the momentum you deliver. m·v is the whole transaction — a heavier crate or a faster crate, the rock cannot tell the difference.'),
   ()=>qCon('A big rock SHATTERS into three pieces when your crate hits it. The total momentum of all the pieces (plus your crate)…',
     'equals the rock-plus-crate total from just before the hit',['is zero — the rock broke','is three times larger','depends on how loud the crack was'],
     'Breaking is internal forces — and internal forces can’t change the total. Count every fragment’s m·v and the ledger still balances. Conservation doesn’t care how many pieces you make.'),
   ()=>qCon('A crate bounces OFF the scaffold wall and comes back at nearly the same speed. Its momentum…',
     'reversed — a change of nearly 2mv, delivered by the wall',['is unchanged — same speed','dropped to zero','doubled in magnitude'],
     'Momentum is a vector: same speed, opposite direction = change of ~2mv. The wall is external to your ledger — walls are the only thing out here that can change your total.'),
  ];
  const bank3=[
   ()=>{const mb=0.01,vb=pick([300,400]),mr=pick([4,5]);
     return qNum(`A ${mr} kg rifle fires a ${mb*1000} g bullet at ${vb} m/s. The rifle's recoil speed?`,
       mb*vb/mr,'m/s',[vb/mr,mb*vb,vb*mr/1000],
       `0 = m_b·v_b + m_r·v_r → v_r = ${mb}·${vb}/${mr} = ${fmt(mb*vb/mr)} m/s. Tiny mass at huge speed one way; huge mass at tiny speed the other. Your tug fires crates instead of bullets.`);},
   ()=>qCon('An astronaut floating at rest throws a wrench FORWARD. The astronaut…',
     'drifts backward',['stays exactly still','drifts forward after it','spins but doesn’t move'],
     'Total momentum was zero and stays zero: wrench forward means astronaut backward. You have been doing this with crates all game.'),
   ()=>qCon('Your tug and all its cargo start at rest (total p = 0). After ANY number of throws and catches among them, the total momentum of everything is…',
     'still exactly zero',['positive if you threw left more','growing with each throw','zero only if you catch everything back'],
     'Throws and catches are internal — they shuffle momentum between you and the cargo, never create it. Only something EXTERNAL (the scaffold, incoming rock) can change the total.'),
   ()=>qCon('To get the biggest velocity kick from your LAST crate, you should throw it when your tug is…',
     'as empty as possible — minimum remaining mass',['as full as possible','moving as fast as possible','touching the scaffold'],
     'Δv = m·u/(M−m): the same throw divided by less remaining mass. Empty the hold, then the last crate kicks hardest. Rockets stage for exactly this reason.'),
   ()=>qCon('A crate drifts toward you from the RIGHT and you catch it. The catch kicks your tug…',
     'toward the LEFT — you inherit its leftward momentum',['toward the right','nowhere if you grip firmly','straight up'],
     'Catching is a perfectly inelastic collision: its momentum joins yours the instant it’s aboard. Catch ammunition, inherit its politics.'),
  ];
  /* CROSSOVER bank — bridges back to PUSH (dynamics) and DESCENT (kinematics).
     Connections pay more than facts: these award +1000. */
  const cross=[
   ()=>{const F=pick([30,40,60]),dt2=pick([2,3]);
     return qNum(`CROSSOVER · PUSH — A tug-bot from the dynamics cabinet pushes a crate with ${F} N of net force for ${dt2} s. By how much does the crate's MOMENTUM change?`,
       F*dt2,'kg·m/s',[F/dt2,F,F*dt2*2],
       `Δp = F·Δt = ${F} × ${dt2} = ${F*dt2} kg·m/s. PUSH's force-times-time IS impulse — the tug-bot was doing momentum transfers all along; nobody told you yet.`);},
   ()=>qCon('CROSSOVER · PUSH — In the dynamics cabinet, force was F = ma. In this cabinet you computed F = Δp/Δt for collisions. These two formulas are…',
     'the same law — Δ(mv)/Δt becomes ma when mass is constant',['rivals; only one is correct','unrelated; one is about crates, one about pucks','approximations of a third, secret law'],
     'Newton actually WROTE his second law as Δp/Δt. The ma version is the special case where mass holds still. Your salvage tug — whose mass changes with every throw — needs the original.'),
   ()=>qCon('CROSSOVER · DESCENT — Your thrown crate coasts across the field in a straight line at constant speed. Which DESCENT lesson is it obeying?',
     'no net force → constant velocity — the flat part of the v–t graph',['v² = v₀² + 2gΔy','slope of v–t equals g','area under a–t is position'],
     'In DESCENT, the ship coasting between burns drew a flat v–t line. Out here with no gravity and no rail, EVERYTHING is that flat line until a collision redraws it.'),
  ];
  if(Math.random()<0.3)return Object.assign(pick(cross)(),{cross:true});
  const bank=act===1?bank1:act===2?bank1.slice(3).concat(bank2.slice(0,3)):act===3?bank2.slice(2).concat(bank3):bank3;
  return pick(bank)();
}
let curQ=null;
function askQuestion(){
  state='question';curQ=makeQuestion();

   <div class="card">
     <div class="tag" style="${curQ.cross?'color:#facc15;border:1px solid #facc1555;border-radius:99px;padding:3px 10px':''}">${curQ.cross?'★ CROSSOVER BONUS · +1000':'PHYSICS BONUS · +750'}</div>
     <div style="font-size:16px;line-height:1.5">${curQ.text}</div>
     <div class="choices">${curQ.choices.map((c,i)=>

     <div class="explain" id="explain">${curQ.explain}</div>

   </div>`);

}
const STATS={solved:0,right:0,wrong:0}; // free-cabinet payout evidence
function answer(i){
  if(primary)return;
  const right=curQ.choices.findIndex(c=>c.ok);
  curQ.choices.forEach((c,j)=>{const el=$('#ch'+j);el.disabled=true;
    if(j===right)el.classList.add('right');else if(j===i)el.classList.add('wrong');});
  $('#explain').style.display='block';
  $('#contBtn').style.display='inline-block';
  if(i===right){score+=curQ.cross?1000:750;bumpHi();chord([784,988,1175]);flash=.4;STATS.right++;}
  else{beep(180,.3,'sawtooth',.15,-100);STATS.wrong++;}
  primary=nextLevel;
}

/* ================================================== engine */
const DT=1/120;
let tooHotCd=0;
function throwCrate(){
  if(state!=='play'||throwCd>0||carried.length===0)return;
  const c=carried.splice(selCargo,1)[0];

function tryCatch(b){
  const catchable=b.kind==='crate'||(act===3&&b.kind==='rock'&&b.m<=12);

  if(!catchable||carried.length>=CARRY_CAP||rel>8)return false;
  const M=tugM(),oldvx=tug.vx,oldvy=tug.vy;
  tug.vx=(M*tug.vx+b.m*b.vx)/(M+b.m);
  tug.vy=(M*tug.vy+b.m*b.vy)/(M+b.m);
  carried.push({m:b.m,col:b.kind==='rock'?'#a8a29e':b.col});
  lastEvent={la:'YOU',lb:fmt(b.m)+' kg',age:0,
    dpa:{x:M*(tug.vx-oldvx),y:M*(tug.vy-oldvy)},
    dpb:{x:b.m*(tug.vx-b.vx),y:b.m*(tug.vy-b.vy)}};
  bodies.splice(bodies.indexOf(b),1);

function bounce(A,B,e){ // 2D collision along the line of centers
  const dx=B.x-A.x,dy=B.y-A.y,d=hyp(dx,dy)||0.001;
  const nx=dx/d,ny=dy/d;
  const rel=(A.vx-B.vx)*nx+(A.vy-B.vy)*ny;

  const J=(1+e)*rel/(1/A.m+1/B.m);

  B.vx+=J*nx/B.m;B.vy+=J*ny/B.m;
  const overlap=(A.r+B.r)-d;
  if(overlap>0){A.x-=nx*overlap/2;A.y-=ny*overlap/2;B.x+=nx*overlap/2;B.y+=ny*overlap/2;}

function step(dt){

  if(tug.x>WLD.w-TUG_R){tug.x=WLD.w-TUG_R;tug.vx=-Math.abs(tug.vx)*.7;scaffold();}
  if(tug.y<TUG_R){tug.y=TUG_R;tug.vy=Math.abs(tug.vy)*.7;scaffold();}

      if(b.y<b.r){b.y=b.r;b.vy=Math.abs(b.vy)*.7;}
      if(b.y>WLD.h-b.r){b.y=WLD.h-b.r;b.vy=-Math.abs(b.vy)*.7;}
    }else if(b.x<-2||b.x>WLD.w+2||b.y<-3||b.y>WLD.h+2){
      if(act===3&&b.kind==='rock'&&b.y>WLD.h-1){ // station strike

        burst(b.x,WLD.h-1,30,['#f87171','#fbbf24','#fff'],5);
        bodies.splice(i,1);
        if(hp<=0){failAttempt('THE WINDOW IS GONE','Deflect earlier: a small sideways momentum donation 20 m out beats a heroic block at the glass.');return;}
        continue;}

    ctx.restore();ctx.lineWidth=1;
    ctx.fillStyle='#d6d3d1';ctx.font='9px "Share Tech Mono",monospace';ctx.textAlign='center';
    ctx.fillText(fmt(b.m)+'kg',px,py-r-5);ctx.textAlign='left';
  }else{ // crate canister
    ctx.save();ctx.translate(px,py);ctx.rotate(b.age*1.2);
    ctx.fillStyle=b.col;ctx.strokeStyle='#0b0407';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.roundRect(-r,-r,r*2,r*2,r*0.4);ctx.fill();ctx.stroke();
    ctx.strokeStyle='#0b040766';
    ctx.beginPath();ctx.moveTo(-r,0);ctx.lineTo(r,0);ctx.stroke();
    ctx.restore();ctx.lineWidth=1;
    ctx.fillStyle=b.col;ctx.font='8px "Share Tech Mono",monospace';ctx.textAlign='center';
    ctx.fillText(fmt(b.m)+'kg',px,py-r-4);ctx.textAlign='left';
  }
}
function drawTug(now){
  const px=X2(tug.x),py=Y2(tug.y),r=TUG_R*VS;
  // carried crates latched around the hull
  carried.forEach((c,i)=>{
    const a=now*0.4+i*(6.28/Math.max(3,carried.length));
    const cx2=px+Math.cos(a)*r*1.45,cy2=py+Math.sin(a)*r*1.45;
    ctx.fillStyle=c.col;ctx.strokeStyle=i===selCargo?'#fff':'#0b0407';
    ctx.lineWidth=i===selCargo?2:1;
    ctx.beginPath();ctx.roundRect(cx2-5,cy2-5,10,10,2);ctx.fill();ctx.stroke();
    ctx.strokeStyle='#8b96ad44';
    ctx.beginPath();ctx.moveTo(px,py);ctx.lineTo(cx2,cy2);ctx.stroke();ctx.lineWidth=1;});
  // hull
  ctx.fillStyle='#e7ecf5';ctx.strokeStyle='#0b0407';ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(px,py,r,0,7);ctx.fill();ctx.stroke();
  ctx.fillStyle='#fb7185';
  ctx.beginPath();ctx.arc(px,py,r*0.45,0,7);ctx.fill();ctx.lineWidth=1;
  // grapple arms toward cursor
  if(state==='play'){
    const dx=mouse.x-tug.x,dy=mouse.y-tug.y,L=hyp(dx,dy)||1,nx=dx/L,ny=dy/L;
    ctx.strokeStyle='#e7ecf5';ctx.lineWidth=2;
    for(const s of[-.5,.5]){
      ctx.beginPath();ctx.moveTo(px+(nx*Math.cos(s)-ny*Math.sin(s))*r,py+(ny*Math.cos(s)+nx*Math.sin(s))*r);
      ctx.lineTo(px+(nx*Math.cos(s*.6)-ny*Math.sin(s*.6))*r*1.6,py+(ny*Math.cos(s*.6)+nx*Math.sin(s*.6))*r*1.6);
      ctx.stroke();}
    ctx.lineWidth=1;
    // aim line + recoil preview: the physics IS the gunsight
    ctx.setLineDash([4,6]);ctx.strokeStyle='#ffffff33';
    ctx.beginPath();ctx.moveTo(px+nx*r*1.8,py+ny*r*1.8);
    ctx.lineTo(X2(mouse.x),Y2(mouse.y));ctx.stroke();ctx.setLineDash([]);
    if(carried.length>0){
      const m=carried[selCargo].m,M=tugM();
      const dv=m*THROW_U/(M-m);
      const al=clamp(dv*14,10,60);
      ctx.strokeStyle='#fb7185';ctx.fillStyle='#fb7185';ctx.lineWidth=2.5;
      ctx.beginPath();ctx.moveTo(px,py);ctx.lineTo(px-nx*al,py-ny*al);ctx.stroke();
      ctx.beginPath();ctx.moveTo(px-nx*al,py-ny*al);
      ctx.lineTo(px-nx*al+(nx*.5-ny*.35)*9,py-ny*al+(ny*.5+nx*.35)*9);
      ctx.lineTo(px-nx*al+(nx*.5+ny*.35)*9,py-ny*al+(ny*.5-nx*.35)*9);
      ctx.closePath();ctx.fill();ctx.lineWidth=1;
      ctx.font='10px "Share Tech Mono",monospace';ctx.textAlign='center';
      ctx.fillText('recoil '+fmt(dv,2)+' m/s',px-nx*(al+16),py-ny*(al+16)+4);ctx.textAlign='left';
    }
  }
}
function drawHUD(SW,now){
  if(!(state==='play'||state==='paused'||state==='down'))return;
  // act widget — one box, top-left, nothing else in the field
  ctx.fillStyle='#0008';ctx.fillRect(8,8,210,act===1?46:50);
  ctx.font='12px "Share Tech Mono",monospace';
  if(act===1){
    ctx.fillStyle='#8b96ad';ctx.fillText('THROWS',16,26);
    ctx.fillStyle=throws>lv.par?'#f87171':'#5eead4';
    ctx.font='700 15px Orbitron,monospace';
    ctx.fillText(throws+' / par '+lv.par,80,27);
    ctx.font='11px "Share Tech Mono",monospace';ctx.fillStyle='#8b96ad';
    ctx.fillText('speed '+fmt(hyp(tug.vx,tug.vy),2)+' m/s',16,44);
  }else if(act===2){
    const left=Math.max(0,lv.dur-t);
    ctx.fillStyle=left<10?'#f87171':'#fbbf24';ctx.font='700 15px Orbitron,monospace';
    ctx.fillText(Math.ceil(left)+'s',16,28);
    ctx.fillStyle='#5eead4';
    ctx.fillText(delivered+' / '+lv.quota,70,28);
    ctx.font='11px "Share Tech Mono",monospace';ctx.fillStyle='#8b96ad';
    ctx.fillText('delivered'+(comboR>1?'  ·  chain ×'+comboR:''),70,46);
    ctx.fillText('time',16,46);
  }else{
    const left=Math.max(0,lv.dur-t);
    ctx.fillStyle=left<10?'#f87171':'#fbbf24';ctx.font='700 15px Orbitron,monospace';
    ctx.fillText(Math.ceil(left)+'s',16,28);
    ctx.fillStyle='#f472b6';ctx.fillText('▰'.repeat(Math.max(0,hp)),70,28);
    ctx.font='11px "Share Tech Mono",monospace';ctx.fillStyle='#8b96ad';
    ctx.fillText('shield  ·  deflects '+deflects,70,46);
    ctx.fillText('wave',16,46);
  }
  // score strip
  ctx.textAlign='right';
  ctx.fillStyle='#0008';ctx.fillRect(SW-238,8,230,52);
  ctx.fillStyle='#fbbf24';ctx.font='700 16px Orbitron,monospace';
  ctx.fillText(score.toLocaleString(),SW-16,28);
  ctx.font='11px "Share Tech Mono",monospace';ctx.fillStyle='#8b96ad';
  ctx.fillText((ARCADE.embedded?(ARCADE.playId?'★RANKED  ':'PRACTICE  '):'')+
    '⛟'.repeat(Math.max(0,lives))+'  COMBO ×'+Math.min(3,Math.max(1,streak+1)),SW-16,48);
  ctx.textAlign='left';
}
/* ================================================== panel: the momentum desk */
function drawPanel(SW,pw){
  ctx.fillStyle='#0e0509';ctx.fillRect(SW,0,pw,H);
  ctx.strokeStyle='#fb718533';ctx.beginPath();ctx.moveTo(SW+.5,0);ctx.lineTo(SW+.5,H);ctx.stroke();
  ctx.fillStyle='#fb7185';ctx.font='700 13px Orbitron,monospace';
  ctx.fillText('MOMENTUM DESK',SW+18,28);
  ctx.fillStyle='#8b96ad';ctx.font='11px "Share Tech Mono",monospace';
  ctx.fillText(lv?lv.name.split('·')[0].trim():'',SW+160,28);
  const m=18,gx=SW+m,gw=pw-2*m,top=44,gap=14;
  const ch2=(H-top-3*gap-14);
  drawCompass(gx,top,gw,ch2*0.40);
  drawHold(gx,top+ch2*0.40+gap,gw,ch2*0.34);
  drawEvent(gx,top+ch2*0.74+2*gap,gw,ch2*0.26-gap);
}
function drawCompass(gx,gy,gw,gh){
  ctx.fillStyle='#160a10';ctx.fillRect(gx,gy,gw,gh);
  ctx.strokeStyle='#ffffff14';ctx.strokeRect(gx+.5,gy+.5,gw-1,gh-1);
  ctx.fillStyle='#8b96ad';ctx.font='10px "Share Tech Mono",monospace';
  ctx.fillText('YOUR MOMENTUM  p = M·v',gx+8,gy+14);
  const cx2=gx+gw/2,cy2=gy+gh/2+6,R=Math.min(gw,gh)*0.32;
  ctx.strokeStyle='#ffffff18';
  ctx.beginPath();ctx.arc(cx2,cy2,R,0,7);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx2-R,cy2);ctx.lineTo(cx2+R,cy2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx2,cy2-R);ctx.lineTo(cx2,cy2+R);ctx.stroke();
  const M=tugM(),px2=M*tug.vx,py2=M*tug.vy,pm=hyp(px2,py2);
  const scale=R/Math.max(60,pm*1.1);
  if(pm>1){
    ctx.strokeStyle='#facc15';ctx.fillStyle='#facc15';ctx.lineWidth=3;
    ctx.shadowColor='#facc15';ctx.shadowBlur=8;
    const ex=cx2+px2*scale,ey=cy2+py2*scale;
    ctx.beginPath();ctx.moveTo(cx2,cy2);ctx.lineTo(ex,ey);ctx.stroke();
    const a=Math.atan2(ey-cy2,ex-cx2);
    ctx.beginPath();ctx.moveTo(ex,ey);
    ctx.lineTo(ex-9*Math.cos(a-.4),ey-9*Math.sin(a-.4));
    ctx.lineTo(ex-9*Math.cos(a+.4),ey-9*Math.sin(a+.4));
    ctx.closePath();ctx.fill();
    ctx.shadowBlur=0;ctx.lineWidth=1;
  }else{ctx.fillStyle='#57534e';ctx.font='10px "Share Tech Mono",monospace';
    ctx.textAlign='center';ctx.fillText('— at rest —',cx2,cy2-R-6);ctx.textAlign='left';}
  ctx.fillStyle='#facc15';ctx.font='11px "Share Tech Mono",monospace';
  ctx.fillText('|p| '+fmt(pm)+' kg·m/s',gx+8,gy+gh-24);
  ctx.fillStyle='#8b96ad';
  ctx.fillText('M '+fmt(M)+' kg  ·  v '+fmt(hyp(tug.vx,tug.vy),2)+' m/s',gx+8,gy+gh-10);
}
function drawHold(gx,gy,gw,gh){
  ctx.fillStyle='#160a10';ctx.fillRect(gx,gy,gw,gh);
  ctx.strokeStyle='#ffffff14';ctx.strokeRect(gx+.5,gy+.5,gw-1,gh-1);
  ctx.fillStyle='#8b96ad';ctx.font='10px "Share Tech Mono",monospace';
  ctx.fillText('CARGO HOLD  (1-4 / scroll · each shows its kick)',gx+8,gy+14);
  if(carried.length===0){ctx.fillStyle='#57534e';
    ctx.fillText('— empty — catch something —',gx+8,gy+gh/2+4);return;}
  const M=tugM();
  carried.forEach((c,i)=>{
    const y=gy+24+i*((gh-30)/CARRY_CAP),sel=i===selCargo;
    ctx.fillStyle=sel?c.col:'#1f1620';
    ctx.beginPath();ctx.roundRect(gx+8,y-10,64,18,4);ctx.fill();
    if(sel){ctx.strokeStyle='#fff';ctx.strokeRect(gx+8,y-10,64,18);}
    ctx.fillStyle=sel?'#0b0407':'#8b96ad';ctx.font='11px "Share Tech Mono",monospace';
    ctx.textAlign='center';ctx.fillText(fmt(c.m)+' kg',gx+40,y+3);ctx.textAlign='left';
    const dv=c.m*THROW_U/(M-c.m);
    ctx.fillStyle=sel?'#fb7185':'#57534e';
    ctx.fillText('Δv '+fmt(dv,2)+' m/s',gx+82,y+3);
    ctx.fillStyle='#57534e';
    ctx.fillText('p '+fmt(c.m*THROW_U)+' kg·m/s',gx+170,y+3);
  });
}
function drawEvent(gx,gy,gw,gh){
  ctx.fillStyle='#160a10';ctx.fillRect(gx,gy,gw,gh);
  ctx.strokeStyle='#ffffff14';ctx.strokeRect(gx+.5,gy+.5,gw-1,gh-1);
  ctx.fillStyle='#8b96ad';ctx.font='10px "Share Tech Mono",monospace';
  ctx.fillText('LAST EXCHANGE — equal & opposite, always',gx+8,gy+14);
  if(!lastEvent){ctx.fillStyle='#57534e';
    ctx.fillText('awaiting first transaction…',gx+8,gy+gh/2+6);return;}
  const a=clamp(1.6-lastEvent.age*0.3,0.25,1);
  ctx.globalAlpha=a;
  const cx2=gx+gw/2,cy2=gy+gh/2+8;
  const mag=Math.max(hyp(lastEvent.dpa.x,lastEvent.dpa.y),1);
  const k=Math.min(gw*0.3,46)/mag;
  const draw=(dp,col)=>{const ex=cx2+dp.x*k,ey=cy2+dp.y*k;
    ctx.strokeStyle=col;ctx.fillStyle=col;ctx.lineWidth=2.5;
    ctx.beginPath();ctx.moveTo(cx2,cy2);ctx.lineTo(ex,ey);ctx.stroke();
    const an=Math.atan2(ey-cy2,ex-cx2);
    ctx.beginPath();ctx.moveTo(ex,ey);
    ctx.lineTo(ex-8*Math.cos(an-.4),ey-8*Math.sin(an-.4));
    ctx.lineTo(ex-8*Math.cos(an+.4),ey-8*Math.sin(an+.4));
    ctx.closePath();ctx.fill();ctx.lineWidth=1;};
  draw(lastEvent.dpa,'#5eead4');
  draw(lastEvent.dpb,'#f87171');
  ctx.font='10px "Share Tech Mono",monospace';
  ctx.fillStyle='#5eead4';ctx.fillText('Δp '+lastEvent.la+' '+fmt(hyp(lastEvent.dpa.x,lastEvent.dpa.y)),gx+8,gy+gh-10);
  ctx.fillStyle='#f87171';ctx.textAlign='right';
  ctx.fillText('Δp '+lastEvent.lb+' '+fmt(hyp(lastEvent.dpb.x,lastEvent.dpb.y)),gx+gw-8,gy+gh-10);
  ctx.textAlign='left';ctx.globalAlpha=1;
}

/* ================================================== loop + input */
let last=performance.now();
function frame(now){
  const el=Math.min(.05,(now-last)/1000);last=now;
  if(lastEvent)lastEvent.age+=el;
  if(state==='play'){
    if(hitStop>0)hitStop-=el;
    else{
      if(slowmoT>0){slowmoT-=el;timeScale=0.4;}else timeScale=1;
      acc+=el*timeScale;
      while(acc>=DT&&state==='play'){step(DT);acc-=DT;}
    }
  }
  if(state==='down'){downTimer+=el;
    if(downTimer>1.1&&!$('#overlay').classList.contains('show'))showResult();}
  render();
  requestAnimationFrame(frame);
}
cv.addEventListener('pointermove',e=>{
  mouse.x=clamp((e.clientX-VX)/VS,0,WLD.w);
  mouse.y=clamp((e.clientY-VY)/VS,0,WLD.h);
});
cv.addEventListener('pointerdown',e=>{audio();
  mouse.x=clamp((e.clientX-VX)/VS,0,WLD.w);
  mouse.y=clamp((e.clientY-VY)/VS,0,WLD.h);
  if(state==='play')throwCrate();
});
window.addEventListener('wheel',e=>{
  if(state!=='play'||carried.length===0)return;
  selCargo=(selCargo+(e.deltaY>0?1:-1)+carried.length)%carried.length;
},{passive:true});
window.addEventListener('keydown',e=>{
  if(e.code==='Space')e.preventDefault();
  if(e.repeat)return;
  if(state==='play'){
    if(e.code==='Space')throwCrate();
    if(/^Digit[1-4]$/.test(e.code)){const i=+e.code.slice(5)-1;
      if(i<carried.length)selCargo=i;}
  }
  if(e.code==='Enter'&&primary&&$('#overlay').classList.contains('show'))primary();
  if(e.code==='KeyP'&&(state==='play'||state==='paused'))
    state=state==='play'?'paused':'play';
  if(e.code==='KeyM')muted=!muted;
});
document.addEventListener('click',audio,{once:true});

/* ================================================== go */
title();
requestAnimationFrame(frame);
</script>
