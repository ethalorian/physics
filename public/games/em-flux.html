<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>FLUX // an electromagnetism arcade</title>
<!--
  FLUX — an electromagnetism arcade in three acts. Eighth and final subject
  cabinet (Unit 7: Electricity & Magnetism). Single file, no dependencies.

  ACT I   STATIC     — fly a charged probe by FLIPPING YOUR OWN POLARITY:
                       attraction and repulsion are the only engine.
                       Coulomb is ORBIT's 1/r², now with two signs.
  ACT II  THE GRID   — switchboard duty: route current through parallel
                       loads, hit brightness targets, respect the fuse.
  ACT III THE DYNAMO — Faraday's law as rhythm: only CHANGE makes current.
                       Telemetry draws Φ and EMF = −dΦ/dt stacked, live.

  Speaks the arcade bridge protocol (docs/ARCADE_PATTERN.md).
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root{
    --neon:#a3e635; --neon2:#38bdf8; --amber:#fbbf24; --red:#f87171;
    --ink:#e7ecf5; --dim:#8b96ad; --card:#0c1206ee; --edge:#a3e63555;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;background:#070b04}
  body{font-family:'Share Tech Mono',ui-monospace,monospace;color:var(--ink)}
  #c{display:block;width:100vw;height:100vh;touch-action:none;cursor:crosshair}
  #crt{pointer-events:none;position:fixed;inset:0;z-index:5;
    background:repeating-linear-gradient(0deg,transparent 0 2px,#0001 2px 4px);
    mix-blend-mode:overlay}
  #vig{pointer-events:none;position:fixed;inset:0;z-index:5;
    background:radial-gradient(ellipse at center,transparent 55%,#000a 100%)}
  #overlay{position:fixed;left:0;top:0;bottom:0;width:63%;z-index:10;
    display:none;align-items:center;justify-content:center;padding:20px;overflow-y:auto}
  #overlay.show{display:flex}
  @media (max-width:900px){ #overlay{width:100%} }
  .card{background:var(--card);border:1px solid var(--edge);border-radius:14px;
    padding:26px 30px;max-width:540px;width:100%;
    box-shadow:0 0 40px #a3e63522, inset 0 0 60px #0006;
    animation:pop .25s ease-out}
  @keyframes pop{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
  h1,h2{font-family:'Orbitron',sans-serif;letter-spacing:.06em}
  h1{font-size:42px;font-weight:900;color:var(--neon);text-shadow:0 0 18px #a3e63588}
  h2{font-size:22px;color:var(--neon);text-shadow:0 0 12px #a3e63566;margin-bottom:10px}
  .tag{color:var(--neon2);font-size:13px;letter-spacing:.35em;margin:4px 0 16px}
  .sub{color:var(--dim);font-size:14px;line-height:1.55;margin-bottom:14px}
  .stat{display:flex;justify-content:space-between;font-size:14px;padding:3px 0;
    border-bottom:1px dashed #ffffff14}
  .stat b{color:var(--amber)}
  .good{color:#34d399} .bad{color:var(--red)}
  .btn{display:inline-block;margin-top:18px;font-family:'Orbitron',sans-serif;
    font-size:15px;font-weight:700;letter-spacing:.12em;color:#0c1404;
    background:var(--neon);border:none;border-radius:8px;padding:12px 26px;
    cursor:pointer;box-shadow:0 0 18px #a3e63566;transition:transform .08s}
  .btn:hover{transform:scale(1.05)} .btn:active{transform:scale(.97)}
  .btn.alt{background:#1f2937;color:var(--ink);box-shadow:none;border:1px solid #ffffff22}
  .choices{display:grid;gap:8px;margin-top:12px}
  .choice{font-family:'Share Tech Mono',monospace;font-size:15px;text-align:left;
    background:#101a08;border:1px solid #ffffff1c;border-radius:8px;color:var(--ink);
    padding:11px 14px;cursor:pointer;transition:all .1s}
  .choice:hover{border-color:var(--neon);background:#15220a}
  .choice.right{background:#0c2a22;border-color:#34d399;color:#34d399}
  .choice.wrong{background:#2a0c12;border-color:var(--red);color:var(--red)}
  .kbd{display:inline-block;border:1px solid #ffffff33;border-bottom-width:3px;
    border-radius:5px;padding:1px 7px;font-size:12px;color:var(--amber);background:#ffffff0a}
  .explain{margin-top:12px;padding:10px 12px;border-left:3px solid var(--amber);
    background:#fbbf2410;font-size:13px;line-height:1.5;color:#fde68a;display:none}
  .bigscore{font-family:'Orbitron',sans-serif;font-size:34px;font-weight:900;
    color:var(--amber);text-shadow:0 0 16px #fbbf2477;margin:8px 0}
  .planetchip{font-family:'Orbitron',sans-serif;font-size:12px;letter-spacing:.2em;
    color:var(--neon2);border:1px solid #38bdf855;border-radius:99px;padding:4px 12px}
  .actgrid{display:grid;gap:12px;margin-top:14px}
  .actcard{display:block;width:100%;text-align:left;background:#0e1607;cursor:pointer;
    border:1px solid #ffffff1c;border-radius:12px;padding:14px 18px;color:var(--ink);
    font-family:'Share Tech Mono',monospace;transition:all .12s}
  .actcard:hover:not(.locked){border-color:var(--ac);box-shadow:0 0 22px var(--acGlow);transform:translateX(4px)}
  .actcard.locked{opacity:.45;cursor:not-allowed}
  .actname{font-family:'Orbitron',sans-serif;font-weight:700;font-size:17px;
    letter-spacing:.08em;color:var(--ac)}
  .actsub{font-size:12.5px;color:var(--dim);margin-top:4px;line-height:1.45}
  .hiline{font-size:11px;color:var(--amber);margin-top:6px;letter-spacing:.08em}
  .teachlink{display:inline-block;margin-top:14px;font-size:11px;color:#57534e;
    letter-spacing:.15em;cursor:pointer;border-bottom:1px dotted #57534e}
  .teachlink:hover{color:var(--dim)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="crt"></div><div id="vig"></div>
<div id="overlay"></div>

<script>
"use strict";
/* ================================================== utils */
const $=q=>document.querySelector(q);
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const rnd=(a,b)=>a+Math.random()*(b-a);
const pick=a=>a[Math.floor(Math.random()*a.length)];
const fmt=(n,d=1)=>{const s=(+n).toFixed(d);return s.replace(/\.0+$/,'');};
const hyp=Math.hypot, TAU=Math.PI*2;
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

/* ================================================== canvas */
const cv=$('#c'),ctx=cv.getContext('2d');
let W=0,H=0,DPR=1;
function resize(){DPR=Math.min(2,window.devicePixelRatio||1);
  W=window.innerWidth;H=window.innerHeight;
  cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);}
window.addEventListener('resize',resize);resize();

/* ================================================== persistence */
let PROG={a2:false,a3:false,teacher:false}, HIS={1:0,2:0,3:0};
try{Object.assign(PROG,JSON.parse(localStorage.getItem('flux2_prog')||'{}'));
    Object.assign(HIS, JSON.parse(localStorage.getItem('flux2_hi')||'{}'));}catch(e){}
function saveProg(){try{localStorage.setItem('flux2_prog',JSON.stringify(PROG));}catch(e){}}
function saveHi(){try{localStorage.setItem('flux2_hi',JSON.stringify(HIS));}catch(e){}}
function unlocked(a){return a===1||PROG.teacher||(a===2&&PROG.a2)||(a===3&&PROG.a3);}

/* ================================================== audio */
let AC=null,muted=false,humGain=null,humOsc=null;
function audio(){if(AC||muted)return;try{
  AC=new (window.AudioContext||window.webkitAudioContext)();
  humOsc=AC.createOscillator();humOsc.type='sawtooth';humOsc.frequency.value=60;
  const lp=AC.createBiquadFilter();lp.type='lowpass';lp.frequency.value=200;
  humGain=AC.createGain();humGain.gain.value=0;
  humOsc.connect(lp);lp.connect(humGain);humGain.connect(AC.destination);humOsc.start();}catch(e){}}
function setHum(level,f){if(!AC||!humGain)return;
  humGain.gain.setTargetAtTime(muted?0:clamp(level,0,0.06),AC.currentTime,0.08);
  if(humOsc&&f)humOsc.frequency.setTargetAtTime(clamp(f,40,300),AC.currentTime,0.08);}
function beep(f,dur=.12,type='square',vol=.12,slide=0){if(!AC||muted)return;
  const o=AC.createOscillator(),g=AC.createGain();o.type=type;o.frequency.value=f;
  if(slide)o.frequency.exponentialRampToValueAtTime(Math.max(30,f+slide),AC.currentTime+dur);
  g.gain.value=vol;g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+dur);
  o.connect(g);g.connect(AC.destination);o.start();o.stop(AC.currentTime+dur);}
function chord(notes,step=.09){notes.forEach((n,i)=>setTimeout(()=>beep(n,.22,'triangle',.12),i*step*1000));}
function zap(){beep(1200,.2,'sawtooth',.2,-900);beep(80,.25,'square',.18);}

/* ================================================== host-app bridge */
const ARCADE={
  embedded:window.parent!==window,
  playId:null, pendingCoin:null,
  emit(type,data){if(this.embedded)
    window.parent.postMessage(Object.assign({source:'flux-arcade',type},data||{}),'*');},
  requestCoin(cb){
    if(!this.embedded){cb({ok:true,practice:true});return;}
    this.pendingCoin=cb;
    this.emit('arcade:coinRequest');
    setTimeout(()=>{if(this.pendingCoin===cb){this.pendingCoin=null;cb({ok:true,practice:true});}},900);
  },
  reportScore(final){
    if(this.playId)this.emit('arcade:score',{score,act,final:!!final});
  },
};
window.addEventListener('message',e=>{
  const m=e.data||{};
  if(m.type==='arcade:coinAccepted'&&ARCADE.pendingCoin){
    ARCADE.playId=m.playId||null;
    const cb=ARCADE.pendingCoin;ARCADE.pendingCoin=null;cb({ok:true,practice:!m.playId});}
  if(m.type==='arcade:coinDenied'&&ARCADE.pendingCoin){
    const cb=ARCADE.pendingCoin;ARCADE.pendingCoin=null;cb({ok:false,reason:m.reason});}
});

/* ================================================== level data
   ACT I  world 48×30. pylons:[{x,y,q:±1..±2}] fixed charges; your probe has
          |q| = 1 and ONE control: flip sign. F = K·q·qi/r² on you. Touch a
          pylon = ZAP. dock:[x,y,r]. Reach the dock slower than vDock.
   ACT II battery V=12 → fuse Imax → series Rs → parallel branches
          {R, sw, target:[lo,hi] brightness % or 0 for OFF}. Brightness from
          P = V'²/R against a reference. Hold every target 4 s. Surges may
          rewrite a bulb's R mid-shift.
   ACT III magnet stroke x∈[0,1]: hold = drive in, release = spring out.
          Φ = S(x), EMF = −dΦ/dt, I = EMF/R. Bank energy to the target;
          |I| over Imax trips the breaker. */
const K=130, VDOCK=6;
const ACT_META={
 1:{name:'STATIC', col:'#38bdf8', blurb:'Your engine is a SIGN: flip + to −, repulsion to attraction, and surf Coulomb’s inverse square between the pylons. Weak trim thrusters steer; the field does the flying. Gravity wishes it had this trick.'},
 2:{name:'THE GRID', col:'#fbbf24', blurb:'Switchboard duty. Parallel branches each draw their own current and the fuse counts ALL of it. Light exactly what the order sheet says — V = IR is the whole rulebook.'},
 3:{name:'THE DYNAMO', col:'#a3e635', blurb:'A magnet, a coil, and Faraday’s one commandment: only CHANGE makes current. Pump for power, watch EMF ride the slope of the flux — and don’t out-shove the breaker.'},
};
const ACT1=[
 {name:'FIRST FLIP', dur:75,
  probe:{x:5,y:15}, dock:{x:43,y:15,r:3},
  pylons:[{x:24,y:15,q:2}],
  tip:'One positive pylon between you and the dock. Go NEGATIVE to fall toward it, trim SIDEWAYS with the thrusters so you swing AROUND instead of in, then flip POSITIVE on the far side and let the repulsion fling you out. The dashed line shows your flipped future — fly the line you like.'},
 {name:'THE GATE', dur:75,
  probe:{x:5,y:15}, dock:{x:43,y:15,r:3},
  pylons:[{x:22,y:9,q:2},{x:22,y:21,q:-2}],
  tip:'A + above, a − below. Whatever sign you wear, one pulls while the other pushes — the pair STEERS you. Note the force falls as 1/r²: passing close to a pylon is where all the action (and all the danger) lives.'},
 {name:'THE LADDER', dur:85,
  probe:{x:4,y:26}, dock:{x:44,y:5,r:3},
  pylons:[{x:14,y:22,q:2},{x:24,y:15,q:-2},{x:34,y:9,q:2}],
  tip:'Alternating charges in a row. Ride each one: attract in, flip to repel out, catch the next. Polarity surfing has a rhythm — fall toward, flip, fling away. Lightning does something similar, with less patience.'},
 {name:'THE NARROWS', dur:85,
  probe:{x:5,y:15}, dock:{x:44,y:15,r:2.6},
  pylons:[{x:18,y:11,q:2},{x:18,y:19,q:2},{x:31,y:11,q:-2},{x:31,y:19,q:-2}],
  tip:'Two + posts, then two − posts, with a slot between each pair. Stay negative and the first gate funnels you in; go positive for the second. Symmetric charges cancel sideways forces ON the centerline — drift off it and they do not.'},
 {name:'THE STORM YARD', dur:95,
  probe:{x:4,y:5}, dock:{x:44,y:25,r:2.6},
  pylons:[{x:13,y:10,q:2},{x:22,y:20,q:-2},{x:30,y:8,q:2},{x:37,y:18,q:-1},{x:25,y:5,q:-1},{x:15,y:25,q:1}],
  tip:'Six pylons, every sign, no straight lines. Read the field before you fly it — where the pulls and pushes balance, you coast; where they align, you scream. The dock takes you under 6 speed. Plan your last flip early.'},
];
const ACT2=[
 {name:'THREE LAMPS', dur:70, V:12, Imax:5, Rs:0,
  branches:[{R:6,target:[60,100]},{R:6,target:[60,100]},{R:6,target:0}],
  surges:[],
  tip:'Three identical lamps in PARALLEL: each one sees the full 12 V and draws its own 2 A — switches don’t share, they ADD. The order sheet wants two lit, one dark, and the fuse tolerates 5 A. Count before you close.'},
 {name:'THE SHARED LINE', dur:80, V:12, Imax:6, Rs:2,
  branches:[{R:6,target:[35,65]},{R:6,target:[35,65]},{R:6,target:0}],
  surges:[],
  tip:'Now a 2 Ω series resistor guards the line. Every branch you close pulls MORE total current, which drops MORE voltage across that resistor — and every lamp dims together. Series steals; parallel shares. Find the combination the targets want.'},
 {name:'MIXED ORDERS', dur:85, V:12, Imax:6, Rs:1,
  branches:[{R:4,target:[55,90]},{R:8,target:[20,50]},{R:6,target:0},{R:12,target:[8,35]}],
  surges:[],
  tip:'Different resistances now. Low-R lamps burn bright and gulp current; high-R lamps sip and glow. P = V²/R: resistance is the dimmer knob built into the bulb itself. Satisfy four different appetites without feeding the fuse.'},
 {name:'THE SURGE', dur:90, V:12, Imax:6, Rs:1,
  branches:[{R:6,target:[40,75]},{R:6,target:[40,75]},{R:8,target:[20,55]}],
  surges:[{at:25,branch:0,R:3},{at:55,branch:2,R:4}],
  tip:'Mid-shift, a lamp’s filament SAGS — its resistance drops and it suddenly gulps double current. The board will flash the change. Re-route fast: yesterday’s safe combination is today’s blown fuse.'},
 {name:'BLACKOUT WATCH', dur:95, V:12, Imax:5, Rs:1.5,
  branches:[{R:5,target:[35,70]},{R:7,target:[25,60]},{R:6,target:0},{R:10,target:[10,40]}],
  surges:[{at:20,branch:1,R:4},{at:45,branch:3,R:6},{at:70,branch:0,R:7}],
  tip:'A mean fuse, a hungry line, and three surges on the schedule. This is the dispatcher’s art: hold every target inside its band while the grid shifts under your hands. Ohm wrote the law; you enforce it.'},
];
const ACT3=[
 {name:'FIRST LIGHT', dur:70, R:2, Imax:9, vIn:2.2, vOut:1.6, Etarget:260, ac:false,
  tip:'Hold to drive the magnet in, release and the spring returns it. Watch the desk: flux Φ climbs as the magnet enters — and the EMF below it is the SLOPE of that curve. Magnet parked = flat Φ = zero volts, no matter how deep it sits. Faraday’s whole law is that one picture.'},
 {name:'THE SPRINT', dur:70, R:2, Imax:8, vIn:3.0, vOut:2.0, Etarget:380, ac:false,
  tip:'A faster drive. Same magnet, same coil, same depth — but quicker change means bigger EMF and bigger current. Speed, not strength, is what the coil pays for. Mind the breaker: it counts amps, not effort.'},
 {name:'STIFF SPRING', dur:75, R:1.6, Imax:8, vIn:2.4, vOut:3.4, Etarget:430, ac:false,
  tip:'The return spring is stronger than your push now — the OUT-stroke makes more EMF than the in-stroke (look: the flux slope is steeper going down). Induction doesn’t care which way the flux changes, only how fast. Harvest the recoil.'},
 {name:'BREAKER’S EDGE', dur:80, R:1.2, Imax:6.5, vIn:3.2, vOut:2.6, Etarget:480, ac:false,
  tip:'A low-resistance coil: every volt of EMF becomes MORE current (I = EMF/R), so the breaker is suddenly very near. Find the deepest stroke that stays under 6.5 A — the rhythm of a professional, not the frenzy of an amateur.'},
 {name:'SIXTY HERTZ', dur:85, R:1.5, Imax:8, vIn:3.0, vOut:3.0, Etarget:520, ac:true,
  tip:'Pump steadily and look at the EMF trace: in, out, in, out — the current ALTERNATES. You are hand-cranking AC, the same wiggle that leaves every power plant on Earth. FURNACE’s engine spins this exact coil at scale. Fill the bank and finish the curriculum.'},
];
const YARDS=['SUBSTATION 9','THE SWITCHHOUSE','COIL BARN','PYLON FIELD','BREAKER ROW','THE CAPACITORIUM','DYNAMO HALL'];
function endless1(w){
  const n=Math.min(7,2+w),py=[];
  for(let i=0;i<n;i++)py.push({x:Math.round(rnd(10,40)),y:Math.round(rnd(4,26)),
    q:pick([1,2,-1,-2])});
  return {name:pick(YARDS)+' · RUN '+w, dur:Math.max(60,90-w*2),
    probe:{x:4,y:Math.round(rnd(5,25))}, dock:{x:44,y:Math.round(rnd(5,25)),r:Math.max(2.2,3-w*0.1)},
    pylons:py,
    tip:'Unmapped pylons. Same two rules: likes repel, unlikes attract.'};
}
function endless2(w){
  const n=Math.min(5,3+Math.floor(w/2)),br=[];
  for(let i=0;i<n;i++){const R=pick([4,5,6,7,8,10,12]);
    br.push({R,target:Math.random()<0.25?0:[Math.round(rnd(15,45)),Math.round(rnd(55,90))]});}
  const sg=[];
  for(let i=0;i<Math.min(3,w);i++)sg.push({at:Math.round(rnd(15,70)),
    branch:Math.floor(rnd(0,n)),R:pick([3,4,5,7])});
  return {name:pick(YARDS)+' · SHIFT '+w, dur:Math.max(70,95-w*2),
    V:12, Imax:Math.max(4.5,6.5-w*0.2), Rs:+rnd(0.5,2).toFixed(1),
    branches:br, surges:sg,
    tip:'New orders, same law.'};
}
function endless3(w){
  return {name:pick(YARDS)+' · CRANK '+w, dur:Math.max(65,85-w*2),
    R:+Math.max(1,2.2-w*0.15).toFixed(1), Imax:Math.max(5.5,9-w*0.4),
    vIn:+(2.2+w*0.15).toFixed(1), vOut:+(1.8+w*0.15).toFixed(1),
    Etarget:Math.round(260+w*45), ac:w>2,
    tip:'The bank is never full for long.'};
}
const ACT_LEVELS={1:ACT1,2:ACT2,3:ACT3};
const ENDLESS={1:endless1,2:endless2,3:endless3};

/* ================================================== state */
let act=1, state='title', lv=null, levelIdx=0, wave=0, lives=3, score=0, streak=0;
let probe={x:5,y:15,vx:0,vy:0,sign:1};                 // act I
let neutral=false,holdTO=null;                         // act I: hold = chargeless coast
function probeQ(){return neutral?0:probe.sign;}        // effective charge
// cold-gas trim thrusters — weak (a = 4 vs Coulomb's hundreds up close),
// and BOTTLED: 8 s of gas per attempt. Coulomb is the engine; this is the
// rudder — burn it all flying straight and you'll drift the rest of the way.
const THR_A=4, GAS_MAX=8;
let gas=GAS_MAX;
const heldK={};let thrKX=0,thrKY=0,thrTX=0,thrTY=0,pd=null;
function updThrK(){
  thrKX=(heldK.ArrowRight?1:0)-(heldK.ArrowLeft?1:0);
  thrKY=(heldK.ArrowDown?1:0)-(heldK.ArrowUp?1:0);}
function thrustVec(){
  let x=thrKX||thrTX,y=thrKY||thrTY;
  const m2=hyp(x,y);return m2>0.01?[x/m2,y/m2]:[0,0];}
let branches=[], selBr=0, surgeIdx=0, gridHold=0, fuseHot=0; // act II
let mag=0, magV=0, driving=false, bank=0, lastEMF=0, lastI=0, tripT=0; // act III
let t=0, acc=0, attemptT=0, samples=[], lastSamp=-1;
let particles=[], popups=[], shake=0, flash=0;
let landedOK=false, downTimer=0, lastResult=null, primary=null;
function bumpHi(){if(score>HIS[act]){HIS[act]=score;saveHi();}}
function popup(text,col,size){popups.push({text,col:col||'#fbbf24',size:size||24,t:0,jx:rnd(-12,12)});}
function burstPx(px,py,n,cols,sp){for(let i=0;i<n;i++){const a=rnd(0,TAU),s2=rnd(20,sp||90);
  particles.push({px,py,vx:Math.cos(a)*s2,vy:Math.sin(a)*s2,
    life:rnd(.3,.9),col:pick(cols),size:rnd(1.5,3.5)});}}
/* ACT II solver: V' = V / (1 + Rs·Σ(1/Ri)) over CLOSED branches.
   Branch current = V'/Ri; brightness % = 100·(V'²/Ri)/(V²/Ri) = 100·(V'/V)². */
function solveGrid(){
  let sumInv=0;
  for(const b of branches)if(b.sw)sumInv+=1/b.R;
  const Vp=sumInv>0?lv.V/(1+lv.Rs*sumInv):lv.V;
  let Itot=0;
  for(const b of branches){
    b.I=b.sw?Vp/b.R:0;Itot+=b.I;
    b.bright=b.sw?Math.round(100*(Vp/lv.V)*(Vp/lv.V)*(6/b.R)):0;
    b.bright=clamp(b.bright,0,130);
  }
  return {Vp,Itot};
}
function fluxS(x){return (1-Math.cos(Math.PI*clamp(x,0,1)))/2;} // smooth 0→1

/* ================================================== overlay + screens */
function overlay(html){const o=$('#overlay');o.innerHTML=html;o.classList.add('show');}
function hideOverlay(){$('#overlay').classList.remove('show');}
function title(){

function qNum(text,ans,unit,distractors,explain){
  const vals=[+fmt(ans)];
  for(const d of distractors){let v=+fmt(d);
    while(vals.some(x=>Math.abs(x-v)<0.05))v=+fmt(v+rnd(0.8,2.2));
    vals.push(v);}
  const choices=shuffle(vals.map((v,i)=>({s:fmt(v)+' '+unit,ok:i===0?1:0})));
  return {text,choices,explain};
}
function qCon(text,right,wrongs,explain){
  return {text,choices:shuffle([{s:right,ok:1}].concat(wrongs.map(s=>({s,ok:0})))),explain};
}

       `I = V/R = ${V}/${R} = ${fmt(V/R)} A. Ohm’s law is the entire grammar of Act II — every switch you threw was this division.`);},

   ()=>qCon('You close one more parallel lamp and every lamp on the board dims slightly. The culprit is…',

     'Ideal parallel lamps would not interact — but real supply lines have resistance, and V_line = I_total·R_s grows with every branch. Your house lights flicker when the AC kicks on for exactly this reason.'),
   ()=>{const V=12,I=pick([2,3]);
     return qNum(`A lamp draws ${I} A at ${V} V. Its power is…`,
       V*I,'W',[V/I,V+I,V*I/2],
       `P = IV = ${V} × ${I} = ${V*I} W — joules per second, the bridge between this cabinet and CASCADE. Brightness is just power you can see.`);},
   ()=>qCon('The fuse in your board exists to…',
     'melt FIRST when current runs too high, breaking the circuit before the wiring burns',['boost the voltage','store spare charge','keep lamps equally bright'],

  ];
  const bank3=[
   ()=>qCon('A strong magnet rests motionless INSIDE a coil. The induced voltage is…',

   ()=>qCon('You shove the magnet in TWICE as fast. The peak EMF…',
     'doubles — EMF is proportional to the rate of change',['stays the same','quadruples','halves'],
     'EMF = −dΦ/dt: same flux change in half the time means twice the slope. Speed is the dynamo’s throttle — and the breaker’s favorite reason to trip.'),
   ()=>qCon('A generator and an electric motor are…',
     'the same machine run in opposite directions',['completely unrelated devices','a magnet versus a battery','AC versus DC'],
     'Spin the coil, get current (generator); feed it current, get spin (motor). One device, two directions — many EVs literally flip theirs to charge the battery while braking. CASCADE’s regen brake, unmasked.'),

     'Flux up induces one direction; flux down induces the other. Rhythm in, alternation out — scale your hand up to a steam-spun turbine and you have the 60 Hz in every outlet.'),

/* ================================================== physics */
const DT=1/120;
let lastPhi=0;
function step(dt){
  t+=dt;attemptT+=dt;
  if(act===1){
    let ax=0,ay=0;
    const q=probeQ(); // 0 while neutral — a chargeless probe feels NO electric force
    for(const p of lv.pylons){
      const dx=probe.x-p.x,dy=probe.y-p.y,r=Math.max(1.2,hyp(dx,dy));
      const F=K*q*p.q/(r*r); // + product = repulsion, along (probe−pylon)
      ax+=F*dx/r;ay+=F*dy/r;
      if(r<2){failAttempt('ZAP — PYLON CONTACT',
        'The inverse square has teeth up close: force quadruples every halving of the gap. Flip earlier — or go NEUTRAL and coast straight past the danger.');return;}
    }
    const [tx2,ty2]=thrustVec();
    if((tx2||ty2)&&gas>0){ax+=tx2*THR_A;ay+=ty2*THR_A;gas=Math.max(0,gas-dt);}
    const drg=Math.exp(-0.10*dt); // ionized mist: mild drag keeps speeds flyable
    probe.vx=clamp((probe.vx+ax*dt)*drg,-30,30);
    probe.vy=clamp((probe.vy+ay*dt)*drg,-30,30);
    probe.x+=probe.vx*dt;probe.y+=probe.vy*dt;
    if(probe.x<1){probe.x=1;probe.vx=Math.abs(probe.vx)*0.5;}
    if(probe.x>47){probe.x=47;probe.vx=-Math.abs(probe.vx)*0.5;}
    if(probe.y<1){probe.y=1;probe.vy=Math.abs(probe.vy)*0.5;}
    if(probe.y>29){probe.y=29;probe.vy=-Math.abs(probe.vy)*0.5;}
    const sp=hyp(probe.vx,probe.vy);
    setHum(sp/60,60+sp*4);
    const d=hyp(probe.x-lv.dock.x,probe.y-lv.dock.y);
    if(d<lv.dock.r){
      if(sp<=VDOCK){
        succeed(`Docked at ${fmt(sp,1)} speed — flown entirely on attraction and repulsion.`,
          Math.round((VDOCK-sp)*40));return;}
      else if(Math.random()<0.05)popup('TOO HOT — '+fmt(sp,1),'#f87171',16);
    }
    if(attemptT>=lv.dur){failAttempt('PROBE RECALLED',
      'Plan in ellipses, not lines: fall toward a pylon, flip at closest approach, and let the fling do the traveling. Coulomb is your engine — stop fighting it.');return;}
  }else if(act===2){
    while(surgeIdx<lv.surges.length&&lv.surges[surgeIdx].at<=attemptT){
      const s=lv.surges[surgeIdx++];
      branches[s.branch].R=s.R;
      popup('SURGE — LAMP '+(s.branch+1)+' SAGGED','#f87171',24);
      zap();shake=.4;flash=.3;
    }
    const {Itot}=solveGrid();
    setHum(Itot/lv.Imax*0.05,55+Itot*8);
    if(Itot>lv.Imax){fuseHot+=dt;
      if(Math.random()<.3)burstPx(W*0.32,H*0.2,3,['#fbbf24','#f87171'],60);
      if(fuseHot>1.5){failAttempt('FUSE BLOWN',
        'The fuse counts EVERY branch — parallel paths add their currents on the supply line. Open something before you close something.');return;}}
    else fuseHot=Math.max(0,fuseHot-dt*0.8);
    let allOk=true;
    for(const b of branches){
      const ok=b.target===0?(!b.sw):(b.sw&&b.bright>=b.target[0]&&b.bright<=b.target[1]);
      b.ok=ok;if(!ok)allOk=false;
    }
    if(allOk){gridHold+=dt;
      if(gridHold>=4){
        const head=Math.max(0,lv.Imax-Itot);
        succeed(`Every order held — ${fmt(Itot,1)} A drawn with ${fmt(head,1)} A of headroom on the fuse.`,
          Math.round(head*60));return;}}
    else gridHold=0;
    if(attemptT>=lv.dur){failAttempt('SHIFT BELL — ORDERS UNFILLED',
      'Work the math before the switches: each closed branch draws V/R on its own. Add them up, check the fuse, THEN throw. Dispatchers calculate; gamblers re-wire.');return;}
  }else{
    magV=driving?lv.vIn:-lv.vOut;
    mag=clamp(mag+magV*dt,0,1);
    const phi=fluxS(mag)*10;
    const emf=-(phi-lastPhi)/dt;
    lastPhi=phi;
    const I=emf/lv.R;
    lastEMF=emf;lastI=I;
    bank+=I*I*lv.R*dt*0.12; // scaled harvest — ~9 punctuated cycles per bank
    setHum(Math.abs(I)/lv.Imax*0.06,55+Math.abs(I)*10);
    if(t-lastSamp>=1/40){samples.push({t,phi,emf,I});lastSamp=t;
      if(samples.length>4000)samples.shift();}
    // thermal breaker: overcurrent heats it, pauses cool it 2.5× faster —
    // punctuated pumping survives; continuous flogging trips.
    if(Math.abs(I)>lv.Imax){tripT+=dt;
      if(tripT>0.6){failAttempt('BREAKER TRIP',
        'I = EMF/R, and EMF rides your stroke speed. Pump, then BREATHE — the breaker cools in the pauses. The dynamo rewards rhythm, not rage.');return;}}
    else tripT=Math.max(0,tripT-dt*2.5);
    if(bank>=lv.Etarget){
      succeed(`${Math.round(bank)} J banked${lv.ac?' on a clean alternating rhythm':''} — every joule of it induced by CHANGE.`,
        Math.round(clamp(Math.abs(lastI)/lv.Imax,0,1)*200));return;}
    if(attemptT>=lv.dur){failAttempt('SHIFT BELL — BANK SHORT',
      'A parked magnet earns nothing — the flat parts of your flux curve are wasted seconds. Keep it MOVING; the slope is the salary.');return;}
  }
}

/* ================================================== render */
function sceneRect(){const pw=Math.min(420,W*0.34);return {w:W-pw,pw};}
function render(){
  const {w:SW,pw}=sceneRect();

  ctx.clearRect(0,0,W,H);
  ctx.save();
  if(shake>0){ctx.translate(rnd(-1,1)*shake*10,rnd(-1,1)*shake*10);shake=Math.max(0,shake-0.02);}
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#060a03');bg.addColorStop(1,'#0c1406');
  ctx.fillStyle=bg;ctx.fillRect(-20,-20,SW+40,H+40);
  if(act===1)scene1(SW,now);
  else if(act===2)scene2(SW,now);
  else scene3(SW,now);
  for(let i=particles.length-1;i>=0;i--){const p=particles[i];
    p.life-=1/60;if(p.life<=0){particles.splice(i,1);continue;}
    p.px+=p.vx/60;p.py+=p.vy/60;p.vy+=50/60;
    ctx.globalAlpha=clamp(p.life,0,1);ctx.fillStyle=p.col;
    ctx.fillRect(p.px,p.py,p.size,p.size);}

  for(let i=popups.length-1;i>=0;i--){const p=popups[i];

    ctx.globalAlpha=clamp(1.4-p.t,0,1);

    ctx.fillText(p.text,SW/2+p.jx,H*0.26-p.t*40);}
  ctx.globalAlpha=1;ctx.textAlign='left';
  drawHUD(SW);
  if(state==='paused'){ctx.fillStyle='#000a';ctx.fillRect(0,0,SW,H);
    ctx.fillStyle='#a3e635';ctx.font='900 30px Orbitron,monospace';ctx.textAlign='center';
    ctx.fillText('PAUSED',SW/2,H/2);ctx.textAlign='left';}
  ctx.restore();
  if(flash>0){ctx.fillStyle=landedOK?'#a3e635':'#f87171';
    ctx.globalAlpha=flash*.35;ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;
    flash=Math.max(0,flash-0.03);}
  drawPanel(SW,pw);
}
function scene1(SW,now){
  const s=Math.min((SW-40)/48,(H-90)/30);
  const ox=(SW-48*s)/2,oy=(H-30*s)/2+8;
  const X2=x=>ox+x*s,Y2=y=>oy+y*s;
  ctx.strokeStyle='#a3e63522';ctx.strokeRect(ox,oy,48*s,30*s);
  // field hints: the force YOUR probe (current charge) would feel, on a coarse grid
  const qFld=probeQ()||probe.sign; // while neutral, show the sign you'll return to
  for(let gx2=4;gx2<48;gx2+=5)for(let gy2=3;gy2<30;gy2+=5){
    let fx=0,fy=0;
    for(const p of lv.pylons){
      const dx=gx2-p.x,dy=gy2-p.y,r=Math.max(2,hyp(dx,dy));
      const F=qFld*p.q/(r*r);fx+=F*dx/r;fy+=F*dy/r;}
    const m2=hyp(fx,fy);if(m2<0.002)continue;
    const L=clamp(m2*220,4,14);
    ctx.strokeStyle='#a3e63530';ctx.fillStyle='#a3e63540';

  ctx.beginPath();ctx.arc(X2(lv.dock.x),Y2(lv.dock.y),lv.dock.r*s,0,TAU);ctx.stroke();ctx.lineWidth=1;
  ctx.fillStyle='#34d399';ctx.font='9px "Share Tech Mono",monospace';ctx.textAlign='center';
  ctx.fillText('DOCK < '+VDOCK,X2(lv.dock.x),Y2(lv.dock.y-lv.dock.r)-6);ctx.textAlign='left';
  // pylons
  for(const p of lv.pylons){
    const px=X2(p.x),py=Y2(p.y),R2=Math.max(8,Math.abs(p.q)*5*s*0.12+8);
    const col=p.q>0?'#f87171':'#38bdf8';
    ctx.fillStyle=col+'33';
    ctx.beginPath();ctx.arc(px,py,R2*2.2,0,TAU);ctx.fill();
    ctx.fillStyle=col;ctx.strokeStyle='#0a0f04';ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(px,py,R2,0,TAU);ctx.fill();ctx.stroke();ctx.lineWidth=1;
    ctx.fillStyle='#0a0f04';ctx.font='700 13px Orbitron,monospace';ctx.textAlign='center';
    ctx.fillText(p.q>0?'+':'−',px,py+5);ctx.textAlign='left';
  }
  // trajectory ghosts — both futures, drawn on the field itself.
  // Solid: the path your CURRENT charge flies. Dashed: the path if you flip.
  const predictPath=(q)=>{
    let x=probe.x,y=probe.y,vx=probe.vx,vy=probe.vy;const pts=[];
    const sub=1/30,drg=Math.exp(-0.10*sub);
    const [ptx,pty]=gas>0?thrustVec():[0,0]; // assume you keep doing what you're doing
    for(let i=0;i<110;i++){
      let ax=(i*sub<gas)?ptx*THR_A:0,ay=(i*sub<gas)?pty*THR_A:0;
      for(const p of lv.pylons){
        const dx=x-p.x,dy=y-p.y,r=Math.max(1.2,hyp(dx,dy));
        if(r<2)return pts; // preview ends where the ZAP would be
        const F=K*q*p.q/(r*r);ax+=F*dx/r;ay+=F*dy/r;}
      vx=clamp((vx+ax*sub)*drg,-30,30);vy=clamp((vy+ay*sub)*drg,-30,30);
      x+=vx*sub;y+=vy*sub;
      if(x<1||x>47||y<1||y>29)return pts;
      if(i%2===0)pts.push([x,y]);
    }
    return pts;};
  const drawPath=(pts,col,dash)=>{
    if(pts.length<2)return;
    ctx.strokeStyle=col;ctx.lineWidth=1.5;if(dash)ctx.setLineDash([4,5]);

    pts.forEach((pp,i)=>{i?ctx.lineTo(X2(pp[0]),Y2(pp[1])):ctx.moveTo(X2(pp[0]),Y2(pp[1]));});

  ctx.beginPath();ctx.arc(px,py,9,0,TAU);ctx.fill();ctx.stroke();ctx.lineWidth=1;
  ctx.fillStyle='#0a0f04';ctx.font='700 12px Orbitron,monospace';ctx.textAlign='center';

  ctx.fillStyle='#8b96ad';ctx.font='9px "Share Tech Mono",monospace';

  ctx.fillStyle=gas>2?'#a3e635':'#f87171';
  ctx.fillRect(SW/2-88,H-42,176*(gas/GAS_MAX),8);

  ctx.fillText('cold gas '+fmt(gas,1)+'s',SW/2,H-50);

  ctx.textAlign='left';

function drawCoulomb(gx,gy,gw,gh){
  ctx.fillStyle='#0f1808';ctx.fillRect(gx,gy,gw,gh);
  ctx.strokeStyle='#ffffff14';ctx.strokeRect(gx+.5,gy+.5,gw-1,gh-1);

  let near=null,nd=1e9;

    if(d<nd){nd=d;near=p;}}

  ctx.fillText('THE PROBE’S LEDGER',gx+8,gy+14);
  ctx.font='12px "Share Tech Mono",monospace';
  let y=gy+34;
  ctx.fillStyle=neutral?'#9ca3af':probe.sign>0?'#f87171':'#38bdf8';
  ctx.fillText('your charge: '+(neutral?'0 (neutral — no force)':probe.sign>0?'+1 (positive)':'−1 (negative)'),gx+10,y);y+=20;
  ctx.fillStyle='#fbbf24';
  ctx.fillText('speed '+fmt(hyp(probe.vx,probe.vy),1)+'  (dock under '+VDOCK+')',gx+10,y);y+=20;
  ctx.fillStyle='#8b96ad';
  ctx.fillText('likes repel · unlikes attract',gx+10,y);y+=20;
  ctx.fillStyle='#57534e';
  ctx.fillText('the grid arrows show the force',gx+10,y);y+=16;
  ctx.fillText('on YOU — they flip when you do.',gx+10,y);
}
function drawGridInfo(gx,gy,gw,gh){
  ctx.fillStyle='#0f1808';ctx.fillRect(gx,gy,gw,gh);
  ctx.strokeStyle='#ffffff14';ctx.strokeRect(gx+.5,gy+.5,gw-1,gh-1);
  ctx.fillStyle='#8b96ad';ctx.font='10px "Share Tech Mono",monospace';
  ctx.fillText('THE DISPATCHER’S LEDGER — V = IR everywhere',gx+8,gy+14);
  const {Vp,Itot}=solveGrid();
  ctx.font='12px "Share Tech Mono",monospace';
  let y=gy+36;
  ctx.fillStyle='#fbbf24';ctx.fillText('battery  '+lv.V+' V',gx+10,y);y+=20;
  if(lv.Rs>0){ctx.fillStyle='#f87171';
    ctx.fillText('line drop  '+fmt(lv.V-Vp,1)+' V  (across '+lv.Rs+' Ω)',gx+10,y);y+=20;
    ctx.fillStyle='#a3e635';
    ctx.fillText('at the lamps  '+fmt(Vp,1)+' V',gx+10,y);y+=20;}
  // fuse bar
  ctx.fillStyle='#8b96ad';ctx.fillText('fuse load',gx+10,y);
  ctx.fillStyle='#1f2937';ctx.fillRect(gx+90,y-10,gw-110,12);
  const fr=clamp(Itot/lv.Imax,0,1.3);
  ctx.fillStyle=fr>1?'#f87171':fr>0.85?'#fbbf24':'#34d399';
  ctx.fillRect(gx+90,y-10,(gw-110)*clamp(fr,0,1),12);
  y+=24;
  branches.forEach((b,i)=>{
    ctx.fillStyle=i===selBr?'#a3e635':'#8b96ad';
    ctx.fillText('lamp '+(i+1)+'  '+b.R+'Ω  '+(b.sw?fmt(b.I,1)+' A':'open')+'  '+(b.ok?'✓':'·'),gx+10,y);
    y+=18;});
  y+=6;
  ctx.fillStyle='#57534e';ctx.font='11px "Share Tech Mono",monospace';
  ctx.fillText('parallel: currents ADD on the fuse.',gx+10,y);y+=16;
  ctx.fillText('series: voltage is SHARED on the line.',gx+10,y);
}
function drawFluxGraphs(gx,gy,gw,gh){
  // the star: Φ(t) on top, EMF = −dΦ/dt below — the derivative, drawn
  const h1=gh*0.48,h2=gh*0.48;
  const box=(y0,hh,label)=>{ctx.fillStyle='#0f1808';ctx.fillRect(gx,y0,gw,hh);
    ctx.strokeStyle='#ffffff14';ctx.strokeRect(gx+.5,y0+.5,gw-1,hh-1);
    ctx.fillStyle='#8b96ad';ctx.font='10px "Share Tech Mono",monospace';
    ctx.fillText(label,gx+8,y0+14);};
  box(gy,h1,'FLUX Φ through the coil');
  box(gy+h1+gh*0.04,h2,'EMF = −dΦ/dt — the SLOPE of the curve above');
  if(samples.length<2)return;
  const WIN=8,t1=Math.max(t,WIN),t0=t1-WIN;
  const vis=samples.filter(s2=>s2.t>=t0);
  if(vis.length<2)return;
  const X=tt=>gx+8+((tt-t0)/WIN)*(gw-16);
  // flux: 0..10
  const Y1=v=>gy+h1-10-(clamp(v,0,10)/10)*(h1-30);
  ctx.strokeStyle='#38bdf8';ctx.lineWidth=2;ctx.shadowColor='#38bdf8';ctx.shadowBlur=6;
  ctx.beginPath();
  vis.forEach((s2,i)=>{i===0?ctx.moveTo(X(s2.t),Y1(s2.phi)):ctx.lineTo(X(s2.t),Y1(s2.phi));});
  ctx.stroke();ctx.shadowBlur=0;
  // emf: ±(Imax·R·1.3)
  const eMax=lv.Imax*lv.R*1.3,y0e=gy+h1+gh*0.04;
  const Y2=v=>y0e+h2/2-(clamp(v,-eMax,eMax)/eMax)*(h2/2-16);
  ctx.strokeStyle='#ffffff22';ctx.setLineDash([3,4]);
  ctx.beginPath();ctx.moveTo(gx+8,Y2(0));ctx.lineTo(gx+gw-8,Y2(0));ctx.stroke();
  // breaker lines
  ctx.strokeStyle='#f8717155';
  ctx.beginPath();ctx.moveTo(gx+8,Y2(lv.Imax*lv.R));ctx.lineTo(gx+gw-8,Y2(lv.Imax*lv.R));ctx.stroke();
  ctx.beginPath();ctx.moveTo(gx+8,Y2(-lv.Imax*lv.R));ctx.lineTo(gx+gw-8,Y2(-lv.Imax*lv.R));ctx.stroke();
  ctx.setLineDash([]);
  ctx.strokeStyle='#a3e635';ctx.lineWidth=2;ctx.shadowColor='#a3e635';ctx.shadowBlur=6;
  ctx.beginPath();
  vis.forEach((s2,i)=>{i===0?ctx.moveTo(X(s2.t),Y2(s2.emf)):ctx.lineTo(X(s2.t),Y2(s2.emf));});
  ctx.stroke();ctx.shadowBlur=0;ctx.lineWidth=1;
  ctx.fillStyle='#57534e';ctx.font='10px "Share Tech Mono",monospace';
  ctx.fillText('flat Φ → zero EMF. always.',gx+10,y0e+h2-8);
}

/* ================================================== loop + input */
let last=performance.now();
function frame(now){
  const el=Math.min(.05,(now-last)/1000);last=now;
  if(state==='play'){
    acc+=el;
    while(acc>=DT&&state==='play'){step(DT);acc-=DT;}
  }
  if(state==='down'){downTimer+=el;
    if(downTimer>1.1&&!$('#overlay').classList.contains('show'))showResult();}
  render();
  requestAnimationFrame(frame);
}
window.addEventListener('keydown',e=>{
  if(['Space','ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.code))e.preventDefault();
  if(e.repeat)return;
  if(state==='play'){
    if(e.code==='Space'){
      if(act===1){probe.sign*=-1;beep(probe.sign>0?500:330,.08,'square',.12);flash=.12;}
      else if(act===2){branches[selBr].sw=!branches[selBr].sw;
        beep(branches[selBr].sw?620:300,.08,'square',.12);}
      else driving=true;
    }
    if(act===1&&['KeyX','ShiftLeft','ShiftRight'].includes(e.code)){
      neutral=true;beep(260,.06,'sine',.1);}
    if(act===1&&['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.code)){
      heldK[e.code]=1;updThrK();}
    if(act===2){
      if(e.code==='ArrowLeft')selBr=(selBr+branches.length-1)%branches.length;
      if(e.code==='ArrowRight'||e.code==='ArrowDown')selBr=(selBr+1)%branches.length;
      if(e.code==='ArrowUp')selBr=(selBr+branches.length-1)%branches.length;
    }
  }
  if(e.code==='Enter'&&primary&&$('#overlay').classList.contains('show'))primary();
  if(e.code==='KeyP'&&(state==='play'||state==='paused')){
    state=state==='play'?'paused':'play';
    driving=false;setHum(0);}
  if(e.code==='KeyM'){muted=!muted;setHum(0);}
});
window.addEventListener('keyup',e=>{
  if(e.code==='Space')driving=false;
  if(['KeyX','ShiftLeft','ShiftRight'].includes(e.code))neutral=false;
  if(heldK[e.code]){delete heldK[e.code];updThrK();}
});
cv.addEventListener('pointerdown',e=>{audio();
  if(state!=='play')return;
  if(act===1){
    // tap = flip · press-and-hold = NEUTRAL · press-and-DRAG = thrust stick
    pd={x:e.clientX,y:e.clientY,moved:false};
    holdTO=setTimeout(()=>{holdTO=null;if(pd&&!pd.moved){neutral=true;beep(260,.06,'sine',.1);}},180);
  }
  else if(act===2){
    const topY=H*0.2,rowH=Math.min(86,(H*0.62)/Math.max(3,branches.length));
    const i=Math.floor((e.clientY-topY)/rowH);
    if(i>=0&&i<branches.length){selBr=i;branches[i].sw=!branches[i].sw;
      beep(branches[i].sw?620:300,.08,'square',.12);}
  }else driving=true;
});
window.addEventListener('pointermove',e=>{
  if(!pd||act!==1)return;
  const dx=e.clientX-pd.x,dy=e.clientY-pd.y,d=hyp(dx,dy);
  if(d>20){
    pd.moved=true;
    if(holdTO){clearTimeout(holdTO);holdTO=null;}
    neutral=false;
    thrTX=dx/d;thrTY=dy/d;
  }
});
window.addEventListener('pointerup',()=>{
  driving=false;
  const wasTap=holdTO&&pd&&!pd.moved;
  if(holdTO){clearTimeout(holdTO);holdTO=null;}
  if(wasTap&&act===1&&state==='play'){probe.sign*=-1;beep(probe.sign>0?500:330,.08,'square',.12);flash=.12;}
  neutral=false;thrTX=0;thrTY=0;pd=null;
});
window.addEventListener('blur',()=>{driving=false;neutral=false;setHum(0);});
document.addEventListener('click',audio,{once:true});

/* ================================================== go */
title();
requestAnimationFrame(frame);
</script>
