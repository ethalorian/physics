<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>REDLINE // a kinematics grand prix</title>
<!--
  REDLINE — a kinematics grand prix. Replacement bonus cabinet for Unit 1.
  Excitebike blood, dusk-minimal modern skin: sunset gradient sky, silhouette
  mesas, full-resolution vector canvas, soft synth audio. Single file, no deps.

  The conceit that makes a motocross game a physics machine: the THROTTLE IS
  ACCELERATION (a = +6 m/s², posted), the overheat gauge makes acceleration a
  budgeted resource, and the track itself demands kinematics:

    GRAPH GATES — zones that only open if you ride a posted v–t shape:
      CRUISE band (hold v in [lo,hi]), ACCEL zone (gain ≥ Δv), STOP box
      (reach v ≈ 0 inside), SPEED TRAP (cross under the limit).
    JUMPS — every gap is a projectile. Ramp angle 30°, desert spec g = 10:
      range = v²·sin60°/g, so the sign can post the minimum takeoff speed
      and the student can check it on the speedometer BEFORE the lip.

  Fail states (no soft-locks): every level has a hard DNF clock (2.5× par);
  6 crashes in one level = MECHANICAL; 3 bikes per run, then GAME OVER.

  ACT I   QUALIFYING  — reading v: cruise bands, traps, stop boxes
  ACT II  THE HEAT    — acceleration: gain zones, braking distance, overheat
  ACT III AIRBORNE GP — projectiles: gaps, landing windows, the finale

  Bridge protocol: identical to every other cabinet (coinRequest / score).
  Practice mode after 900 ms without a bridge reply.
-->
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: #14101f; overflow: hidden;
    font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
    -webkit-user-select: none; user-select: none; touch-action: manipulation; }
  #wrap { display: flex; height: 100%; align-items: center; justify-content: center; gap: 14px; padding: 14px; }
  #stage { position: relative; display: flex; align-items: center; justify-content: center; }
  #game { border-radius: 18px; background: #1c1338;
    box-shadow: 0 24px 70px rgba(0,0,0,.55), 0 0 0 1px rgba(255,255,255,.06); }
  #panel { width: 300px; flex: 0 0 300px; align-self: center; background: #1b1430;
    border: 1px solid rgba(255,255,255,.08); border-radius: 18px;
    padding: 16px; display: flex; flex-direction: column; gap: 12px; color: #cfc6dd; }
  #panel h3 { font-size: 12px; font-weight: 700; letter-spacing: .22em; color: #ffd166; }
  #panel .sub { font-size: 11px; line-height: 1.6; color: rgba(247,237,226,.45); }
  #vtcanvas { width: 100%; border-radius: 12px; background: #150f26; border: 1px solid rgba(255,255,255,.07); }
  #reqcard { border-radius: 12px; background: rgba(255,209,102,.07); border: 1px solid rgba(255,209,102,.28);
    padding: 12px; font-size: 12.5px; line-height: 1.65; color: #f3e9d8;
    height: 130px; overflow: hidden; font-variant-numeric: tabular-nums; }
  #reqcard .big { font-size: 14px; font-weight: 700; color: #ffd166; }
  #reqcard .eq { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 11.5px; color: #95d65c; }
  #heatrow { display: flex; align-items: center; gap: 10px; font-size: 11px; letter-spacing: .12em; color: rgba(247,237,226,.6); }
  #heatbar { flex: 1; height: 10px; border-radius: 5px; background: rgba(255,255,255,.07); position: relative; overflow: hidden; }
  #heatfill { position: absolute; left: 0; top: 0; bottom: 0; width: 0%; background: #95d65c; border-radius: 5px; transition: background .2s; }
  #parrow { font-size: 11px; line-height: 1.6; color: rgba(247,237,226,.45);
    height: 18px; overflow: hidden; white-space: nowrap; font-variant-numeric: tabular-nums; }
  #heatrow span:last-child { width: 36px; text-align: right; font-variant-numeric: tabular-nums; }
  #touch { position: absolute; inset: 0; display: none; }
  #touch .tz { position: absolute; bottom: 0; top: 0; width: 50%; }
  #tBrake { left: 0; } #tGas { right: 0; }
  @media (max-width: 760px) {
    #wrap { flex-direction: column; align-items: center; overflow-y: auto; }
    #panel { width: 100%; max-width: 480px; flex: 0 0 auto; }
    #touch { display: block; }
  }
</style>
</head>
<body>
<div id="wrap">
  <div id="stage">
    <canvas id="game"></canvas>
    <div id="touch">
      <div class="tz" id="tBrake"></div>
      <div class="tz" id="tGas"></div>
    </div>
  </div>
  <aside id="panel">
    <h3>▣ PIT WALL</h3>
    <canvas id="vtcanvas" width="276" height="150"></canvas>
    <div class="sub" id="vtlabel">v–t TELEMETRY — your ride draws the graph. Shaded stripe = the band the track demands.</div>
    <div id="heatrow"><span>HEAT</span><div id="heatbar"><div id="heatfill"></div></div><span id="heatpct">0%</span></div>
    <div id="reqcard">INSERT COIN TO QUALIFY</div>
    <div id="parrow">—</div>
  </aside>
</div>

<script>
'use strict';
/* ============================================================ *
 *  0. CONSTANTS, PALETTE, CANVAS PIPELINE
 * ============================================================ */
const LW = 960, LH = 540;            // logical canvas (16:9, full resolution)
const PXM = 16;                      // pixels per meter (60 m visible)
const GY = 440;                      // ground line (logical px)
const BIKE_SX = 250;                 // bike's fixed screen x (logical px)

// physics — these numbers are POSTED in-game; do not change casually
const G = 10;                        // desert spec, printed on signage
const A_GAS = 6;                     // throttle acceleration (m/s²)
const A_BRK = -9;                    // brake (m/s²)
const A_COAST = -1.2;                // rolling resistance
const VMAX = 26;                     // m/s
const RAMP_DEG = 30;                 // every ramp
const SIN2T = Math.sin(2 * RAMP_DEG * Math.PI / 180);   // sin60° ≈ 0.866
const COST = Math.cos(RAMP_DEG * Math.PI / 180);
const SINT = Math.sin(RAMP_DEG * Math.PI / 180);
const HEAT_UP = 16, HEAT_DN = 13;    // %/s while throttling / not
const STALL_T = 2.6;                 // overheat stall seconds
const STALL_HEAT = 30;               // heat after the stall clears
const STOP_V = 0.4;                  // "stopped" threshold
const CRUISE_GRACE = 0.7;            // seconds allowed out-of-band per zone
const DNF_MULT = 2.5;                // hard clock = par × this
const MAX_CRASH = 6;                 // crashes per level before MECHANICAL

function vminFor(gap) { return Math.sqrt(G * gap / SIN2T); }  // min takeoff v

const PAL = {
  text: '#f7ede2', dim: 'rgba(247,237,226,.55)', faint: 'rgba(247,237,226,.32)',
  gold: '#ffd166', coral: '#ff6b6b', teal: '#4ecdc4', green: '#95d65c', blue: '#6cb8ff',
  night: '#171022', body: '#211735', ground: '#241a38', trackDark: '#1b1330', pit: '#120c20',
};

const cv = document.getElementById('game');
const cx = cv.getContext('2d');
const bx = cx;                       // draw helpers target the main context
const DPR = Math.min(2, window.devicePixelRatio || 1);
let SCALE = 1;
function fit() {
  const aw = Math.min(window.innerWidth - (window.innerWidth > 760 ? 360 : 40), 1100);
  const ah = window.innerHeight - 40;
  SCALE = Math.max(0.4, Math.min(aw / LW, ah / LH));
  cv.width = Math.round(LW * SCALE * DPR);
  cv.height = Math.round(LH * SCALE * DPR);
  cv.style.width = Math.round(LW * SCALE) + 'px';
  cv.style.height = Math.round(LH * SCALE) + 'px';
}
window.addEventListener('resize', fit);
fit();
function beginFrame() {
  cx.setTransform(SCALE * DPR, 0, 0, SCALE * DPR, 0, 0);
  cx.imageSmoothingEnabled = true;
  cx.clearRect(0, 0, LW, LH);
}

/* ============================================================ *
 *  1. ARCADE BRIDGE (identical contract to every other cabinet)
 * ============================================================ */
const ARCADE = {
  playId: null, ranked: false, pending: false, practice: false,
  requestCoin() {
    if (this.pending) return;
    this.pending = true; this.practice = false; this.playId = null; this.ranked = false;
    try { window.parent.postMessage({ type: 'arcade:coinRequest', source: 'redline-arcade' }, '*'); } catch (e) {}
    setTimeout(() => {
      if (this.pending) { this.pending = false; this.practice = true; onCoinResult(true); }
    }, 900);
  },
  postScore(score, act, final, stats) {
    if (!this.ranked || !this.playId) return;
    try {
      window.parent.postMessage({ type: 'arcade:score', source: 'redline-arcade',
        playId: this.playId, score: Math.round(score), act, final: !!final, stats: stats || undefined }, '*');
    } catch (e) {}
  },
};
window.addEventListener('message', (ev) => {
  const d = ev && ev.data;
  if (!d || typeof d !== 'object') return;
  if (d.type === 'arcade:coinAccepted') {
    ARCADE.pending = false; ARCADE.playId = d.playId || null; ARCADE.ranked = !!d.playId;
    ARCADE.practice = false; onCoinResult(true);
  } else if (d.type === 'arcade:coinDenied') {
    ARCADE.pending = false; ARCADE.practice = false; onCoinResult(false);
  }
});

/* ============================================================ *
 *  2. AUDIO — square/saw synth, engine pitch ∝ v
 * ============================================================ */
const AU = {
  ctx: null, engineOsc: null, engineGain: null, growlOsc: null, growlGain: null,
  ensure() {
    if (this.ctx) return;
    try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { return; }
    const c = this.ctx;
    this.engineOsc = c.createOscillator(); this.engineOsc.type = 'triangle';
    this.engineGain = c.createGain(); this.engineGain.gain.value = 0;
    this.engineOsc.connect(this.engineGain); this.engineGain.connect(c.destination);
    this.engineOsc.start();
    this.growlOsc = c.createOscillator(); this.growlOsc.type = 'sawtooth';
    this.growlGain = c.createGain(); this.growlGain.gain.value = 0;
    this.growlOsc.connect(this.growlGain); this.growlGain.connect(c.destination);
    this.growlOsc.start();
  },
  engine(v, throttling, stalled) {
    if (!this.ctx) return;
    const on = state.screen === 'play';
    this.engineGain.gain.value = on ? (stalled ? 0.008 : 0.02) : 0;
    this.growlGain.gain.value = (on && throttling && !stalled) ? 0.012 : 0;
    this.engineOsc.frequency.value = 50 + v * 7 + (stalled ? -20 : 0);
    this.growlOsc.frequency.value = 90 + v * 11;
  },
  blip(f, dur, type, vol) {
    if (!this.ctx) return;
    const c = this.ctx, o = c.createOscillator(), g = c.createGain();
    o.type = type || 'sine'; o.frequency.value = f;
    g.gain.setValueAtTime(vol || 0.05, c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + (dur || 0.12));
    o.connect(g); g.connect(c.destination);
    o.start(); o.stop(c.currentTime + (dur || 0.12) + 0.02);
  },
  ding() { this.blip(880, 0.1); this.blip(1320, 0.18); },
  gate() { this.blip(660, 0.08); setTimeout(() => this.blip(990, 0.14), 70); },
  crash() { this.blip(110, 0.4, 'sawtooth', 0.09); this.blip(70, 0.5, 'square', 0.07); },
  alarm() { this.blip(220, 0.3, 'square', 0.06); },
  fanfare() { [523, 659, 784, 1046].forEach((f, i) => setTimeout(() => this.blip(f, 0.16), i * 110)); },
  sad() { [392, 330, 262, 196].forEach((f, i) => setTimeout(() => this.blip(f, 0.2, 'square', 0.05), i * 140)); },
};

/* ============================================================ *
 *  3. COURSE DATA — twelve levels, three acts
 *     Feature grammar (all distances in meters from the start line):
 *       cruise {x0,x1,lo,hi}   hold lo ≤ v ≤ hi through the zone
 *       trap   {x,max}         cross the line at v ≤ max
 *       stop   {x0,x1}         reach v < 0.4 inside the box
 *       accel  {x0,x1,gain}    leave the zone ≥ gain m/s faster than you entered
 *       jump   {x,gap,land?}   ramp lip at x; clear gap; optional landing window
 *     Every gate that fails closes a barrier → crash → retry from the zone.
 *     BEATABILITY margins are noted per level (audited, not vibes).
 * ============================================================ */
const ACT_META = {
  1: { name: 'QUALIFYING', sub: 'Read the speedometer. Ride the band.',
       brief: ['The track posts a v–t shape.', 'Throttle: a = +6 m/s² · Brake: a = −9 m/s²', 'Ride the shape, or the gate stays closed.'] },
  2: { name: 'THE HEAT', sub: 'Acceleration is a budget. Spend it well.',
       brief: ['Full throttle builds heat: +16%/s on, −13%/s off.', 'Redline the gauge and you stall for 2.6 s.', 'Gain zones demand Δv. Stop boxes demand v² = 2ad.'] },
  3: { name: 'AIRBORNE GP', sub: 'Every gap is a projectile.',
       brief: ['Ramps launch at 30°. Desert spec: g = 10 m/s².', 'Range = v²·sin 60° / g.', 'The sign posts the minimum. Check your speedo at the lip.'] },
};

const LEVELS = {
  1: [
    // margins: bands ≥4 m/s wide; traps ≥4 above band tops; boxes reachable from band speeds
    { name: 'PRACTICE OVAL', len: 240, par: 24, feats: [
      { t: 'cruise', x0: 60, x1: 140, lo: 8, hi: 14 },
      { t: 'trap', x: 190, max: 18 },
    ]},
    { name: 'PADDOCK RUN', len: 300, par: 32, feats: [
      { t: 'stop', x0: 120, x1: 136 },
      { t: 'cruise', x0: 180, x1: 260, lo: 10, hi: 16 },
    ]},
    { name: 'SCRUTINEERING', len: 320, par: 36, feats: [
      { t: 'trap', x: 80, max: 12 },
      { t: 'cruise', x0: 120, x1: 220, lo: 14, hi: 18 },
      { t: 'stop', x0: 260, x1: 276 },
    ]},
    { name: 'POLE POSITION', len: 360, par: 40, feats: [
      { t: 'trap', x: 60, max: 14 },
      { t: 'cruise', x0: 100, x1: 200, lo: 12, hi: 15 },
      { t: 'trap', x: 250, max: 20 },
      { t: 'stop', x0: 310, x1: 326 },
    ]},
  ],
  2: [
    // margins: gain zones sized ≥2× the minimum distance at a=+6 from band entry speeds
    { name: 'DYNO PULL', len: 300, par: 26, feats: [
      { t: 'accel', x0: 40, x1: 120, gain: 10 },
      { t: 'trap', x: 160, max: 22 },
      { t: 'stop', x0: 220, x1: 240 },
    ]},
    { name: 'DRAG STRIP', len: 260, par: 16, feats: [
      { t: 'trap', x: 250, max: 26 },
    ]},
    { name: 'HEAT SOAK', len: 340, par: 30, feats: [
      { t: 'accel', x0: 30, x1: 110, gain: 8 },
      { t: 'cruise', x0: 150, x1: 250, lo: 18, hi: 22 },
      { t: 'stop', x0: 290, x1: 310 },
    ]},
    { name: 'SIGN FLIP', len: 380, par: 36, feats: [
      { t: 'accel', x0: 30, x1: 130, gain: 12 },
      { t: 'trap', x: 200, max: 14 },
      { t: 'accel', x0: 240, x1: 320, gain: 8 },
      { t: 'stop', x0: 350, x1: 368 },
    ]},
  ],
  3: [
    // margins: VMAX=26 vs largest minimum 17.4 (gap 26) → 1.49×; windows ≥2.3 m/s wide
    { name: 'FIRST AIR', len: 300, par: 26, feats: [
      { t: 'jump', x: 140, gap: 10 },
      { t: 'jump', x: 240, gap: 14 },
    ]},
    { name: 'TABLE TOP', len: 340, par: 32, feats: [
      { t: 'trap', x: 60, max: 16 },
      { t: 'jump', x: 140, gap: 18 },
      { t: 'jump', x: 260, gap: 12, land: 8 },
    ]},
    { name: 'CANYON DOUBLES', len: 380, par: 36, feats: [
      { t: 'jump', x: 100, gap: 22 },
      { t: 'stop', x0: 200, x1: 220 },
      { t: 'jump', x: 300, gap: 16, land: 6 },
    ]},
    { name: 'THE GRAND PRIX', len: 440, par: 46, feats: [
      { t: 'cruise', x0: 30, x1: 100, lo: 12, hi: 16 },
      { t: 'accel', x0: 130, x1: 210, gain: 8 },
      { t: 'trap', x: 250, max: 20 },
      { t: 'jump', x: 320, gap: 26 },
      { t: 'jump', x: 410, gap: 12, land: 8 },
    ]},
  ],
};

/* ============================================================ *
 *  4. QUESTION BANKS — +750 flag questions between levels,
 *     +1000 gold CROSSOVER at each act finale (DESCENT, the sibling
 *     kinematics cabinet, supplies the spaced-review hooks).
 * ============================================================ */
function bank1() { // constant velocity
  const v = 8 + 2 * ((Math.random() * 5) | 0);          // 8..16
  const t = 3 + ((Math.random() * 5) | 0);              // 3..7
  const pick = (Math.random() * 3) | 0;
  if (pick === 0) {
    return { q: 'YOU HELD ' + v + ' m/s THROUGH THE\nCRUISE ZONE FOR ' + t + ' s.\nHOW FAR DID YOU TRAVEL?',
      c: [(v * t) + ' m', (v + t) + ' m', (v * t * 2) + ' m'], a: 0,
      why: 'CONSTANT v: d = vt = ' + v + '×' + t + ' = ' + (v * t) + ' m' };
  }
  if (pick === 1) {
    const d = v * t;
    return { q: 'A RIVAL COVERS ' + d + ' m IN ' + t + ' s\nAT CONSTANT SPEED.\nHOW FAST IS THE RIVAL?',
      c: [v + ' m/s', (v * 2) + ' m/s', (d - t) + ' m/s'], a: 0,
      why: 'v = d/t = ' + d + '/' + t + ' = ' + v + ' m/s' };
  }
  return { q: 'ON A v-t GRAPH, A FLAT\nHORIZONTAL LINE MEANS...',
    c: ['CONSTANT VELOCITY', 'STOPPED', 'CONSTANT ACCELERATION'], a: 0,
    why: 'FLAT v-t LINE: v UNCHANGING.\nSTOPPED IS FLAT AT ZERO.' };
}
function bank2() { // acceleration
  const pick = (Math.random() * 3) | 0;
  if (pick === 0) {
    const t = 2 + ((Math.random() * 3) | 0);            // 2..4
    return { q: 'FULL THROTTLE (a = +6 m/s²)\nFROM REST FOR ' + t + ' s.\nFINAL SPEED?',
      c: [(6 * t) + ' m/s', (6 + t) + ' m/s', (3 * t) + ' m/s'], a: 0,
      why: 'v = v₀ + at = 0 + 6×' + t + ' = ' + (6 * t) + ' m/s' };
  }
  if (pick === 1) {
    const v = 12 + 6 * ((Math.random() * 2) | 0);       // 12 or 18
    const d = (v * v) / 18;                              // v²/(2·9), exact for these v
    return { q: 'BRAKING AT a = −9 m/s² FROM\n' + v + ' m/s. STOPPING DISTANCE?\n(v² = 2ad)',
      c: [d + ' m', Math.round(d / 2) + ' m', (d * 2) + ' m'], a: 0,
      why: 'd = v²/(2a) = ' + (v * v) + '/18 = ' + d + ' m' };
  }
  return { q: 'ON A v-t GRAPH, THE SLOPE\nOF THE LINE IS...',
    c: ['ACCELERATION', 'DISTANCE', 'POSITION'], a: 0,
    why: 'SLOPE = Δv/Δt = a.\nAREA UNDER IT = DISTANCE.' };
}
function bank3() { // projectiles off the 30° ramp, g = 10
  const pick = (Math.random() * 3) | 0;
  if (pick === 0) {
    const v = 10 + 5 * ((Math.random() * 2) | 0);       // 10 or 15
    const vy = v * 0.5;                                  // sin30 = 0.5 exactly
    return { q: 'YOU LEAVE THE 30° RAMP\nAT ' + v + ' m/s. VERTICAL LAUNCH\nSPEED? (sin 30° = 0.5)',
      c: [vy + ' m/s', v + ' m/s', (v * 2) + ' m/s'], a: 0,
      why: 'vy = v·sin 30° = ' + v + '×0.5 = ' + vy + ' m/s' };
  }
  if (pick === 1) {
    const vy = 5 + 5 * ((Math.random() * 2) | 0);       // 5 or 10
    const t = (2 * vy) / G;
    return { q: 'LAUNCH WITH vy = ' + vy + ' m/s,\ng = 10. TOTAL AIR TIME?\n(t = 2vy/g)',
      c: [t + ' s', (vy) + ' s', (t * 2) + ' s'], a: 0,
      why: 't = 2vy/g = ' + (2 * vy) + '/10 = ' + t + ' s' };
  }
  return { q: 'AT THE TOP OF THE JUMP ARC,\nYOUR VERTICAL VELOCITY IS...',
    c: ['ZERO', 'MAXIMUM', 'EQUAL TO g'], a: 0,
    why: 'APEX: vy = 0. ax STAYS 0,\nay STAYS -g THE WHOLE FLIGHT.' };
}
const CROSSOVERS = [
  { q: 'CROSSOVER // DESCENT:\nYOUR SHIP FALLS WITH NO BURN.\nITS v-t GRAPH IS...',
    c: ['A STRAIGHT SLOPING LINE', 'A FLAT LINE', 'A CURVE THAT LEVELS OFF'], a: 0,
    why: 'CONSTANT a = CONSTANT SLOPE.\nSAME LINE YOUR ACCEL ZONES\nDEMAND HERE.' },
  { q: 'CROSSOVER // DESCENT:\nTHE NO-BURN GHOST PREDICTED\nYOUR IMPACT POINT USING...',
    c: ['x = x₀ + v₀t + ½at²', 'F = ma', 'p = mv'], a: 0,
    why: 'SAME EQUATION AS A JUMP HERE.\nPREDICTION = KINEMATICS.' },
  { q: 'CROSSOVER // DESCENT:\nHOVERING AT CONSTANT HEIGHT,\nYOUR ACCELERATION IS...',
    c: ['ZERO', 'g DOWNWARD', '6 m/s² UP'], a: 0,
    why: 'v CONSTANT (ZERO) MEANS a = 0.\nCRUISE BAND, VERTICAL EDITION.' },
];
const BANKS = { 1: bank1, 2: bank2, 3: bank3 };
/* ============================================================ *
 *  5. STATE, PROGRESSION, SCREEN FLOW
 *     localStorage: redline2_prog (highest act unlocked), redline2_hi
 *     Screens: attract → acts → brief → play ⇄ question → clear →
 *              ... → gameover.  Teacher override code: FNET.
 * ============================================================ */
const store = {
  get prog() { try { return Math.max(1, Math.min(3, parseInt(localStorage.getItem('redline2_prog') || '1', 10) || 1)); } catch (e) { return 1; } },
  set prog(v) { try { localStorage.setItem('redline2_prog', String(v)); } catch (e) {} },
  get hi() { try { return parseInt(localStorage.getItem('redline2_hi') || '0', 10) || 0; } catch (e) { return 0; } },
  set hi(v) { try { localStorage.setItem('redline2_hi', String(v)); } catch (e) {} },
};

const state = {
  screen: 'attract',          // attract | acts | brief | play | question | clear | gameover
  act: 1, level: 0,           // level: 0..3 within the act
  score: 0, bikes: 3,
  coinFlash: 0, practice: false,
  menuIdx: 0, override: '',   // typed letters toward FNET
  // per-level run
  bike: null, course: null,
  t: 0, par: 0, crashes: 0,
  flash: null, flashT: 0,     // big center text
  question: null, qPick: -1, qResolved: false, qIsCross: false,
  clearInfo: null,
  // telemetry ring for the v-t panel (24 s window @ 10 Hz)
  trace: [], traceClock: 0,
  stats: { gates: 0, perfectGates: 0, jumps: 0, crashes: 0, right: 0, wrong: 0, levels: 0 },
};

function freshBike() {
  return { x: 0, v: 0, y: 0, vy: 0, air: false,
    heat: 0, stalled: 0,            // stalled = seconds remaining
    gas: false, brake: false,
    lean: 0, dead: 0,               // dead = crash anim timer
    cpX: 0,                         // respawn x
    mech: false, jumpRef: null };   // out-of-spares flag, active jump
}

function buildCourse(act, level) {
  const def = LEVELS[act][level];
  const feats = def.feats.map((f) => Object.assign({}, f, {
    state: 'pending',   // pending | active | passed | failed
    vIn: 0, offBand: 0, stopped: false, firstTry: true,
  }));
  return { def, feats, len: def.len };
}

function startLevel() {
  state.course = buildCourse(state.act, state.level);
  state.bike = freshBike();
  state.t = 0; state.par = state.course.def.par;
  state.crashes = 0;
  state.trace = []; state.traceClock = 0;
  state.flash = 'GO!'; state.flashT = 1.1;
  state.screen = 'play';
  AU.ding();
}

function onCoinResult(ok) {
  if (!ok) { state.screen = 'attract'; state.flash = 'COIN DENIED'; state.flashT = 1.5; return; }
  state.practice = ARCADE.practice;
  state.score = 0; state.bikes = 3;
  state.stats = { gates: 0, perfectGates: 0, jumps: 0, crashes: 0, right: 0, wrong: 0, levels: 0 };
  state.screen = 'acts'; state.menuIdx = 0;
  AU.ding();
}

function actUnlocked(a) { return a <= store.prog; }

function chooseAct(a) {
  if (!actUnlocked(a)) { AU.alarm(); return; }
  state.act = a; state.level = 0;
  state.screen = 'brief';
  AU.gate();
}

/* ---- level end paths ---- */
function levelCleared() {
  const c = state.course, b = state.bike;
  const gates = c.feats.length;
  const perfect = c.feats.filter((f) => f.firstTry && f.state === 'passed').length;
  const timeBonus = Math.max(0, Math.round((state.par * 1.6 - state.t) * 120));
  const noCrash = state.crashes === 0 ? 1000 : 0;
  const gained = 1500 + perfect * 400 + timeBonus + noCrash;
  state.score += gained;
  state.stats.gates += gates; state.stats.perfectGates += perfect; state.stats.levels += 1;
  state.clearInfo = { name: c.def.name, time: state.t, par: state.par,
    perfect, gates, timeBonus, noCrash, gained };
  ARCADE.postScore(state.score, state.act, false);
  state.screen = 'clear';
  AU.fanfare();
  void b; // (b referenced for clarity; nothing else needed)
}

function nextAfterClear() {
  // a flag question after every level; the act finale's question is a gold crossover
  const finale = state.level === 3;
  state.qIsCross = finale;
  state.question = finale
    ? CROSSOVERS[(Math.random() * CROSSOVERS.length) | 0]
    : BANKS[state.act]();
  state.qPick = -1; state.qResolved = false;
  state.screen = 'question';
}

function afterQuestion() {
  if (state.level < 3) {
    state.level += 1;
    startLevel();
  } else {
    // act complete
    if (state.act < 3 && store.prog < state.act + 1) store.prog = state.act + 1;
    if (state.act < 3) {
      state.flash = 'ACT ' + state.act + ' COMPLETE'; state.flashT = 2;
      state.act += 1; state.level = 0;
      state.screen = 'brief';
      AU.fanfare();
    } else {
      endRun('CHAMPION OF THE DESERT', true);
    }
  }
}

function loseBike(reason) {
  state.bikes -= 1;
  AU.sad();
  if (state.bikes <= 0) {
    endRun(reason, false);
  } else {
    startLevel();   // retry the same level on a fresh bike
    // set the flash AFTER startLevel so the reason isn't overwritten by GO!
    state.flash = reason + ' // BIKES LEFT: ' + state.bikes; state.flashT = 2.4;
  }
}

function endRun(reason, champion) {
  if (state.score > store.hi) store.hi = state.score;
  state.clearInfo = { reason, champion };
  ARCADE.postScore(state.score, state.act, true, {
    right: state.stats.right, wrong: state.stats.wrong,
    solved: state.stats.levels, bestStreak: 0, startLv: state.act, mode: 'physics',
  });
  state.screen = 'gameover';
}

/* ---- question answering ---- */
function answerQuestion(i) {
  if (state.qResolved) return;
  state.qPick = i; state.qResolved = true;
  if (i === state.question.a) {
    const pts = state.qIsCross ? 1000 : 750;
    state.score += pts; state.stats.right += 1;
    AU.fanfare();
  } else {
    state.stats.wrong += 1;
    AU.sad();
  }
  setTimeout(afterQuestion, 2600);
}

/* ---- menu / global key handling ---- */
function menuKey(k) {
  if (state.screen === 'attract') {
    if (k === 'Enter' || k === ' ') { AU.ensure(); ARCADE.requestCoin(); }
    return;
  }
  if (state.screen === 'acts') {
    // teacher override: type F N E T
    if (/^[a-zA-Z]$/.test(k)) {
      state.override = (state.override + k.toUpperCase()).slice(-4);
      if (state.override === 'FNET') { store.prog = 3; state.flash = 'MARSHAL OVERRIDE'; state.flashT = 1.4; AU.fanfare(); }
    }
    if (k === 'ArrowUp') { state.menuIdx = (state.menuIdx + 2) % 3; AU.blip(440, 0.05); }
    if (k === 'ArrowDown') { state.menuIdx = (state.menuIdx + 1) % 3; AU.blip(440, 0.05); }
    if (k === 'Enter' || k === ' ') chooseAct(state.menuIdx + 1);
    return;
  }
  if (state.screen === 'brief') {
    if (k === 'Enter' || k === ' ') startLevel();
    return;
  }
  if (state.screen === 'clear') {
    if (k === 'Enter' || k === ' ') nextAfterClear();
    return;
  }
  if (state.screen === 'question') {
    if (!state.qResolved && (k === '1' || k === '2' || k === '3')) answerQuestion(parseInt(k, 10) - 1);
    return;
  }
  if (state.screen === 'gameover') {
    if (k === 'Enter' || k === ' ') { state.screen = 'attract'; }
    return;
  }
}
/* ============================================================ *
 *  6. SIMULATION — the physics is the game
 * ============================================================ */
function crashBike(cpX, label) {
  const b = state.bike;
  if (b.dead > 0) return;
  b.dead = 1.4; b.cpX = Math.max(0, cpX);
  state.crashes += 1; state.stats.crashes += 1;
  state.flash = label || 'CRASH'; state.flashT = 1.4;
  AU.crash();
  if (state.crashes >= MAX_CRASH) {
    // out of spares — handled after the anim so the wipe is visible
    b.mech = true;
  }
}

function respawn() {
  const b = state.bike;
  if (b.mech) { b.mech = false; loseBike('MECHANICAL'); return; }
  b.x = b.cpX; b.v = 0; b.vy = 0; b.y = 0; b.air = false;
  b.heat = 0; b.stalled = 0; b.lean = 0;
}

function resetFeature(f) {
  f.state = 'pending'; f.offBand = 0; f.stopped = false; f.vIn = 0; f.firstTry = false;
}

/** The feature the PIT WALL card should explain: active one, else next ahead. */
function currentFeature() {
  const c = state.course; if (!c) return null;
  const x = state.bike ? state.bike.x : 0;
  for (const f of c.feats) {
    if (f.state === 'passed') continue;
    const start = (f.t === 'trap' || f.t === 'jump') ? f.x : f.x0;
    const end = (f.t === 'trap') ? f.x : (f.t === 'jump') ? f.x + f.gap : f.x1;
    if (x <= end + 2) return f;
    void start;
  }
  return null;
}

function simStep(dt) {
  const b = state.bike, c = state.course;
  state.t += dt;
  if (state.flashT > 0) state.flashT -= dt;

  // hard clock — the guaranteed level end
  if (state.t > state.par * DNF_MULT) { loseBike('DNF — FLAGGED OFF'); return; }

  // crash animation owns the bike
  if (b.dead > 0) {
    b.dead -= dt;
    if (b.dead <= 0) respawn();
    return;
  }

  // ---- heat & stall ----
  if (b.stalled > 0) {
    b.stalled -= dt;
    if (b.stalled <= 0) { b.heat = STALL_HEAT; state.flash = 'BACK ON'; state.flashT = 0.8; }
  }
  const throttling = b.gas && b.stalled <= 0 && !b.air;
  if (throttling) {
    b.heat = Math.min(100, b.heat + HEAT_UP * dt);
    if (b.heat >= 100) { b.stalled = STALL_T; state.flash = 'OVERHEAT! 2.6s STALL'; state.flashT = 1.6; AU.alarm(); }
  } else {
    b.heat = Math.max(0, b.heat - HEAT_DN * dt);
  }

  // ---- motion ----
  if (b.air) {
    b.x += b.v * dt;          // v holds vx while airborne
    b.y += b.vy * dt;
    b.vy -= G * dt;
    b.lean = Math.atan2(b.vy, b.v) * 0.5;
    if (b.y <= 0 && b.vy < 0) landBike();
  } else {
    let a = A_COAST;
    if (throttling) a = A_GAS;
    else if (b.brake) a = A_BRK;
    b.v = Math.max(0, Math.min(VMAX, b.v + a * dt));
    b.x += b.v * dt;
    const target = throttling ? -0.30 : (b.brake && b.v > 1 ? 0.18 : 0);
    b.lean += (target - b.lean) * Math.min(1, dt * 8);
  }

  // ---- features ----
  for (const f of c.feats) {
    if (f.state === 'passed') continue;

    if (f.t === 'jump') {
      if (!b.air && f.state !== 'failed' && b.x >= f.x && b.x < f.x + f.gap) {
        // crossed the lip — launch with whatever v the speedometer shows
        b.air = true; b.jumpRef = f;
        b.vy = b.v * SINT; b.v = b.v * COST; b.y = 0.01;
        b.x = f.x; // pin to the lip so range math is exact
        AU.blip(740, 0.12);
      }
      continue;
    }

    const inZone = b.x >= f.x0 && b.x <= f.x1;
    const crossedEnd = b.x > (f.t === 'trap' ? f.x : f.x1);

    if (f.t === 'trap') {
      if (b.x >= f.x && f.state === 'pending') {
        if (b.v <= f.max + 0.05) { f.state = 'passed'; state.score += 150; AU.gate(); }
        else { f.state = 'pending'; f.firstTry = false; crashBike(Math.max(0, f.x - 40), 'RADAR! ' + b.v.toFixed(1) + ' IN A ' + f.max + ' ZONE'); }
      }
      continue;
    }

    if (inZone && f.state === 'pending') f.state = 'active';

    if (f.t === 'cruise' && f.state === 'active') {
      if (b.v < f.lo - 0.05 || b.v > f.hi + 0.05) f.offBand += dt;
      if (crossedEnd) {
        if (f.offBand <= CRUISE_GRACE) { f.state = 'passed'; state.score += 150; AU.gate(); }
        else { resetFeature(f); crashBike(Math.max(0, f.x0 - 10), 'OUT OF BAND — GATE CLOSED'); }
      }
    }

    if (f.t === 'accel') {
      // The marshal logs your entry speed CLAMPED so vIn + gain never exceeds
      // VMAX — a gain gate must always be physically satisfiable.
      if (f.state === 'active' && !f.armed) { f.vIn = Math.min(b.v, VMAX - f.gain - 2); f.armed = true; }
      if (f.state === 'active' && crossedEnd) {
        if (b.v >= f.vIn + f.gain - 0.05) { f.state = 'passed'; state.score += 150; AU.gate(); }
        else { resetFeature(f); f.armed = false; crashBike(Math.max(0, f.x0 - 10), 'ONLY +' + (b.v - f.vIn).toFixed(1) + ' — NEEDED +' + f.gain); }
      }
    }

    if (f.t === 'stop' && f.state === 'active') {
      if (!f.stopped && b.v < STOP_V && inZone) { f.stopped = true; AU.ding(); state.flash = 'FULL STOP ✓'; state.flashT = 0.8; }
      if (crossedEnd) {
        if (f.stopped) { f.state = 'passed'; state.score += 150; }
        else { resetFeature(f); crashBike(Math.max(0, f.x0 - 30), 'ROLLED THE STOP BOX'); }
      }
    }
  }

  // ---- finish line ----
  if (b.x >= c.len && !b.air) { levelCleared(); return; }

  // ---- telemetry trace (10 Hz, 24 s window) ----
  state.traceClock += dt;
  if (state.traceClock >= 0.1) {
    state.traceClock = 0;
    state.trace.push({ t: state.t, v: b.air ? Math.hypot(b.v, b.vy) : b.v });
    while (state.trace.length > 240) state.trace.shift();
  }
}

function landBike() {
  const b = state.bike, f = b.jumpRef;
  b.air = false; b.y = 0; b.vy = 0; b.lean = 0;
  if (!f) return;
  b.jumpRef = null;
  const dist = b.x - f.x;     // landing distance past the lip
  state.stats.jumps += 1;
  if (dist < f.gap - 0.2) {
    // into the pit
    resetFeature(f);
    crashBike(Math.max(0, f.x - 45), 'CASED IT — ' + dist.toFixed(1) + ' m OF ' + f.gap);
    return;
  }
  if (typeof f.land === 'number' && dist > f.gap + f.land + 0.2) {
    resetFeature(f);
    crashBike(Math.max(0, f.x - 45), 'OVERSHOT THE DECK — ' + dist.toFixed(1) + ' m');
    return;
  }
  f.state = 'passed';
  state.score += 250;
  if (dist <= f.gap + 2) { state.score += 300; state.flash = 'SENT IT! +300'; state.flashT = 1.1; }
  else { state.flash = 'CLEARED +250'; state.flashT = 0.9; }
  AU.gate();
}
/* ============================================================ *
 *  7. RENDERER — dusk minimal: every shape still means something
 * ============================================================ */
function T(s, x, y, color, size, align, weight) {
  bx.font = (weight || 600) + ' ' + (size || 16) + 'px Inter, system-ui, -apple-system, sans-serif';
  bx.textAlign = align || 'left';
  bx.fillStyle = color || PAL.text;
  bx.fillText(s, x, y);
}
function TC(s, y, color, size, weight) { T(s, LW / 2, y, color, size, 'center', weight); }
function MONO(s, x, y, color, size, align) {
  bx.font = (size || 13) + 'px ui-monospace, SFMono-Regular, Menlo, monospace';
  bx.textAlign = align || 'left';
  bx.fillStyle = color || PAL.text;
  bx.fillText(s, x, y);
}
function rr(x, y, w, h, r) { bx.beginPath(); bx.roundRect(x, y, w, h, r); }
function chip(x, y, w, h, stroke) {
  rr(x, y, w, h, 10);
  bx.fillStyle = 'rgba(16,11,30,.78)'; bx.fill();
  bx.strokeStyle = stroke || 'rgba(255,255,255,.14)'; bx.lineWidth = 1; bx.stroke();
}

function camX() { return state.bike ? state.bike.x : 16; }
function wxToSx(wx) { return BIKE_SX + (wx - camX()) * PXM; }

let skyGrad = null;
function drawSky() {
  if (!skyGrad) {
    skyGrad = cx.createLinearGradient(0, 0, 0, GY);
    skyGrad.addColorStop(0, '#1c1338');
    skyGrad.addColorStop(0.45, '#55305f');
    skyGrad.addColorStop(0.78, '#c75e58');
    skyGrad.addColorStop(1, '#f3a563');
  }
  bx.fillStyle = skyGrad; bx.fillRect(0, 0, LW, GY);
  const sx = 700, sy = 215;
  const glow = cx.createRadialGradient(sx, sy, 12, sx, sy, 200);
  glow.addColorStop(0, 'rgba(255,227,179,.8)');
  glow.addColorStop(0.3, 'rgba(255,200,132,.28)');
  glow.addColorStop(1, 'rgba(255,200,132,0)');
  bx.fillStyle = glow; bx.beginPath(); bx.arc(sx, sy, 200, 0, 7); bx.fill();
  bx.fillStyle = '#ffe9c4'; bx.beginPath(); bx.arc(sx, sy, 36, 0, 7); bx.fill();
}

function ridgeY(wx, seed) {
  return Math.abs(Math.sin(wx * 0.011 + seed) * 26 + Math.sin(wx * 0.031 + seed * 2.7) * 14) +
         Math.abs(Math.sin(wx * 0.005 + seed * 1.3)) * 30;
}
function drawMesas() {
  const cpx = camX() * PXM;
  const layers = [
    { p: 0.15, base: GY - 130, col: 'rgba(70,44,104,.5)', seed: 3 },
    { p: 0.35, base: GY - 64, col: 'rgba(44,27,68,.85)', seed: 11 },
  ];
  for (const L of layers) {
    bx.fillStyle = L.col;
    bx.beginPath();
    bx.moveTo(0, GY);
    for (let sx2 = 0; sx2 <= LW; sx2 += 16) {
      bx.lineTo(sx2, L.base - ridgeY(cpx * L.p + sx2, L.seed));
    }
    bx.lineTo(LW, GY);
    bx.closePath(); bx.fill();
  }
}

function drawGround(withMarkers) {
  bx.fillStyle = PAL.ground; bx.fillRect(0, GY - 6, LW, LH - GY + 6);
  bx.fillStyle = PAL.trackDark; bx.fillRect(0, GY - 6, LW, 42);
  const edge = cx.createLinearGradient(0, GY - 6, 0, GY + 8);
  edge.addColorStop(0, 'rgba(255,209,102,.5)'); edge.addColorStop(1, 'rgba(255,209,102,0)');
  bx.fillStyle = edge; bx.fillRect(0, GY - 6, LW, 14);
  if (!withMarkers) return;
  const first = Math.floor((camX() - BIKE_SX / PXM) / 20) * 20;
  for (let wx = first; wx < camX() + LW / PXM + 20; wx += 20) {
    if (wx < 0) continue;
    const sxp = wxToSx(wx);
    bx.fillStyle = 'rgba(247,237,226,.22)'; bx.fillRect(sxp, GY - 2, 2, 10);
    MONO(wx + ' m', sxp + 7, GY + 24, 'rgba(247,237,226,.38)', 11);
  }
}

function drawBarrier(sx, hard) {
  if (sx < -10 || sx > LW + 10) return;
  const g2 = cx.createLinearGradient(0, GY - 140, 0, GY);
  g2.addColorStop(0, hard ? 'rgba(255,107,107,0)' : 'rgba(247,237,226,0)');
  g2.addColorStop(1, hard ? 'rgba(255,107,107,.7)' : 'rgba(247,237,226,.35)');
  bx.fillStyle = g2; bx.fillRect(sx - 2, GY - 140, 4, 134);
}

function drawFeature(f) {
  const passed = f.state === 'passed';
  if (f.t === 'cruise' || f.t === 'accel') {
    const a = wxToSx(f.x0), b2 = wxToSx(f.x1);
    if (b2 < -80 || a > LW + 80) return;
    const isC = f.t === 'cruise';
    const failed = isC && f.offBand > CRUISE_GRACE;
    const col = passed ? PAL.green : failed ? PAL.coral : isC ? PAL.green : PAL.teal;
    bx.globalAlpha = passed ? 0.35 : 1;
    bx.fillStyle = failed ? 'rgba(255,107,107,.12)' : isC ? 'rgba(149,214,92,.10)' : 'rgba(78,205,196,.10)';
    bx.fillRect(a, GY - 122, b2 - a, 116);
    bx.fillStyle = col;
    bx.fillRect(a - 1, GY - 122, 2, 116);
    bx.fillRect(b2 - 1, GY - 122, 2, 116);
    if (!isC) {
      bx.strokeStyle = 'rgba(78,205,196,.7)'; bx.lineWidth = 3; bx.lineCap = 'round';
      for (let sxp = a + 18; sxp < b2 - 18; sxp += 42) {
        bx.beginPath(); bx.moveTo(sxp, GY + 6); bx.lineTo(sxp + 11, GY + 12); bx.lineTo(sxp, GY + 18); bx.stroke();
      }
    }
    chip(a + 10, GY - 158, isC ? 196 : 206, 32, passed ? 'rgba(149,214,92,.5)' : undefined);
    const label = isC
      ? (passed ? '✓ HELD ' : 'HOLD ') + f.lo + '–' + f.hi + ' m/s'
      : (passed ? '✓ GAINED +' + f.gain : 'GAIN +' + f.gain + (f.armed && f.state === 'active' ? ' · log ' + f.vIn.toFixed(1) : ''));
    T(label, a + 24, GY - 136, col, 14, 'left', 700);
    bx.globalAlpha = 1;
    if (!passed) drawBarrier(b2, failed);
  } else if (f.t === 'stop') {
    const a = wxToSx(f.x0), b2 = wxToSx(f.x1);
    if (b2 < -80 || a > LW + 80) return;
    rr(a, GY - 2, b2 - a, 16, 6);
    bx.fillStyle = 'rgba(247,237,226,.12)'; bx.fill();
    bx.strokeStyle = f.stopped || passed ? PAL.green : 'rgba(247,237,226,.8)'; bx.lineWidth = 2; bx.stroke();
    chip(a - 8, GY - 158, 158, 32, f.stopped || passed ? 'rgba(149,214,92,.5)' : undefined);
    T(f.stopped || passed ? '✓ STOPPED' : 'STOP INSIDE', a + 6, GY - 136, f.stopped || passed ? PAL.green : PAL.text, 14, 'left', 700);
    if (!passed) drawBarrier(b2, false);
  } else if (f.t === 'trap') {
    const sxp = wxToSx(f.x);
    if (sxp < -80 || sxp > LW + 80) return;
    bx.fillStyle = passed ? 'rgba(149,214,92,.7)' : 'rgba(255,107,107,.8)';
    bx.fillRect(sxp - 1, GY - 96, 3, 90);
    bx.beginPath(); bx.arc(sxp, GY - 102, 6, 0, 7); bx.fill();
    chip(sxp - 60, GY - 158, 120, 32, passed ? 'rgba(149,214,92,.5)' : 'rgba(255,107,107,.5)');
    T((passed ? '✓ ' : '') + 'MAX ' + f.max, sxp, GY - 136, passed ? PAL.green : PAL.coral, 14, 'center', 700);
  } else if (f.t === 'jump') {
    const lip = wxToSx(f.x), far = wxToSx(f.x + f.gap);
    if (far < -120 || lip > LW + 120) return;
    bx.fillStyle = PAL.pit; bx.fillRect(lip, GY - 4, far - lip, LH - GY + 4);
    bx.strokeStyle = 'rgba(255,107,107,.5)'; bx.lineWidth = 2; bx.lineCap = 'round';
    for (let sxp = lip + 14; sxp < far - 10; sxp += 30) {
      bx.beginPath(); bx.moveTo(sxp, GY + 26); bx.lineTo(sxp + 9, GY + 33); bx.lineTo(sxp, GY + 40); bx.stroke();
    }
    bx.fillStyle = PAL.trackDark;
    bx.beginPath();
    bx.moveTo(lip - 66, GY - 4);
    bx.quadraticCurveTo(lip - 20, GY - 10, lip, GY - 40);
    bx.lineTo(lip, GY - 4);
    bx.closePath(); bx.fill();
    bx.strokeStyle = 'rgba(255,209,102,.55)'; bx.lineWidth = 2;
    bx.beginPath(); bx.moveTo(lip - 66, GY - 5); bx.quadraticCurveTo(lip - 20, GY - 11, lip, GY - 41); bx.stroke();
    if (typeof f.land === 'number') {
      const deckEnd = wxToSx(f.x + f.gap + f.land);
      bx.fillStyle = PAL.green; bx.fillRect(far, GY - 7, Math.max(3, deckEnd - far), 4);
      bx.fillStyle = PAL.pit; bx.fillRect(deckEnd, GY - 4, 70, LH - GY + 4);
    }
    bx.globalAlpha = passed ? 0.4 : 1;
    chip(lip - 206, GY - 196, 192, 54, 'rgba(255,209,102,.4)');
    T('GAP ' + f.gap + ' m' + (typeof f.land === 'number' ? ' · DECK ' + f.land : ''), lip - 192, GY - 174, PAL.gold, 14, 'left', 700);
    MONO('v ≥ ' + vminFor(f.gap).toFixed(1) + ' m/s at the lip', lip - 192, GY - 154, PAL.text, 12);
    bx.globalAlpha = 1;
  }
}

function drawBike() {
  const b = state.bike;
  const sy = GY - 8 - b.y * PXM;
  if (b.dead <= 0 && b.v > 5) {
    const al = 0.35 * (b.v / VMAX);
    bx.lineCap = 'round';
    for (let i = 0; i < 3; i++) {
      bx.strokeStyle = 'rgba(255,209,102,' + Math.max(0, al - i * 0.09).toFixed(2) + ')';
      bx.lineWidth = 3 - i * 0.7;
      bx.beginPath();
      bx.moveTo(BIKE_SX - 34 - i * 10, sy - 14 + i * 8);
      bx.lineTo(BIKE_SX - 34 - i * 10 - b.v * 2.2, sy - 14 + i * 8);
      bx.stroke();
    }
  }
  bx.save();
  bx.translate(BIKE_SX, sy);
  bx.rotate(b.lean);
  if (b.dead > 0) bx.rotate(b.dead * 5);
  bx.fillStyle = PAL.night;
  bx.beginPath(); bx.arc(-20, 0, 11, 0, 7); bx.arc(20, 0, 11, 0, 7); bx.fill();
  bx.fillStyle = 'rgba(247,237,226,.25)';
  bx.beginPath(); bx.arc(-20, 0, 4, 0, 7); bx.arc(20, 0, 4, 0, 7); bx.fill();
  bx.fillStyle = b.stalled > 0 ? '#4a3f5c' : PAL.body;
  rr(-26, -16, 52, 14, 7); bx.fill();
  bx.fillStyle = b.stalled > 0 ? '#6a5a7c' : PAL.coral;
  rr(0, -22, 18, 9, 4); bx.fill();
  bx.fillStyle = PAL.night;
  rr(-12, -40, 20, 26, 9); bx.fill();
  bx.fillStyle = '#f3e9d8';
  bx.beginPath(); bx.arc(12, -42, 8, 0, 7); bx.fill();
  bx.restore();
  if (b.gas && b.stalled <= 0 && !b.air && b.dead <= 0) {
    for (let i = 0; i < 5; i++) {
      const ph = (state.t * 3 + i * 0.7) % 1;
      bx.fillStyle = 'rgba(243,165,99,' + (0.22 * (1 - ph)).toFixed(2) + ')';
      bx.beginPath();
      bx.arc(BIKE_SX - 30 - ph * 46 - i * 6, sy - 2 - ph * 14 + (i % 3) * 4, 3 + ph * 7, 0, 7);
      bx.fill();
    }
  }
  if (b.stalled > 0) {
    for (let i = 0; i < 4; i++) {
      const ph = (state.t * 0.8 + i * 0.27) % 1;
      bx.fillStyle = 'rgba(200,195,210,' + (0.3 * (1 - ph)).toFixed(2) + ')';
      bx.beginPath(); bx.arc(BIKE_SX + 4 + Math.sin(ph * 9 + i) * 6, sy - 26 - ph * 44, 4 + ph * 8, 0, 7); bx.fill();
    }
  }
}

function drawHUD() {
  const b = state.bike;
  T(b.v.toFixed(1), 30, 74, PAL.text, 52, 'left', 300);
  T('m/s', 30 + bx.measureText(b.v.toFixed(1)).width + 10, 74, PAL.dim, 16, 'left', 600);
  rr(30, 88, 220, 8, 4); bx.fillStyle = 'rgba(255,255,255,.08)'; bx.fill();
  const frac = b.v / VMAX;
  rr(30, 88, Math.max(6, 220 * frac), 8, 4);
  bx.fillStyle = frac > 0.85 ? PAL.coral : frac > 0.6 ? PAL.gold : PAL.teal; bx.fill();
  for (let i = 0; i < state.bikes; i++) {
    bx.fillStyle = PAL.coral; bx.beginPath(); bx.arc(36 + i * 18, 112, 5, 0, 7); bx.fill();
  }
  for (let i = 0; i < state.crashes; i++) {
    bx.fillStyle = 'rgba(255,107,107,.45)'; bx.fillRect(96 + i * 12, 106, 7, 7);
  }
  chip(LW - 250, 24, 220, 34);
  MONO('T ' + state.t.toFixed(1) + 's / PAR ' + state.par + 's', LW - 238, 46, PAL.text, 13);
  chip(LW - 250, 64, 220, 34);
  MONO('SCORE ' + state.score, LW - 238, 86, PAL.gold, 13);
  if (state.practice) { chip(LW - 250, 104, 220, 30, 'rgba(108,184,255,.4)'); MONO('PRACTICE — UNRANKED', LW - 238, 124, PAL.blue, 12); }
  const left = state.par * DNF_MULT - state.t;
  if (left < 10) TC('DNF IN ' + Math.max(0, left).toFixed(0) + 's', 160, PAL.coral, 30, 800);
}

const MENU_Y0 = 230, MENU_H = 64, CARD_H = 52;

function drawBackdrop() { drawSky(); drawMesas(); drawGround(false); }
function pulse() { return 0.55 + 0.45 * Math.sin(performance.now() / 260); }

function drawAttract() {
  drawBackdrop();
  try { bx.letterSpacing = '10px'; } catch (e) {}
  TC('REDLINE', 170, PAL.text, 68, 800);
  try { bx.letterSpacing = '0px'; } catch (e) {}
  TC('A KINEMATICS GRAND PRIX', 206, PAL.gold, 16, 700);
  TC('The throttle is acceleration. The track demands a v–t shape.', 290, PAL.dim, 16, 400);
  TC('Ride the graph. Clear the gaps. Mind the heat.', 318, PAL.dim, 16, 400);
  bx.globalAlpha = pulse();
  chip(LW / 2 - 110, 376, 220, 46, 'rgba(255,209,102,.5)');
  TC('INSERT COIN', 406, PAL.gold, 18, 800);
  bx.globalAlpha = 1;
  TC('HI ' + store.hi, 460, PAL.dim, 14, 600);
  TC('hold → or SPACE to throttle · ← to brake', 506, PAL.faint, 13, 400);
}

function drawActs() {
  drawBackdrop();
  TC('SELECT EVENT', 150, PAL.gold, 15, 800);
  for (let i = 0; i < 3; i++) {
    const a = i + 1, sel = state.menuIdx === i, open = actUnlocked(a);
    const cy = MENU_Y0 + i * MENU_H;
    chip(LW / 2 - 260, cy, 520, CARD_H, sel ? 'rgba(255,209,102,.7)' : undefined);
    T('ACT ' + a + ' — ' + ACT_META[a].name, LW / 2 - 236, cy + 32, open ? (sel ? PAL.gold : PAL.text) : PAL.faint, 17, 'left', 700);
    T(open ? ACT_META[a].sub : 'LOCKED', LW / 2 + 236, cy + 31, open ? PAL.dim : PAL.coral, 12, 'right', 500);
  }
  TC('Clear an act to unlock the next · marshal code unlocks all', 470, PAL.faint, 13, 400);
}

function drawBrief() {
  drawBackdrop();
  const m = ACT_META[state.act];
  TC('ACT ' + state.act, 130, PAL.dim, 14, 700);
  TC(m.name, 178, PAL.text, 44, 800);
  TC(m.sub, 212, PAL.gold, 15, 600);
  for (let i = 0; i < m.brief.length; i++) TC(m.brief[i], 280 + i * 30, PAL.dim, 15, 400);
  bx.globalAlpha = pulse();
  TC('PRESS START', 440, PAL.gold, 17, 800);
  bx.globalAlpha = 1;
}

function drawClear() {
  drawBackdrop();
  const ci = state.clearInfo;
  TC('STAGE CLEAR', 140, PAL.green, 40, 800);
  TC(ci.name, 174, PAL.gold, 15, 700);
  const rows = [
    ['TIME', ci.time.toFixed(1) + 's / par ' + ci.par + 's'],
    ['GATES FIRST TRY', ci.perfect + ' of ' + ci.gates + '   +' + (ci.perfect * 400)],
    ['TIME BONUS', '+' + ci.timeBonus],
    ['NO-CRASH', ci.noCrash ? '+1000' : '—'],
    ['STAGE TOTAL', '+' + ci.gained],
  ];
  for (let i = 0; i < rows.length; i++) {
    const y = 230 + i * 38;
    T(rows[i][0], LW / 2 - 200, y, i === 4 ? PAL.gold : PAL.dim, 14, 'left', 600);
    MONO(rows[i][1], LW / 2 + 200, y, i === 4 ? PAL.gold : PAL.text, 14, 'right');
  }
  bx.globalAlpha = pulse();
  TC('PRESS START FOR THE FLAG QUESTION', 460, PAL.gold, 14, 700);
  bx.globalAlpha = 1;
}

function drawQuestion() {
  drawBackdrop();
  const q = state.question;
  TC(state.qIsCross ? '★ CROSSOVER · +1000 ★' : 'FLAG QUESTION · +750', 96, state.qIsCross ? PAL.gold : PAL.green, 15, 800);
  const lines = q.q.split('\n');
  for (let i = 0; i < lines.length; i++) TC(lines[i], 136 + i * 26, PAL.text, 16, 600);
  for (let i = 0; i < 3; i++) {
    const cy = MENU_Y0 + i * MENU_H;
    let col = PAL.text, stroke;
    if (state.qResolved) {
      if (i === q.a) { col = PAL.green; stroke = 'rgba(149,214,92,.7)'; }
      else if (i === state.qPick) { col = PAL.coral; stroke = 'rgba(255,107,107,.7)'; }
      else col = PAL.faint;
    }
    chip(LW / 2 - 260, cy, 520, CARD_H, stroke);
    T((i + 1) + '.  ' + q.c[i], LW / 2 - 232, cy + 32, col, 16, 'left', 600);
  }
  if (state.qResolved) {
    const why = q.why.split('\n');
    for (let i = 0; i < why.length; i++) TC(why[i], 452 + i * 22, PAL.dim, 13, 400);
  } else {
    TC('press 1, 2 or 3 — or tap a card', 462, PAL.faint, 13, 400);
  }
}

function drawGameOver() {
  drawBackdrop();
  const ci = state.clearInfo || { reason: 'GAME OVER', champion: false };
  TC(ci.champion ? '★ CHAMPION ★' : 'GAME OVER', 180, ci.champion ? PAL.gold : PAL.coral, 46, 800);
  TC(ci.reason, 218, PAL.dim, 15, 500);
  MONO('SCORE  ' + state.score, LW / 2, 290, PAL.text, 20, 'center');
  MONO('BEST   ' + store.hi, LW / 2, 322, PAL.gold, 20, 'center');
  bx.globalAlpha = pulse();
  TC('PRESS START', 420, PAL.gold, 17, 800);
  bx.globalAlpha = 1;
}

function drawPlay() {
  drawSky(); drawMesas(); drawGround(true);
  for (const f of state.course.feats) drawFeature(f);
  const fx = wxToSx(state.course.len);
  if (fx > -60 && fx < LW + 60) {
    bx.fillStyle = 'rgba(247,237,226,.7)'; bx.fillRect(fx, GY - 130, 3, 124);
    for (let r = 0; r < 2; r++) for (let i = 0; i < 5; i++) {
      bx.fillStyle = (r + i) % 2 ? 'rgba(247,237,226,.9)' : 'rgba(23,16,34,.9)';
      bx.fillRect(fx + 3 + i * 9, GY - 130 + r * 9, 9, 9);
    }
  }
  drawBike();
  drawHUD();
  if (state.flashT > 0 && state.flash) {
    bx.globalAlpha = Math.min(1, state.flashT * 2);
    TC(state.flash, 200, PAL.gold, 26, 800);
    bx.globalAlpha = 1;
  }
}

/* ============================================================ *
 *  8. PIT WALL PANEL — live v-t graph + requirement card
 * ============================================================ */
const vt = document.getElementById('vtcanvas').getContext('2d');
const elHeatFill = document.getElementById('heatfill');
const elHeatPct = document.getElementById('heatpct');
const elReq = document.getElementById('reqcard');
const elPar = document.getElementById('parrow');
let lastReqHTML = '';

function drawPanel() {
  const W = 276, H = 150;
  vt.fillStyle = '#150f26'; vt.fillRect(0, 0, W, H);
  const vToY = (v) => H - 8 - (v / 28) * (H - 20);
  // grid
  vt.strokeStyle = '#251c3e'; vt.lineWidth = 1;
  for (const v of [0, 7, 14, 21, 28]) {
    vt.beginPath(); vt.moveTo(24, vToY(v)); vt.lineTo(W - 4, vToY(v)); vt.stroke();
    vt.fillStyle = '#6f6585'; vt.font = '7px monospace'; vt.fillText(String(v), 4, vToY(v) + 2);
  }
  const f = state.screen === 'play' ? currentFeature() : null;
  // demand stripe — what the track wants, drawn on the same axes you ride
  if (f) {
    if (f.t === 'cruise') {
      vt.fillStyle = 'rgba(149,214,92,.2)';
      vt.fillRect(24, vToY(f.hi), W - 28, vToY(f.lo) - vToY(f.hi));
    } else if (f.t === 'trap') {
      vt.strokeStyle = '#ff6b6b'; vt.setLineDash([3, 3]);
      vt.beginPath(); vt.moveTo(24, vToY(f.max)); vt.lineTo(W - 4, vToY(f.max)); vt.stroke();
      vt.setLineDash([]);
    } else if (f.t === 'stop') {
      vt.fillStyle = 'rgba(255,107,107,.2)';
      vt.fillRect(24, vToY(0.8), W - 28, vToY(0) - vToY(0.8));
    } else if (f.t === 'accel' && f.armed) {
      vt.strokeStyle = '#6cb8ff'; vt.setLineDash([3, 3]);
      vt.beginPath(); vt.moveTo(24, vToY(f.vIn + f.gain)); vt.lineTo(W - 4, vToY(f.vIn + f.gain)); vt.stroke();
      vt.setLineDash([]);
    } else if (f.t === 'jump') {
      vt.strokeStyle = '#ffd166'; vt.setLineDash([3, 3]);
      vt.beginPath(); vt.moveTo(24, vToY(vminFor(f.gap))); vt.lineTo(W - 4, vToY(vminFor(f.gap))); vt.stroke();
      vt.setLineDash([]);
    }
  }
  // the trace — your last 24 s of riding
  if (state.trace.length > 1) {
    const t1 = state.trace[state.trace.length - 1].t, t0 = Math.max(0, t1 - 24);
    vt.strokeStyle = '#ffd166'; vt.lineWidth = 2; vt.beginPath();
    let started = false;
    for (const p of state.trace) {
      if (p.t < t0) continue;
      const px = 24 + ((p.t - t0) / 24) * (W - 28);
      const py = vToY(Math.min(28, p.v));
      if (!started) { vt.moveTo(px, py); started = true; } else vt.lineTo(px, py);
    }
    vt.stroke();
  }
  // DOM widgets
  if (state.bike) {
    const h = state.bike.heat;
    elHeatFill.style.width = h.toFixed(0) + '%';
    elHeatFill.style.background = h > 80 ? '#ff6b6b' : h > 55 ? '#ffd166' : '#95d65c';
    elHeatPct.textContent = h.toFixed(0) + '%';
  }
  let html;
  if (state.screen !== 'play') {
    html = state.screen === 'attract' ? 'INSERT COIN TO QUALIFY' : 'PIT WALL STANDING BY';
  } else if (!f) {
    html = '<span class="big">RUN TO THE FLAG</span><br>FINISH AT ' + state.course.len + ' m.<br>NOTHING LEFT BUT THROTTLE.';
  } else if (f.t === 'cruise') {
    html = '<span class="big">CRUISE BAND ' + f.lo + '–' + f.hi + ' m/s</span><br>' +
      'HOLD v INSIDE THE STRIPE.<br><span class="eq">FLAT v–t LINE = a ≈ 0</span><br>' +
      'TAP THE GAS — DON&#8217;T HOLD IT.<br>GRACE: ' + CRUISE_GRACE + ' s OUT OF BAND.';
  } else if (f.t === 'accel') {
    const need = (f.gain / A_GAS).toFixed(1);
    html = '<span class="big">GAIN ZONE +' + f.gain + ' m/s</span><br>' +
      'EXIT FASTER THAN YOU ENTERED.<br><span class="eq">Δv = aΔt → ' + f.gain + ' = 6·t → t ≥ ' + need + ' s</span><br>' +
      'OF FULL THROTTLE. WATCH HEAT.';
  } else if (f.t === 'stop') {
    const v = state.bike.v, d = (v * v) / (2 * Math.abs(A_BRK));
    html = '<span class="big">STOP BOX AHEAD</span><br>' +
      'REACH v = 0 INSIDE THE BOX.<br><span class="eq">d = v²/2a = ' + (v * v).toFixed(0) + '/18 = ' + d.toFixed(1) + ' m</span><br>' +
      'THAT&#8217;S YOUR BRAKING DISTANCE<br>AT THIS SPEED. RIGHT NOW.';
  } else if (f.t === 'trap') {
    html = '<span class="big">SPEED TRAP — MAX ' + f.max + '</span><br>' +
      'CROSS THE RADAR UNDER LIMIT.<br><span class="eq">NEED Δv = ' + Math.max(0, state.bike.v - f.max).toFixed(1) + ' m/s OF BRAKING</span>';
  } else if (f.t === 'jump') {
    const vm = vminFor(f.gap);
    html = '<span class="big">JUMP — GAP ' + f.gap + ' m</span><br>' +
      '30° RAMP, g = 10.<br><span class="eq">R = v²sin60°/g ≥ ' + f.gap + ' → v ≥ ' + vm.toFixed(1) + '</span><br>' +
      (typeof f.land === 'number'
        ? 'DECK ENDS AT ' + (f.gap + f.land) + ' m:<br>KEEP v ≤ ' + vminFor(f.gap + f.land).toFixed(1) + ' m/s. A WINDOW.'
        : 'CHECK THE SPEEDO AT THE LIP.');
  } else {
    html = '';
  }
  if (html !== lastReqHTML) { elReq.innerHTML = html; lastReqHTML = html; }
  elPar.textContent = state.screen === 'play'
    ? 'T ' + state.t.toFixed(1) + 's · PAR ' + state.par + 's · DNF ' + (state.par * DNF_MULT).toFixed(0) + 's · CRASH ' + state.crashes + '/' + MAX_CRASH
    : 'HI ' + store.hi;
}

/* ============================================================ *
 *  9. INPUT
 * ============================================================ */
const GAS_KEYS = ['ArrowRight', 'ArrowUp', 'x', 'X', ' '];
const BRK_KEYS = ['ArrowLeft', 'ArrowDown', 'z', 'Z'];
window.addEventListener('keydown', (e) => {
  AU.ensure();
  if (state.screen === 'play') {
    if (GAS_KEYS.includes(e.key)) { state.bike.gas = true; e.preventDefault(); }
    if (BRK_KEYS.includes(e.key)) { state.bike.brake = true; e.preventDefault(); }
  } else {
    if ([' ', 'ArrowUp', 'ArrowDown'].includes(e.key)) e.preventDefault();
    menuKey(e.key);
  }
});
window.addEventListener('keyup', (e) => {
  if (!state.bike) return;
  if (GAS_KEYS.includes(e.key)) state.bike.gas = false;
  if (BRK_KEYS.includes(e.key)) state.bike.brake = false;
});
// touch zones (mobile): right half gas, left half brake
function bindZone(id, prop) {
  const el = document.getElementById(id);
  const on = (e) => { AU.ensure(); if (state.bike) state.bike[prop] = true; e.preventDefault(); };
  const off = (e) => { if (state.bike) state.bike[prop] = false; e.preventDefault(); };
  el.addEventListener('pointerdown', on);
  el.addEventListener('pointerup', off);
  el.addEventListener('pointercancel', off);
  el.addEventListener('pointerleave', off);
}
bindZone('tGas', 'gas');
bindZone('tBrake', 'brake');
// canvas taps: menus advance; questions pick by row; acts menu picks by row
cv.addEventListener('pointerdown', (e) => {
  AU.ensure();
  const vy = (e.offsetY / SCALE);
  if (state.screen === 'question') {
    if (!state.qResolved) {
      const idx = Math.floor((vy - MENU_Y0) / MENU_H);
      if (idx >= 0 && idx <= 2 && (vy - MENU_Y0) % MENU_H <= CARD_H) answerQuestion(idx);
    }
    return;
  }
  if (state.screen === 'acts') {
    const idx = Math.floor((vy - MENU_Y0) / MENU_H);
    if (idx >= 0 && idx <= 2 && (vy - MENU_Y0) % MENU_H <= CARD_H) { state.menuIdx = idx; chooseAct(idx + 1); }
    return;
  }
  if (state.screen !== 'play') menuKey('Enter');
});

/* ============================================================ *
 *  10. MAIN LOOP
 * ============================================================ */
let last = performance.now() / 1000;
function frame() {
  const now = performance.now() / 1000;       // declared before ANY use
  const dt = Math.min(0.05, Math.max(0, now - last));
  last = now;

  if (state.screen === 'play') simStep(dt);

  beginFrame();
  if (state.screen === 'play') drawPlay();
  else if (state.screen === 'attract') drawAttract();
  else if (state.screen === 'acts') drawActs();
  else if (state.screen === 'brief') drawBrief();
  else if (state.screen === 'clear') drawClear();
  else if (state.screen === 'question') drawQuestion();
  else if (state.screen === 'gameover') drawGameOver();

  // non-play flashes (act complete, coin denied) draw over menus too
  if (state.screen !== 'play' && state.flashT > 0 && state.flash) {
    state.flashT -= dt;
    TC(state.flash, 500, PAL.gold, 16, 700);
  }

  drawPanel();
  // touch zones must not eat menu taps — only intercept while riding
  document.getElementById('touch').style.pointerEvents = state.screen === 'play' ? 'auto' : 'none';
  AU.engine(state.bike ? state.bike.v : 0,
    !!(state.bike && state.bike.gas), !!(state.bike && state.bike.stalled > 0));

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
