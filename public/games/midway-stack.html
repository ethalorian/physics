<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>STACK // one more block</title>
<!--
  STACK — the midway's quarter-eater. Eleventh cabinet, first of the
  pure-fun row. No questions, no telemetry, no acts: nothing between the
  player and the next drop.

  One tap. A block slides; you drop it on the tower. The overhang slices
  off and tumbles away, so every miss makes the tower narrower — until a
  full miss ends it. Land PERFECT and it chimes a semitone higher each
  time, streaks, and REGROWS your width. Reach height 150 and you hit THE
  SKY.

  Economy: 10 XP = one coin = THREE towers; your best tower is the score.
  Bridge protocol identical to every other cabinet (coinRequest / score).
  Practice mode after 900 ms without a bridge reply.
-->
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; background: #14101f;
    font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
    -webkit-user-select: none; user-select: none; touch-action: manipulation; }
  #wrap { display: flex; height: 100%; align-items: center; justify-content: center; padding: 12px; }
  #game { border-radius: 18px;
    box-shadow: 0 24px 70px rgba(0,0,0,.55), 0 0 0 1px rgba(255,255,255,.06);
    cursor: pointer; }
</style>
</head>
<body>
<div id="wrap"><canvas id="game"></canvas></div>

<script>
'use strict';
/* ============================================================ canvas */
const LW = 560, LH = 760;
const cv = document.getElementById('game');
const cx = cv.getContext('2d');
const DPR = Math.min(2, window.devicePixelRatio || 1);
let SCALE = 1;
function fit() {
  const aw = window.innerWidth - 24, ah = window.innerHeight - 24;
  SCALE = Math.max(0.35, Math.min(aw / LW, ah / LH));
  cv.width = Math.round(LW * SCALE * DPR);
  cv.height = Math.round(LH * SCALE * DPR);
  cv.style.width = Math.round(LW * SCALE) + 'px';
  cv.style.height = Math.round(LH * SCALE) + 'px';
}
window.addEventListener('resize', fit);
fit();

/* ============================================================ bridge */
const ARCADE = {
  playId: null, ranked: false, pending: false, practice: false,
  requestCoin() {
    if (this.pending) return;
    this.pending = true; this.practice = false; this.playId = null; this.ranked = false;
    try { window.parent.postMessage({ type: 'arcade:coinRequest', source: 'stack-arcade' }, '*'); } catch (e) {}
    setTimeout(() => {
      if (this.pending) { this.pending = false; this.practice = true; onCoinResult(true); }
    }, 900);
  },
  postScore(score, act, final) {
    if (!this.ranked || !this.playId) return;
    try {
      window.parent.postMessage({ type: 'arcade:score', source: 'stack-arcade',
        playId: this.playId, score: Math.round(score), act, final: !!final }, '*');
    } catch (e) {}
  },
};
window.addEventListener('message', (ev) => {
  const d = ev && ev.data;
  if (!d || typeof d !== 'object') return;
  if (d.type === 'arcade:coinAccepted') {
    ARCADE.pending = false; ARCADE.playId = d.playId || null; ARCADE.ranked = !!d.playId;
    ARCADE.practice = false; onCoinResult(true);
  } else if (d.type === 'arcade:coinDenied') {
    ARCADE.pending = false; ARCADE.practice = false; onCoinResult(false);
  }
});

/* ============================================================ audio */
const AU = {
  ctx: null,
  ensure() { if (this.ctx) return;
    try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} },
  tone(f, dur, type, vol, slide) {
    if (!this.ctx) return;
    const c = this.ctx, o = c.createOscillator(), g = c.createGain();
    o.type = type || 'sine'; o.frequency.value = f;
    if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(30, f + slide), c.currentTime + dur);
    g.gain.setValueAtTime(vol || 0.07, c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + dur);
    o.connect(g); g.connect(c.destination);
    o.start(); o.stop(c.currentTime + dur + 0.02);
  },
  thud() { this.tone(120, 0.12, 'triangle', 0.09, -60); },
  // the famous riser: each consecutive perfect climbs one semitone
  chime(streak) { const f = 523 * Math.pow(2, Math.min(streak, 14) / 12);
    this.tone(f, 0.22, 'sine', 0.09); this.tone(f * 2, 0.16, 'sine', 0.04); },
  crumble() { this.tone(180, 0.4, 'sawtooth', 0.07, -140); this.tone(70, 0.5, 'square', 0.05, -30); },
  sky() { [523, 659, 784, 1046, 1318].forEach((f, i) => setTimeout(() => this.tone(f, 0.3, 'sine', 0.08), i * 100)); },
};

/* ============================================================ state */
const W0 = 12, D0 = 12;          // starting footprint (logical units)
const HSTEP = 24;                // block height in px
const UPX = 16;                  // logical unit → px
const SKY = 150;                 // tower height cap — THE SKY
const PERFECT_EPS = 0.42;        // snap window (logical units)
const REGROW_AT = 4;             // streak needed to start regrowing
const TOWERS = 3;                // one coin = three towers, best counts

const store = {
  get hi() { try { return parseInt(localStorage.getItem('stack_hi') || '0', 10) || 0; } catch (e) { return 0; } },
  set hi(v) { try { localStorage.setItem('stack_hi', String(v)); } catch (e) {} },
};

const state = {
  screen: 'attract',     // attract | play | tween | gameover
  practice: false,
  tower: 1,              // 1..TOWERS
  runBest: 0,            // best tower score this run
  bestHeights: [],       // heights of each tower this run
  // current tower
  base: null,            // {x,z,w,d} footprint of tower top
  level: 0,              // blocks landed
  score: 0,
  streak: 0,
  // moving block
  mover: null,           // {axis:'x'|'z', pos, dir, speed, w, d, y}
  // visuals
  blocks: [],            // landed blocks for rendering {x,z,w,d,level,hue}
  slices: [],            // falling offcuts {x,z,w,d,level,vy,vx,age,hue}
  cam: 0, camTarget: 0,  // camera rise (px)
  hueBase: 210,
  flashT: 0, flashMsg: '', shake: 0,
  tweenT: 0, tweenMsg: '', tweenSub: '',
  skyHit: false,
};

function freshTower() {
  state.base = { x: 0, z: 0, w: W0, d: D0 };
  state.level = 0; state.score = 0; state.streak = 0;
  state.blocks = [{ x: 0, z: 0, w: W0, d: D0, level: 0, hue: state.hueBase }];
  state.slices = [];
  state.cam = 0; state.camTarget = 0;
  state.skyHit = false;
  spawnMover();
}
function speedFor(level) { return Math.min(9.5, 3.0 + level * 0.16); }
function spawnMover() {
  const axis = state.level % 2 === 0 ? 'x' : 'z';
  const from = (state.level % 4 < 2) ? -1 : 1;   // vary entry side
  state.mover = {
    axis,
    pos: from * 16,
    dir: -from,
    speed: speedFor(state.level),
    w: state.base.w, d: state.base.d,
    y: state.level + 1,
  };
}

function onCoinResult(ok) {
  if (!ok) { state.screen = 'attract'; state.flashMsg = 'COIN DENIED'; state.flashT = 1.5; return; }
  state.practice = ARCADE.practice;
  state.tower = 1; state.runBest = 0; state.bestHeights = [];
  state.hueBase = 180 + Math.random() * 140;
  freshTower();
  state.screen = 'play';
  AU.tone(660, 0.1, 'sine', 0.06);
}

/* ============================================================ core */
function drop() {
  const m = state.mover, b = state.base;
  if (!m) return;
  const movingDim = m.axis === 'x' ? b.w : b.d;
  const basePos = m.axis === 'x' ? b.x : b.z;
  const delta = m.pos - basePos;
  const overlap = movingDim - Math.abs(delta);

  if (overlap <= 0.05) { // clean miss — the whole block falls, tower over
    state.slices.push({ x: m.axis === 'x' ? m.pos : b.x, z: m.axis === 'z' ? m.pos : b.z,
      w: b.w, d: b.d, level: m.y, vy: 0, vx: Math.sign(delta) * 3, vxIsZ: m.axis === 'z', age: 0,
      hue: state.hueBase + m.y * 6 });
    state.mover = null;
    towerOver(false);
    return;
  }

  let perfect = Math.abs(delta) <= PERFECT_EPS;
  let nx = b.x, nz = b.z, nw = b.w, nd = b.d;
  if (perfect) {
    state.streak += 1;
    state.score += 10 + 15 * Math.min(state.streak, 8);
    // streak regrows the footprint toward its original size
    if (state.streak >= REGROW_AT) {
      nw = Math.min(W0, nw * 1.06 + 0.1);
      nd = Math.min(D0, nd * 1.06 + 0.1);
    }
    AU.chime(state.streak);
    state.flashMsg = 'PERFECT ×' + state.streak; state.flashT = 0.7;
  } else {
    state.streak = 0;
    state.score += 10;
    // slice: the overhang falls away
    const sliceW = Math.abs(delta);
    const keepPos = delta > 0 ? basePos + (movingDim - overlap) / 2 + 0 : basePos - (movingDim - overlap) / 2;
    // recompute properly: kept block spans the overlap region
    const lo = Math.max(m.pos - movingDim / 2, basePos - movingDim / 2);
    const hi2 = Math.min(m.pos + movingDim / 2, basePos + movingDim / 2);
    const center = (lo + hi2) / 2;
    const sliceCenter = delta > 0 ? hi2 + sliceW / 2 : lo - sliceW / 2;
    if (m.axis === 'x') { nx = center; nw = overlap; }
    else { nz = center; nd = overlap; }
    state.slices.push({
      x: m.axis === 'x' ? sliceCenter : b.x, z: m.axis === 'z' ? sliceCenter : b.z,
      w: m.axis === 'x' ? sliceW : b.w, d: m.axis === 'z' ? sliceW : b.d,
      level: m.y, vy: 0, vx: Math.sign(delta) * 1.5, vxIsZ: m.axis === 'z', age: 0,
      hue: state.hueBase + m.y * 6 });
    AU.thud();
    state.shake = 0.18;
    void keepPos;
  }
  state.base = { x: nx, z: nz, w: nw, d: nd };
  state.level += 1;
  state.blocks.push({ x: nx, z: nz, w: nw, d: nd, level: state.level, hue: state.hueBase + state.level * 6 });
  if (state.blocks.length > 24) state.blocks.shift(); // only the visible crown matters
  state.camTarget = state.level * HSTEP;

  if (state.level >= SKY) { // THE SKY
    state.skyHit = true;
    state.score += 1000;
    state.mover = null;
    AU.sky();
    towerOver(true);
    return;
  }
  spawnMover();
}

function towerOver(sky) {
  state.runBest = Math.max(state.runBest, state.score);
  state.bestHeights.push(state.level);
  if (!sky) AU.crumble();
  ARCADE.postScore(state.runBest, state.tower, false);
  if (state.tower < TOWERS) {
    state.tweenMsg = sky ? 'THE SKY!' : 'TOWER DOWN';
    state.tweenSub = 'height ' + state.level + ' · score ' + state.score;
    state.tweenT = 0;
    state.screen = 'tween';
  } else {
    if (state.runBest > store.hi) store.hi = state.runBest;
    ARCADE.postScore(state.runBest, state.tower, true);
    state.screen = 'gameover';
  }
}
function nextTower() {
  state.tower += 1;
  freshTower();
  state.screen = 'play';
  AU.tone(660, 0.1, 'sine', 0.06);
}

/* ============================================================ sim */
function stepPlay(dt) {
  const m = state.mover;
  if (m) {
    m.pos += m.dir * m.speed * dt;
    const lim = 14;
    if (m.pos > lim) { m.pos = lim; m.dir = -1; }
    if (m.pos < -lim) { m.pos = -lim; m.dir = 1; }
  }
  state.cam += (state.camTarget - state.cam) * Math.min(1, dt * 6);
}
function stepCommon(dt) {
  if (state.flashT > 0) state.flashT -= dt;
  if (state.shake > 0) state.shake = Math.max(0, state.shake - dt * 1.2);
  for (let i = state.slices.length - 1; i >= 0; i--) {
    const s = state.slices[i];
    s.age += dt; s.vy += 38 * dt;
    s.fall = (s.fall || 0) + s.vy * dt;
    s.x += (s.vxIsZ ? 0 : (s.vx || 0)) * dt;
    s.z += (s.vxIsZ ? (s.vx || 0) : 0) * dt;
    if (s.age > 2.2) state.slices.splice(i, 1);
  }
}

/* ============================================================ render */
const ISO_X = Math.cos(Math.PI / 6), ISO_Y = Math.sin(Math.PI / 6) * 0.72;
const CXP = LW / 2, CYP = LH * 0.62;
function isoPt(x, z, levelPx) {
  return [CXP + (x - z) * ISO_X * UPX,
          CYP + (x + z) * ISO_Y * UPX - levelPx + state.cam];
}
function blockColor(hue, part) {
  const h = ((hue % 360) + 360) % 360;
  if (part === 'top') return `hsl(${h},62%,72%)`;
  if (part === 'left') return `hsl(${h},55%,56%)`;
  return `hsl(${h},58%,44%)`;
}
function drawBox(x, z, w, d, levelPx, hue, alpha) {
  // eight footprint corners at top and bottom of this block
  const x0 = x - w / 2, x1 = x + w / 2, z0 = z - d / 2, z1 = z + d / 2;
  const topY = levelPx, botY = levelPx - HSTEP;
  const A = isoPt(x0, z0, topY), B = isoPt(x1, z0, topY),
        C = isoPt(x1, z1, topY), D = isoPt(x0, z1, topY);
  const A2 = isoPt(x0, z0, botY), B2 = isoPt(x1, z0, botY),
        C2 = isoPt(x1, z1, botY), D2 = isoPt(x0, z1, botY);
  cx.globalAlpha = alpha == null ? 1 : alpha;
  // right face (x1 side)
  cx.fillStyle = blockColor(hue, 'right');
  cx.beginPath(); cx.moveTo(B[0], B[1]); cx.lineTo(C[0], C[1]); cx.lineTo(C2[0], C2[1]); cx.lineTo(B2[0], B2[1]); cx.closePath(); cx.fill();
  // left face (z1 side)
  cx.fillStyle = blockColor(hue, 'left');
  cx.beginPath(); cx.moveTo(C[0], C[1]); cx.lineTo(D[0], D[1]); cx.lineTo(D2[0], D2[1]); cx.lineTo(C2[0], C2[1]); cx.closePath(); cx.fill();
  // top
  cx.fillStyle = blockColor(hue, 'top');
  cx.beginPath(); cx.moveTo(A[0], A[1]); cx.lineTo(B[0], B[1]); cx.lineTo(C[0], C[1]); cx.lineTo(D[0], D[1]); cx.closePath(); cx.fill();
  cx.globalAlpha = 1;
}

function skyGradient() {
  // the sky climbs through hues with the tower — the height IS the scenery
  const t = Math.min(1, state.level / SKY);
  const h1 = (state.hueBase + 140 + t * 160) % 360;
  const h2 = (state.hueBase + 200 + t * 160) % 360;
  const g = cx.createLinearGradient(0, 0, 0, LH);
  g.addColorStop(0, `hsl(${h1},45%,${14 + t * 10}%)`);
  g.addColorStop(1, `hsl(${h2},40%,${30 + t * 14}%)`);
  return g;
}

function T(s, x, y, color, size, align, weight) {
  cx.font = (weight || 600) + ' ' + (size || 16) + 'px Inter, system-ui, sans-serif';
  cx.textAlign = align || 'center';
  cx.fillStyle = color;
  cx.fillText(s, x, y);
}

function drawTowerScene() {
  cx.fillStyle = skyGradient(); cx.fillRect(0, 0, LW, LH);
  // faint stars appear with height
  const starN = Math.floor(Math.min(40, state.level / 3));
  cx.fillStyle = 'rgba(255,255,255,.5)';
  for (let i = 0; i < starN; i++) {
    const sx2 = ((i * 97.3) % LW), sy2 = ((i * 53.7) % (LH * 0.5)) + ((state.cam * 0.1) % 20);
    cx.fillRect(sx2, sy2, 2, 2);
  }
  cx.save();
  if (state.shake > 0) cx.translate((Math.random() - 0.5) * state.shake * 26, (Math.random() - 0.5) * state.shake * 26);
  // landed blocks, bottom-up
  for (const b of state.blocks) drawBox(b.x, b.z, b.w, b.d, b.level * HSTEP, b.hue);
  // falling slices
  for (const s of state.slices) {
    drawBox(s.x, s.z, s.w, s.d, s.level * HSTEP - (s.fall || 0) * HSTEP * 0.15, s.hue,
      Math.max(0, 1 - s.age / 2.2));
  }
  // the mover
  const m = state.mover;
  if (m && state.screen === 'play') {
    const mx = m.axis === 'x' ? m.pos : state.base.x;
    const mz = m.axis === 'z' ? m.pos : state.base.z;
    drawBox(mx, mz, m.w, m.d, m.y * HSTEP, state.hueBase + m.y * 6, 0.96);
    // shadow of perfect alignment: thin outline where the base edge is
    const b = state.base;
    const gp = isoPt(b.x, b.z, (m.y) * HSTEP);
    void gp;
  }
  cx.restore();
}

function drawHUD() {
  T(String(state.level), LW / 2, 86, 'rgba(255,255,255,.95)', 64, 'center', 200);
  T('TOWER ' + state.tower + ' / ' + TOWERS, LW / 2, 116, 'rgba(255,255,255,.55)', 14, 'center', 600);
  T('SCORE ' + state.score, 20, 36, 'rgba(255,255,255,.8)', 15, 'left', 600);
  T('BEST ' + Math.max(store.hi, state.runBest), LW - 20, 36, 'rgba(255,255,255,.55)', 15, 'right', 600);
  if (state.practice) T('PRACTICE — UNRANKED', LW - 20, 58, 'rgba(150,200,255,.7)', 12, 'right', 600);
  if (state.streak >= 2) T('🔥 ' + state.streak, 20, 62, '#ffd166', 16, 'left', 700);
  if (state.flashT > 0 && state.flashMsg) {
    cx.globalAlpha = Math.min(1, state.flashT * 2.5);
    T(state.flashMsg, LW / 2, 160, '#ffd166', 24, 'center', 800);
    cx.globalAlpha = 1;
  }
}

function pulse() { return 0.55 + 0.45 * Math.sin(performance.now() / 280); }

function drawAttract() {
  cx.fillStyle = skyGradient(); cx.fillRect(0, 0, LW, LH);
  drawDemoTower();
  T('STACK', LW / 2, 200, 'rgba(255,255,255,.96)', 72, 'center', 800);
  T('one tap · one block · one more try', LW / 2, 238, 'rgba(255,255,255,.6)', 16, 'center', 400);
  T('Overhang gets sliced. PERFECT drops chime,', LW / 2, 300, 'rgba(255,255,255,.55)', 14, 'center', 400);
  T('streak, and grow your block back.', LW / 2, 322, 'rgba(255,255,255,.55)', 14, 'center', 400);
  T('One coin = THREE towers. Best one counts.', LW / 2, 354, '#ffd166', 14, 'center', 600);
  cx.globalAlpha = pulse();
  T('TAP TO INSERT COIN', LW / 2, 470, '#ffd166', 20, 'center', 800);
  cx.globalAlpha = 1;
  T('HI ' + store.hi, LW / 2, 510, 'rgba(255,255,255,.5)', 14, 'center', 600);
}
let demoB = null;
function drawDemoTower() {
  if (!demoB) { demoB = []; for (let i = 0; i < 7; i++) demoB.push({ w: 12 - i * 0.8, l: i }); }
  const t = performance.now() / 1000;
  for (const b of demoB) drawBox(0, 0, b.w, b.w, b.l * HSTEP - 240, 200 + b.l * 8);
  drawBox(Math.sin(t * 1.6) * 6, 0, demoB[6].w, demoB[6].w, 7 * HSTEP - 240, 256, 0.95);
}

function drawTween() {
  drawTowerScene();
  cx.fillStyle = 'rgba(10,8,20,.55)'; cx.fillRect(0, 0, LW, LH);
  T(state.tweenMsg, LW / 2, LH * 0.4, state.tweenMsg === 'THE SKY!' ? '#ffd166' : '#ff6b6b', 44, 'center', 800);
  T(state.tweenSub, LW / 2, LH * 0.4 + 36, 'rgba(255,255,255,.7)', 16, 'center', 500);
  T('TOWER ' + (state.tower + 1) + ' OF ' + TOWERS + ' READY', LW / 2, LH * 0.4 + 90, 'rgba(255,255,255,.85)', 18, 'center', 700);
  cx.globalAlpha = pulse();
  T('TAP TO BUILD', LW / 2, LH * 0.4 + 130, '#ffd166', 18, 'center', 800);
  cx.globalAlpha = 1;
}

function drawGameOver() {
  drawTowerScene();
  cx.fillStyle = 'rgba(10,8,20,.62)'; cx.fillRect(0, 0, LW, LH);
  T('GAME OVER', LW / 2, LH * 0.32, 'rgba(255,255,255,.95)', 40, 'center', 800);
  T('best tower  ' + state.runBest, LW / 2, LH * 0.32 + 52, '#ffd166', 22, 'center', 700);
  T('heights  ' + state.bestHeights.join(' · '), LW / 2, LH * 0.32 + 84, 'rgba(255,255,255,.6)', 15, 'center', 500);
  T('ALL-TIME  ' + store.hi, LW / 2, LH * 0.32 + 116, 'rgba(255,255,255,.7)', 15, 'center', 600);
  cx.globalAlpha = pulse();
  T('TAP FOR A NEW COIN', LW / 2, LH * 0.32 + 180, '#ffd166', 18, 'center', 800);
  cx.globalAlpha = 1;
}

/* ============================================================ loop */
let last = performance.now() / 1000;
function frame() {
  const now = performance.now() / 1000;
  const dt = Math.min(0.05, Math.max(0, now - last));
  last = now;
  cx.setTransform(SCALE * DPR, 0, 0, SCALE * DPR, 0, 0);
  cx.imageSmoothingEnabled = true;
  cx.clearRect(0, 0, LW, LH);
  stepCommon(dt);
  if (state.screen === 'play') { stepPlay(dt); drawTowerScene(); drawHUD(); }
  else if (state.screen === 'attract') drawAttract();
  else if (state.screen === 'tween') drawTween();
  else if (state.screen === 'gameover') drawGameOver();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

/* ============================================================ input */
function act() {
  AU.ensure();
  if (state.screen === 'attract') { ARCADE.requestCoin(); return; }
  if (state.screen === 'play') { drop(); return; }
  if (state.screen === 'tween') { nextTower(); return; }
  if (state.screen === 'gameover') { state.screen = 'attract'; return; }
}
cv.addEventListener('pointerdown', (e) => { e.preventDefault(); act(); });
window.addEventListener('keydown', (e) => {
  if (e.repeat) return;
  if (e.code === 'Space' || e.code === 'Enter') { e.preventDefault(); act(); }
});
</script>
</body>
</html>
