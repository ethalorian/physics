<title>GARAGE // the car project cabinet</title>
<!--
  GARAGE — the Car Project cabinet (Unit 8). Ninth and final machine: not a
  unit, a SYNTHESIS. This game is a rehearsal of the real 9-day build —
  every act mirrors the actual classroom days, every tip cites the real
  build steps, and the two decisions that make or break the physical car
  (CIRCUIT DESIGN and GEAR RATIO) are the gameplay itself.

  ACT I   THE WIRING BAY — Day 2/6: wire battery, switch, motor. Series vs
                           parallel cells, polarity, no shorts, and a
                           diagnose-the-fault level (real debugging rehearsal).
  ACT II  THE GEAR LAB   — Day 3: pinion × gear × wheel against a real DC
                           motor curve. Three events, three different best
                           ratios — then the WHEEL COMMIT: one setup for all.
  ACT III RACE DAY       — Day 9: circuit + gears + mass-vs-decoration,
                           against rival ghost cars and the judging table.

  Speaks the arcade bridge protocol (docs/ARCADE_PATTERN.md).
-->

    letter-spacing:.15em;cursor:pointer;border-bottom:1px dotted #57534e}

<script>
"use strict";
/* ================================================== utils */
const $=q=>document.querySelector(q);
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const rnd=(a,b)=>a+Math.random()*(b-a);
const pick=a=>a[Math.floor(Math.random()*a.length)];
const fmt=(n,d=1)=>{const s=(+n).toFixed(d);return s.replace(/\.0+$/,'');};
const hyp=Math.hypot, TAU=Math.PI*2;
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

/* ================================================== canvas */
const cv=$('#c'),ctx=cv.getContext('2d');
let W=0,H=0,DPR=1;
function resize(){DPR=Math.min(2,window.devicePixelRatio||1);
  W=window.innerWidth;H=window.innerHeight;
  cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);}
window.addEventListener('resize',resize);resize();

/* ================================================== persistence */
let PROG={a2:false,a3:false,teacher:false}, HIS={1:0,2:0,3:0};
try{Object.assign(PROG,JSON.parse(localStorage.getItem('garage2_prog')||'{}'));
    Object.assign(HIS, JSON.parse(localStorage.getItem('garage2_hi')||'{}'));}catch(e){}
function saveProg(){try{localStorage.setItem('garage2_prog',JSON.stringify(PROG));}catch(e){}}
function saveHi(){try{localStorage.setItem('garage2_hi',JSON.stringify(HIS));}catch(e){}}
function unlocked(a){return a===1||PROG.teacher||(a===2&&PROG.a2)||(a===3&&PROG.a3);}

/* ================================================== audio */
let AC=null,muted=false,motorGain=null,motorOsc=null;
function audio(){if(AC||muted)return;try{
  AC=new (window.AudioContext||window.webkitAudioContext)();
  motorOsc=AC.createOscillator();motorOsc.type='sawtooth';motorOsc.frequency.value=80;
  const lp=AC.createBiquadFilter();lp.type='lowpass';lp.frequency.value=600;
  motorGain=AC.createGain();motorGain.gain.value=0;
  motorOsc.connect(lp);lp.connect(motorGain);motorGain.connect(AC.destination);motorOsc.start();}catch(e){}}
function setMotor(level,rpmFrac){if(!AC||!motorGain)return;
  motorGain.gain.setTargetAtTime(muted?0:clamp(level,0,0.06),AC.currentTime,0.06);
  if(motorOsc)motorOsc.frequency.setTargetAtTime(60+clamp(rpmFrac||0,0,1)*240,AC.currentTime,0.06);}
function beep(f,dur=.12,type='square',vol=.12,slide=0){if(!AC||muted)return;
  const o=AC.createOscillator(),g=AC.createGain();o.type=type;o.frequency.value=f;
  if(slide)o.frequency.exponentialRampToValueAtTime(Math.max(30,f+slide),AC.currentTime+dur);
  g.gain.value=vol;g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+dur);
  o.connect(g);g.connect(AC.destination);o.start();o.stop(AC.currentTime+dur);}
function chord(notes,step=.09){notes.forEach((n,i)=>setTimeout(()=>beep(n,.22,'triangle',.12),i*step*1000));}
function bzzt(){beep(110,.3,'sawtooth',.2,-40);}

/* ================================================== host-app bridge */
const ARCADE={
  embedded:window.parent!==window,
  playId:null, pendingCoin:null,
  emit(type,data){if(this.embedded)
    window.parent.postMessage(Object.assign({source:'garage-arcade',type},data||{}),'*');},
  requestCoin(cb){
    if(!this.embedded){cb({ok:true,practice:true});return;}
    this.pendingCoin=cb;
    this.emit('arcade:coinRequest');
    setTimeout(()=>{if(this.pendingCoin===cb){this.pendingCoin=null;cb({ok:true,practice:true});}},900);
  },
  reportScore(final){
    if(this.playId)this.emit('arcade:score',{score,act,final:!!final,stats:{solved:STATS.solved,right:STATS.right,wrong:STATS.wrong,bestStreak:0,startLv:act,mode:'physics'}});
  },
};
window.addEventListener('message',e=>{
  const m=e.data||{};
  if(m.type==='arcade:coinAccepted'&&ARCADE.pendingCoin){
    ARCADE.playId=m.playId||null;
    const cb=ARCADE.pendingCoin;ARCADE.pendingCoin=null;cb({ok:true,practice:!m.playId});}
  if(m.type==='arcade:coinDenied'&&ARCADE.pendingCoin){
    const cb=ARCADE.pendingCoin;ARCADE.pendingCoin=null;cb({ok:false,reason:m.reason});}
});

/* ================================================== the car — shared model
   Toy DC motor (130-size): free speed and stall torque scale with voltage.
     ω_free = 620 rad/s · (V/3)      τ_stall = 0.030 N·m · (V/3)
     τ(ω) = τ_stall·(1 − ω/ω_free)   I = 0.2 + 2.0·(τ/τ_stall) amps-ish
   Drivetrain: ratio G = gear/pinion. Wheel: v = (ω/G)·r, F = τ·G·η/r, η=0.85.
   Car: base mass 0.25 kg; decoration adds mass AND judging points.
   PARTS (mirrors the store kit): pinions 8/12/16t · gears 24/32/40/48t ·
   wheels r = 20/27.5/35 mm. CELLS: one (1.5 V), two SERIES (3 V, fast),
   two PARALLEL (1.5 V, double endurance). */
const PINIONS=[8,12,16], GEARS=[24,32,40,48], WHEELS=[0.020,0.0275,0.035];
const CELLS=[{label:'1 CELL · 1.5 V',V:1.5,cap:1},{label:'2 SERIES · 3 V',V:3,cap:1},{label:'2 PARALLEL · 1.5 V',V:1.5,cap:2}];
const ETA=0.85, BASE_M=0.25, MU=0.5;
function motorFree(V){return 400*(V/3);}   // rad/s — geared-down toy pace
function motorStall(V){return 0.022*(V/3);} // N·m
/* car performance from a config {pi,gi,wi,ci,deco} */
function carCalc(c){
  const V=CELLS[c.ci].V, G=GEARS[c.gi]/PINIONS[c.pi], r=WHEELS[c.wi];
  const m=BASE_M+(c.deco||0)*0.02;
  const vTop=motorFree(V)/G*r;
  const fMax=Math.min(motorStall(V)*G*ETA/r, MU*m*9.8);
  return {V,G,r,m,vTop,fMax};
}

/* ================================================== level data
   ACT I posts: B+ B− S1 S2 M+ M− (+C+ C− when a 2nd cell is present).
   Player wires post-pairs; TEST evaluates the loop. Required: motor driven
   through the switch, correct cell arrangement, no shorts.
   ACT II events: pick pinion/gear/wheel, then run the event sim.
   ACT III race: full config incl. cells + decoration vs rival ghosts. */
const ACT_META={
 1:{name:'THE WIRING BAY', col:'#38bdf8', blurb:'Day 2 and Day 6 of the real build, rehearsed: battery, switch, motor, solder by solder. Series cells for speed, parallel for endurance, and absolutely no shorts — the smoke is not a special effect.'},
 2:{name:'THE GEAR LAB', col:'#fbbf24', blurb:'Day 3, the decision that haunts every race: gear ratio. Big gear = force, small gear = speed, and the motor curve only gives you one or the other. Three events want three different cars. You get one.'},
 3:{name:'RACE DAY', col:'#e879f9', blurb:'Day 9. Everything on the line: your circuit, your ratio, your wheels — and the judging table, where decoration scores points and adds grams. Three rivals are already on the grid.'},
};
const ACT1=[
 {name:'FIRST LIGHT (Build 10–12)', dur:120, cells:1, fault:false,
  need:{series:false},
  tip:'The real thing, rehearsed: battery holder’s RED lead to one switch terminal, switch’s other terminal to a motor lead, motor’s second lead back to BLACK. One loop, no branches. Wire it, hit TEST, watch the motor spin — this is exactly build steps 10–12 on Day 6.'},
 {name:'MASTER SWITCH (Build 13)', dur:120, cells:1, fault:false,
  need:{series:false,switched:true},
  tip:'Inspection rule from the real build: the switch must actually CONTROL the motor — wired in SERIES, not dangling on a branch. A switch the current can sneak around fails tech inspection here and in the classroom. Test must show ON spins, OFF stops.'},
 {name:'DOUBLE POWER (Day 2 + Build 14)', dur:140, cells:2, fault:false,
  need:{series:true,switched:true},
  tip:'Add the second cell IN SERIES: first cell’s − to second cell’s +, and the loop sees 3 V. The motor’s free speed doubles with voltage — listen to it. Get the chain backwards and the cells fight each other to a 0 V standstill.'},
 {name:'THE LONG HAUL (Day 2)', dur:140, cells:2, fault:false,
  need:{series:false,parallel:true,switched:true},
  tip:'Same two cells, wired PARALLEL: + to +, − to −. Still 1.5 V — but twice the charge to spend. Slower car, longer life: the endurance racer’s circuit. Know both wirings before Day 6 makes you choose.'},
 {name:'THE SICK CAR (Day 7 rescue)', dur:150, cells:2, fault:true,
  need:{series:true,switched:true},
  tip:'A classmate’s car: it hums but won’t spin, and the switch does nothing. Somewhere in this rat’s nest is a short and a bypassed switch. Find them, cut the bad wires, rewire it right. This is the single most useful skill on Day 7 — every class has a sick car.'},
];
const ACT2=[
 {name:'THE SPRINT (5 m)', dur:120, event:'sprint', dist:5, ramp:0, spec:{time:3.2},
  tip:'Flat and fast: 5 meters, beat 3.2 s. Small ratio (small gear ÷ big pinion) means high top speed — but gear TOO low and the motor bogs, accelerating like cold honey. The dyno curve on your desk shows the tradeoff: pick the operating point, not the fantasy.'},
 {name:'THE HILL (1.2 m at 12°)', dur:120, event:'climb', dist:1.2, ramp:12, spec:{time:6},
  tip:'A 12° ramp. Now you need FORCE at the wheel: F = τ·G/r, so big gear, small pinion, small wheels. The sprint car stalls here, humming sadly — torque is the currency and gravity sets the price. Mechanical advantage, Day 3, in one climb.'},
 {name:'THE TUG (drag the brick)', dur:120, event:'tug', dist:1.5, ramp:0, drag:1.2, spec:{time:8},
  tip:'Drag a 120 g brick 1.5 m. Pure pulling power — and a hard lesson: past a point, more gear stops helping because the WHEELS SLIP. Traction (μ·m·g) caps every drivetrain; the strongest motor on Earth cannot out-pull its own grip.'},
 {name:'EFFICIENCY RUN (one charge)', dur:130, event:'endure', dist:14, ramp:0, spec:{dist:14},
  tip:'How far on one battery bar? Current tracks torque, so a heavily-geared car gulps amps even at crawl speed. There is a sweet ratio where meters-per-charge peaks — find it with the dyno before you spend the battery finding it the hard way.'},
 {name:'THE WHEEL COMMIT (Day 3)', dur:160, event:'commit', dist:0, ramp:0,
  spec:{sprint:4.0,climb:8,endure:9},
  tip:'The real Day 3 decision: ONE gear-and-wheel setup must now pass ALL THREE — sprint under 4 s, the hill under 8 s, and 9 m on a charge. No single event’s hero survives this; the committed car is a compromise. Choose like it’s going on your real chassis. It is.'},
];
const ACT3=[
 {name:'QUALIFYING (5 m flat)', dur:140, track:{dist:5,ramp:0},
  rivals:[{t:2.9,name:'PERIWINKLE'},{t:3.4,name:'BIG SLOW'},{t:4.2,name:'GLUE HAZARD'}],
  judge:false,
  tip:'Race day begins. Full car this time — cells AND gears AND wheels. The rivals are last year’s builds; beat at least one to advance. Series cells scream, but watch the battery bar: 3 V drinks twice as fast.'},
 {name:'HILL FINISH (4 m + ramp)', dur:140, track:{dist:4,ramp:10,rampAt:2.5},
  rivals:[{t:4.2,name:'PERIWINKLE'},{t:5.0,name:'BIG SLOW'},{t:6.5,name:'GLUE HAZARD'}],
  judge:false,
  tip:'Flat start, ramp finish — the course that breaks one-trick cars. Gear for the hill and you lose the flat; gear for the flat and you stall at the base. Somewhere between is a car that does both adequately. Adequate wins races.'},
 {name:'THE MARATHON (12 m)', dur:150, track:{dist:12,ramp:0},
  rivals:[{t:6.5,name:'PERIWINKLE'},{t:8,name:'BIG SLOW'},{t:10,name:'GLUE HAZARD'}],
  judge:false,
  tip:'Twelve meters — three classroom tables end to end. Endurance circuit (parallel cells) or speed (series) that might die at meter ten? The battery bar does not negotiate, and a dead car at 11.5 m scores exactly like a parked one.'},
 {name:'CONCOURS D’ELEGANCE (5 m + judging)', dur:150, track:{dist:5,ramp:0},
  rivals:[{t:3.0,name:'PERIWINKLE'},{t:3.5,name:'BIG SLOW'},{t:4.3,name:'GLUE HAZARD'}],
  judge:true,
  tip:'Day 8 meets Day 9: the judging table scores decoration — but every sticker, spoiler and flame decal is GRAMS, and F = ma never heard of style. Slide the decoration bar and watch your sprint time move. Beauty has a mass budget.'},
 {name:'THE CHAMPIONSHIP (8 m + ramp + judging)', dur:170, track:{dist:8,ramp:10,rampAt:5},
  rivals:[{t:7.0,name:'PERIWINKLE'},{t:8.5,name:'BIG SLOW'},{t:10.5,name:'GLUE HAZARD'}],
  judge:true,
  tip:'Build step 24: the final race. Circuit, ratio, wheels, mass, style — every decision from every cabinet in this arcade is riding on four little wheels. Whatever happens at the finish line: this is the car you should build on Monday.'},
];
const BAYS=['BAY 1','BAY 2','THE LIFT','PAINT BOOTH','PIT LANE','THE WORKBENCH','TECH INSPECTION'];
function endless1(w){
  return {name:pick(BAYS)+' · JOB '+w, dur:Math.max(90,150-w*5),
    cells:w>1?2:1, fault:w>2,
    need:w>2?{series:Math.random()<.5,parallel:false,switched:true}
        :w>1?{series:true,switched:true}:{series:false,switched:true},
    tip:'Another car on the lift. Wire it clean.'};
}
function endless2(w){
  const ev=pick(['sprint','climb','tug','endure']);
  const spec=ev==='sprint'?{time:Math.max(2.6,3.4-w*0.1)}
    :ev==='climb'?{time:Math.max(4.5,6.5-w*0.2)}
    :ev==='tug'?{time:Math.max(6,9-w*0.3)}
    :{dist:12+w};
  return {name:pick(BAYS)+' · TRIAL '+w, dur:Math.max(90,130-w*4),
    event:ev, dist:ev==='sprint'?5:ev==='climb'?1.2:ev==='tug'?1.5:14,
    ramp:ev==='climb'?Math.min(16,10+w):0, drag:ev==='tug'?1.2+w*0.1:0, spec,
    tip:'New spec sheet, same physics.'};
}
function endless3(w){
  const d=5+Math.min(8,w);
  return {name:pick(BAYS)+' · HEAT '+w, dur:Math.max(110,160-w*5),
    track:{dist:d,ramp:w%2?10:0,rampAt:d*0.6},
    rivals:[{t:d*0.68-w*0.02,name:'PERIWINKLE'},{t:d*0.8,name:'BIG SLOW'},{t:d*0.95,name:'GLUE HAZARD'}],
    judge:w>1,
    tip:'The grid refills. So does the glue gun.'};
}
const ACT_LEVELS={1:ACT1,2:ACT2,3:ACT3};
const ENDLESS={1:endless1,2:endless2,3:endless3};

/* ================================================== state */
let act=1, state='title', lv=null, levelIdx=0, wave=0, lives=3, score=0, streak=0;
// ACT I — wiring
let posts=[], wires=[], selPost=-1, smokes=0, testFx=0, testMsg='', switchOn=true;
// ACT II/III — car config + run
let cfg={pi:1,gi:1,wi:1,ci:1,deco:0}, selField=0;
let run=null; // {x,v,t,charge,phase,event,results:{}, commitIdx}
let t=0, acc=0, attemptT=0;
let particles=[], popups=[], shake=0, flash=0;
let landedOK=false, downTimer=0, lastResult=null, primary=null;
function bumpHi(){if(score>HIS[act]){HIS[act]=score;saveHi();}}
function popup(text,col,size){popups.push({text,col:col||'#fbbf24',size:size||24,t:0,jx:rnd(-12,12)});}
function burstPx(px,py,n,cols,sp){for(let i=0;i<n;i++){const a=rnd(0,TAU),s2=rnd(20,sp||90);
  particles.push({px,py,vx:Math.cos(a)*s2,vy:Math.sin(a)*s2,
    life:rnd(.3,.9),col:pick(cols),size:rnd(1.5,3.5)});}}

/* ================================================== overlay + screens */
function overlay(html){const o=$('#overlay');o.innerHTML=html;o.classList.add('show');}
function hideOverlay(){$('#overlay').classList.remove('show');}
function title(){
  state='title';act=1;lv=ACT1[0];setupLevel();
  overlay(`
   <div class="card" style="text-align:center">
     <h1>GARAGE</h1>
     <div class="tag">THE CAR PROJECT CABINET · THREE ACTS</div>
     <div class="sub" style="text-align:left">
       This is not a unit. This is <b style="color:var(--ink)">the rehearsal for the
       real thing</b> — the nine-day build, the soldering iron, the race at the
       end. Every level mirrors an actual build day; every mistake here is one
       you won’t make on your real car.<br><br>
       <b style="color:#38bdf8">ACT I — THE WIRING BAY</b> &nbsp;circuit design: cells, switch, motor<br>
       <b style="color:#fbbf24">ACT II — THE GEAR LAB</b> &nbsp;gear ratio: the Day 3 decision<br>
       <b style="color:#e879f9">ACT III — RACE DAY</b> &nbsp;everything, against the grid<br><br>

function qNum(text,ans,unit,distractors,explain){
  const vals=[+fmt(ans)];
  for(const d of distractors){let v=+fmt(d);
    while(vals.some(x=>Math.abs(x-v)<0.05))v=+fmt(v+rnd(0.8,2.2));
    vals.push(v);}
  const choices=shuffle(vals.map((v,i)=>({s:fmt(v)+' '+unit,ok:i===0?1:0})));
  return {text,choices,explain};
}
function qCon(text,right,wrongs,explain){
  return {text,choices:shuffle([{s:right,ok:1}].concat(wrongs.map(s=>({s,ok:0})))),explain};
}

/* ================================================== circuit evaluation */
function reach(edges,n,from){
  const adj=Array.from({length:n},()=>[]);
  for(const w of edges){adj[w[0]].push(w[1]);adj[w[1]].push(w[0]);}
  const seen=new Set([from]),q=[from];
  while(q.length){const x=q.pop();
    for(const y of adj[x])if(!seen.has(y)){seen.add(y);q.push(y);}}
  return seen;
}
function evalCircuit(closed){
  const n=posts.length;
  const base=wires.slice();
  if(closed)base.push([2,3]);
  let V=1.5,cap=1,mode='single',pPos=0,pNeg=1;
  if(n>6){
    const has=(a,b)=>wires.some(w=>(w[0]===a&&w[1]===b)||(w[0]===b&&w[1]===a));
    const chainA=has(1,6),chainB=has(0,7),par=has(0,6)&&has(1,7);
    if((chainA&&chainB)||(par&&(chainA||chainB)))
      return {bad:'CELL LOOP — the cells are fighting each other'};
    if(chainA){mode='series';V=3;pPos=0;pNeg=7;}
    else if(chainB){mode='series';V=3;pPos=6;pNeg=1;}
    else if(par){mode='parallel';V=1.5;cap=2;}
  }
  const r1=reach(base,n,pPos);
  if(r1.has(pNeg))return {bad:'SHORT'};
  const withMotor=base.concat([[4,5]]);
  const r2=reach(withMotor,n,pPos);
  return {drives:r2.has(pNeg),V,cap,mode,fwd:r1.has(4)};
}
function runTest(){
  const on=evalCircuit(true),off=evalCircuit(false);
  testFx=1.4;
  if(on.bad||off.bad){
    smokes++;shake=.8;flash=.5;bzzt();
    burstPx(W*0.3,H*0.4,30,['#6b7280','#374151','#f87171'],100);
    testMsg=(on.bad||off.bad)+' !';
    popup('SMOKE — strike '+smokes+'/2','#f87171',26);
    if(smokes>=2){failAttempt('MAGIC SMOKE RELEASED',
      'Trace the path before you test: from + back to −, the current must pass THROUGH the motor. Any route around it is a short — and real cells get hot enough to matter.');}
    return;
  }
  const spins=on.drives, stopsOff=!off.drives;
  if(!spins){testMsg='no spin — the loop is not complete';beep(160,.3,'sawtooth',.14);return;}
  setMotor(0.05,on.V/3);
  if(lv.need.switched&&!stopsOff){testMsg='spins… but the switch does nothing (bypassed)';
    beep(220,.2,'sawtooth',.12);return;}
  if(lv.need.series&&on.mode!=='series'){testMsg='spins at 1.5 V — the cells are not in series';
    beep(220,.2,'sawtooth',.12);return;}
  if(lv.need.parallel&&on.mode!=='parallel'){testMsg='runs, but on a single cell — wire the second in parallel';
    beep(220,.2,'sawtooth',.12);return;}
  const craft=(smokes===0?200:0)+(on.fwd?60:0);
  succeed('Circuit passes inspection: '+(on.mode==='series'?'3 V series':on.mode==='parallel'?'parallel endurance':'single cell')
    +(on.fwd?', forward polarity':', reversed (it drives backward — easy fix)')
    +(smokes===0?', zero smoke.':'.'),craft);
}

/* ================================================== car simulation */
function simEvent(opts){
  const cc=carCalc(cfg);
  const V=CELLS[cfg.ci].V,wF=motorFree(V),tS=motorStall(V);
  const m=cc.m+(opts.drag?0.12:0);
  let x=0,v=0,tt=0,charge=CELLS[cfg.ci].cap*6; // tight tank: efficiency is real
  const dt=1/120,trace=[];
  for(let i=0;i<120*45;i++){
    const onRamp=(opts.ramp||0)>0&&x>=(opts.rampAt||0);
    const th=onRamp?opts.ramp*Math.PI/180:0;
    const w2=v/cc.r*cc.G;
    const tau=charge>0?Math.max(0,tS*(1-w2/wF)):0;
    const F=Math.min(tau*cc.G*ETA/cc.r,MU*m*9.8);
    const I=charge>0?0.35+2.2*(tau/tS):0; // current tracks torque — climbing is expensive
    charge=Math.max(0,charge-I*dt);
    const Fnet=F-0.06*m*9.8-m*9.8*Math.sin(th)-(opts.drag?0.6:0);
    v=Math.max(0,v+Fnet/m*dt);
    x+=v*dt;tt+=dt;
    if(i%6===0)trace.push({t:tt,x,v});
    if(opts.dist&&x>=opts.dist)return {time:tt,dist:x,stalled:false,charge,trace,done:true};
    if(v<=0.002&&tt>0.8)return {time:tt,dist:x,stalled:true,charge,trace,done:false};
    if(charge<=0&&v<=0.02)return {time:tt,dist:x,stalled:true,charge:0,trace,done:false};
  }
  return {time:45,dist:x,stalled:false,charge,trace,done:false};
}
function startRun(){
  if(act===2){
    if(lv.event==='commit'){
      // three back-to-back events with the SAME config
      const sprint=simEvent({dist:5});
      const climb=simEvent({dist:1.2,ramp:12,rampAt:0});
      const endure=simEvent({});
      run={kind:'commit',phases:[
        {label:'SPRINT',res:sprint,pass:sprint.done&&sprint.time<=lv.spec.sprint,spec:lv.spec.sprint+' s'},
        {label:'HILL',res:climb,pass:climb.done&&climb.time<=lv.spec.climb,spec:lv.spec.climb+' s'},
        {label:'CHARGE',res:endure,pass:endure.dist>=lv.spec.endure,spec:lv.spec.endure+' m'},
      ],idx:0,tAnim:0};
    }else{
      const opts=lv.event==='sprint'?{dist:lv.dist}
        :lv.event==='climb'?{dist:lv.dist,ramp:lv.ramp,rampAt:0}
        :lv.event==='tug'?{dist:lv.dist,drag:1}
        :{};
      const res=simEvent(opts);
      run={kind:'single',res,tAnim:0};
    }
  }else{
    const res=simEvent({dist:lv.track.dist,ramp:lv.track.ramp,rampAt:lv.track.rampAt||0});
    run={kind:'race',res,tAnim:0};
  }
  beep(330,.12,'square',.14,200);
}
function finishRun(){
  const r=run;run=null;setMotor(0);
  if(act===2){
    if(r.kind==='commit'){
      const allPass=r.phases.every(p=>p.pass);
      if(allPass){
        succeed('THE WHEEL COMMIT: '+PINIONS[cfg.pi]+'t pinion · '+GEARS[cfg.gi]+'t gear · '
          +Math.round(WHEELS[cfg.wi]*2000)+' mm wheels — one car, all three specs. Write it down for Day 3.',300);return;}
      const failed=r.phases.filter(p=>!p.pass).map(p=>p.label).join(', ');
      popup('NOT YET — '+failed,'#f87171',22);
      testMsg=failed+' failed — adjust and re-run';
      return;
    }
    const res=r.res;
    const pass=lv.spec.time?(res.done&&res.time<=lv.spec.time):(res.dist>=lv.spec.dist);
    if(pass){
      const margin=lv.spec.time?(lv.spec.time-res.time):(res.dist-lv.spec.dist);
      succeed(lv.event.toUpperCase()+': '+(lv.spec.time?fmt(res.time,2)+' s (spec '+lv.spec.time+')':fmt(res.dist,1)+' m (spec '+lv.spec.dist+')'),
        Math.round(clamp(margin,0,3)*100));return;
    }
    popup(res.stalled?'STALLED':'MISSED SPEC','#f87171',24);
    testMsg=(res.stalled?'stalled — more gear or smaller wheels'
      :lv.spec.time?('ran '+fmt(res.time,2)+' s, spec '+lv.spec.time)
      :('reached '+fmt(res.dist,1)+' m, spec '+lv.spec.dist))+' — adjust and re-run';
    return;
  }
  // race day
  const res=r.res;
  if(!res.done){
    popup(res.charge<=0?'BATTERY DIED at '+fmt(res.dist,1)+' m':'STALLED on course','#f87171',24);
    testMsg='DNF — re-gear or re-wire and race again';
    return;
  }
  const beaten=lv.rivals.filter(rv=>res.time<rv.t).length;
  if(beaten===0){
    popup('LAST PLACE — '+fmt(res.time,2)+' s','#f87171',24);
    testMsg='all three rivals were faster — adjust and race again';
    return;
  }
  const place=lv.rivals.length-beaten+1;
  const judgePts=lv.judge?cfg.deco*8:0;
  succeed('P'+place+' in '+fmt(res.time,2)+' s — beat '+beaten+' of '+lv.rivals.length
    +(lv.judge?(' · judging +'+judgePts+' (deco '+cfg.deco+'/10)'):'')
    +' · battery '+Math.round(res.charge)+' left',
    beaten*200+judgePts+Math.round(res.charge*2));
}

/* ================================================== step (animation clock) */
const DT=1/60;
function step(dt){
  t+=dt;attemptT+=dt;
  testFx=Math.max(0,testFx-dt);
  if(run){
    run.tAnim+=dt;
    const res=run.kind==='commit'?run.phases[run.idx].res:run.res;
    setMotor(0.05,clamp((res.trace.length?res.trace[Math.min(res.trace.length-1,Math.floor(run.tAnim*20))].v:0)/4,0,1));
    if(run.tAnim>=res.time+0.6){
      if(run.kind==='commit'&&run.idx<run.phases.length-1){run.idx++;run.tAnim=0;}
      else finishRun();
    }
  }
  if(state==='play'&&attemptT>=lv.dur){
    failAttempt(act===1?'BENCH TIME OVER':'THE BELL — STATION CLOSED',
      act===1?'Wire the happy path first — battery, switch, motor, one clean loop — THEN test. Rewiring under a clock is how real cars get shorts.'
      :act===2?'Use the dyno curve before you run: the operating point predicts the result. Guess-and-check is for people with more battery than sense.'
      :'A race entry needs a finisher, not a masterpiece. Field a safe setup FIRST, then tune upward from a car that completes the course.');
    return;
  }
}

  }
  y+=8;
  ctx.fillStyle='#8b96ad';ctx.font='11px "Share Tech Mono",monospace';
  ctx.fillText('posts: '+posts.join(' · '),gx+10,y);y+=18;
  ctx.fillStyle='#57534e';
  ctx.fillText('red = +, blue = −, gold = switch.',gx+10,y);y+=16;
  ctx.fillText('current flows + → − through the motor.',gx+10,y);y+=16;
  ctx.fillText('every wire here is a solder joint there.',gx+10,y);
}
function drawMotorCurve(gx,gy,gw,gh){
  ctx.fillStyle='#180a1c';ctx.fillRect(gx,gy,gw,gh);
  ctx.strokeStyle='#ffffff14';ctx.strokeRect(gx+.5,gy+.5,gw-1,gh-1);
  ctx.fillStyle='#8b96ad';ctx.font='10px "Share Tech Mono",monospace';
  ctx.fillText('AT THE WHEEL — force vs speed for YOUR setup',gx+8,gy+14);
  const cc=carCalc(cfg);
  const fTrac=MU*cc.m*9.8;
  const fStall=motorStall(CELLS[cfg.ci].V)*cc.G*ETA/cc.r;
  const vMax=Math.max(cc.vTop*1.1,1),fScale=Math.max(fStall,fTrac)*1.15;
  const X=v=>gx+10+(v/vMax)*(gw-20);
  const Y=f=>gy+gh-14-clamp(f/fScale,0,1)*(gh-36);
  // drive-force line (linear motor curve mapped to wheel)
  ctx.strokeStyle='#e879f9';ctx.lineWidth=2;ctx.shadowColor='#e879f9';ctx.shadowBlur=6;
  ctx.beginPath();ctx.moveTo(X(0),Y(fStall));ctx.lineTo(X(cc.vTop),Y(0));ctx.stroke();
  ctx.shadowBlur=0;ctx.lineWidth=1;
  // traction ceiling
  ctx.strokeStyle='#f87171';ctx.setLineDash([4,4]);
  ctx.beginPath();ctx.moveTo(gx+10,Y(fTrac));ctx.lineTo(gx+gw-10,Y(fTrac));ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle='#f87171';ctx.font='9px "Share Tech Mono",monospace';
  ctx.fillText('grip limit μmg = '+fmt(fTrac,1)+' N',gx+12,Y(fTrac)-4);
  // rolling resistance floor
  ctx.strokeStyle='#8b96ad55';
  ctx.beginPath();ctx.moveTo(gx+10,Y(0.06*cc.m*9.8));ctx.lineTo(gx+gw-10,Y(0.06*cc.m*9.8));ctx.stroke();
  ctx.fillStyle='#8b96ad';
  ctx.fillText('top speed '+fmt(cc.vTop,1)+' m/s →',X(cc.vTop)-86,gy+gh-18);
  ctx.fillStyle='#57534e';
  ctx.fillText('bigger gear: line tilts UP-left. smaller: DOWN-right.',gx+10,gy+gh-4);
}
function drawBuildNotes(gx,gy,gw,gh){
  ctx.fillStyle='#180a1c';ctx.fillRect(gx,gy,gw,gh);
  ctx.strokeStyle='#ffffff14';ctx.strokeRect(gx+.5,gy+.5,gw-1,gh-1);
  ctx.fillStyle='#8b96ad';ctx.font='10px "Share Tech Mono",monospace';
  ctx.fillText(act===2?'DAY 3 NOTES — the wheel commit':'DAY 9 NOTES — race + judging',gx+8,gy+14);
  const cc=carCalc(cfg);
  ctx.font='12px "Share Tech Mono",monospace';
  let y=gy+36;
  ctx.fillStyle='#e879f9';
  ctx.fillText('G = '+GEARS[cfg.gi]+'/'+PINIONS[cfg.pi]+' = '+fmt(cc.G,2)+':1',gx+10,y);y+=20;
  ctx.fillStyle='#fbbf24';
  ctx.fillText('v_top = ω/G · r = '+fmt(cc.vTop,2)+' m/s',gx+10,y);y+=20;
  ctx.fillStyle='#34d399';
  ctx.fillText('F_wheel = τ·G·η/r = '+fmt(Math.min(motorStall(CELLS[cfg.ci].V)*cc.G*ETA/cc.r,MU*cc.m*9.8),2)+' N',gx+10,y);y+=20;
  if(act===3){
    ctx.fillStyle='#38bdf8';
    ctx.fillText(CELLS[cfg.ci].label+' · charge ×'+CELLS[cfg.ci].cap,gx+10,y);y+=20;
    ctx.fillStyle=cfg.deco>0?'#e879f9':'#57534e';
    ctx.fillText('decoration '+cfg.deco+'/10 · +'+(cfg.deco*8)+' judging · +'+(cfg.deco*20)+' g',gx+10,y);y+=20;
  }
  y+=4;
  ctx.fillStyle='#57534e';ctx.font='11px "Share Tech Mono",monospace';
  ctx.fillText('write your committed setup on the',gx+10,y);y+=16;
  ctx.fillText('whiteboard — Monday’s car wants it.',gx+10,y);
}

/* ================================================== loop + input */
let last=performance.now();
function frame(now){
  const el=Math.min(.05,(now-last)/1000);last=now;
  if(state==='play'){
    acc+=el;
    while(acc>=DT&&state==='play'){step(DT);acc-=DT;}
  }
  if(state==='down'){downTimer+=el;
    if(downTimer>1.1&&!$('#overlay').classList.contains('show'))showResult();}
  render();
  requestAnimationFrame(frame);
}
function bumpField(dir){
  const f=act===2?['pi','gi','wi'][selField]:['pi','gi','wi','ci','deco'][selField];
  if(f==='pi')cfg.pi=clamp(cfg.pi+dir,0,PINIONS.length-1);
  if(f==='gi')cfg.gi=clamp(cfg.gi+dir,0,GEARS.length-1);
  if(f==='wi')cfg.wi=clamp(cfg.wi+dir,0,WHEELS.length-1);
  if(f==='ci')cfg.ci=clamp(cfg.ci+dir,0,CELLS.length-1);
  if(f==='deco')cfg.deco=clamp(cfg.deco+dir,0,10);
  beep(440+dir*60,.05,'square',.08);
}
window.addEventListener('keydown',e=>{
  if(['Space','ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.code))e.preventDefault();
  if(e.repeat)return;
  if(state==='play'){
    if(act===1){
      if(e.code==='ArrowRight')cursorPost=(cursorPost+1)%posts.length;
      if(e.code==='ArrowLeft')cursorPost=(cursorPost+posts.length-1)%posts.length;
      if(e.code==='Space'){
        if(anchorPost<0){anchorPost=cursorPost;beep(520,.06,'square',.1);}
        else if(anchorPost===cursorPost){anchorPost=-1;beep(300,.06,'square',.08);}
        else{
          const a=Math.min(anchorPost,cursorPost),b=Math.max(anchorPost,cursorPost);
          const i=wires.findIndex(w2=>w2[0]===a&&w2[1]===b);
          if(i>=0){wires.splice(i,1);beep(260,.08,'square',.1);popup('CUT','#8b96ad',14);}
          else if(wires.length>=9){popup('OUT OF WIRE','#f87171',16);}
          else{wires.push([a,b]);beep(660,.08,'square',.12);}
          anchorPost=-1;testMsg='';
        }
      }
      if(e.code==='KeyO'){switchOn=!switchOn;beep(switchOn?600:340,.07,'square',.1);}
      if(e.code==='KeyT')runTest();
    }else{
      const nf=act===2?3:5;
      if(e.code==='ArrowRight')selField=(selField+1)%nf;
      if(e.code==='ArrowLeft')selField=(selField+nf-1)%nf;
      if(e.code==='ArrowUp')bumpField(1);
      if(e.code==='ArrowDown')bumpField(-1);
      if(e.code==='Space'&&!run)startRun();
    }
  }
  if(e.code==='Enter'&&primary&&$('#overlay').classList.contains('show'))primary();
  if(e.code==='KeyP'&&(state==='play'||state==='paused')){
    state=state==='play'?'paused':'play';setMotor(0);}
  if(e.code==='KeyM'){muted=!muted;setMotor(0);}
});
cv.addEventListener('pointerdown',e=>{audio();
  if(state!=='play')return;
  const {w:SW}=sceneRect();
  if(act===1){
    if(testBtn&&e.clientX>=testBtn.x&&e.clientX<=testBtn.x+testBtn.w&&
       e.clientY>=testBtn.y&&e.clientY<=testBtn.y+testBtn.h){runTest();return;}
    let best=-1,bd=1e9;
    posts.forEach((p,i)=>{const [px2,py2]=postXY(i,SW);
      const d=hyp(e.clientX-px2,e.clientY-py2);
      if(d<bd){bd=d;best=i;}});
    if(bd<40){
      cursorPost=best;
      if(anchorPost<0)anchorPost=best;
      else if(anchorPost===best)anchorPost=-1;
      else{
        const a=Math.min(anchorPost,best),b=Math.max(anchorPost,best);
        const i=wires.findIndex(w2=>w2[0]===a&&w2[1]===b);
        if(i>=0)wires.splice(i,1);
        else if(wires.length<9)wires.push([a,b]);
        anchorPost=-1;testMsg='';
        beep(660,.08,'square',.12);
      }
    }
  }else{
    // tap a config box to select; tap track to run
    const fields=act===2?3:5;
    const fw=Math.min(150,(SW-60)/fields);
    if(e.clientY<92&&e.clientX>30&&e.clientX<30+fields*fw){
      const i=Math.floor((e.clientX-30)/fw);
      if(i===selField)bumpField(1);else selField=i;
    }else if(!run)startRun();
  }
});
document.addEventListener('click',audio,{once:true});

/* ================================================== go */
title();
requestAnimationFrame(frame);
</script>
