<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Afro rework — before / after</title>
<style>
  body { font-family: 'Inter', system-ui, sans-serif; background: #f6f4fb; color: #2a2540; margin: 0; padding: 28px; }
  h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; }
  p.sub { color: #6b6890; margin-top: 2px; max-width: 640px; }
  .row { display: flex; gap: 22px; flex-wrap: wrap; margin-top: 22px; }
  .card { background: #fff; border: 1px solid #e2def0; border-radius: 16px; padding: 14px; width: 220px; text-align: center; box-shadow: 0 2px 10px rgba(123,107,203,0.08); }
  .card svg { width: 180px; height: 250px; }
  .name { font-weight: 600; margin-top: 6px; }
  .meta { font-size: 12px; color: #6b6890; }
</style>
</head>
<body>
<h1>Afro — before / after</h1>
<p class="sub">Before: hairline at eye level (forehead swallowed), flat ellipse that stops at the temples. After: hairline up at the forehead, fuller crown, sides past the ears, textured perimeter. Shown on a round head with a couple of hair colors.</p>
<div class="row" id="row"></div>

<script>
const SKIN='#E8B88E', SHADOW='#C68A5E', EYE='#1F1812';
const SHIRTNECK = `<ellipse cx="0" cy="92" rx="40" ry="22" fill="#7B6BCB"/><rect x="-32" y="78" width="64" height="40" rx="12" fill="#7B6BCB"/><rect x="-8" y="42" width="16" height="26" fill="${SKIN}"/>`;
const EARS = `<ellipse cx="-46" cy="2" rx="6" ry="9" fill="${SKIN}"/><ellipse cx="46" cy="2" rx="6" ry="9" fill="${SKIN}"/>`;
const HEAD = `<ellipse cx="0" cy="0" rx="46" ry="48" fill="${SKIN}"/>`;
const FEATURES = `<rect x="-26" y="-18" width="14" height="3.5" rx="1.5" fill="#1F1812"/><rect x="12" y="-18" width="14" height="3.5" rx="1.5" fill="#1F1812"/><ellipse cx="-15" cy="-4" rx="3" ry="3.6" fill="${EYE}"/><ellipse cx="15" cy="-4" rx="3" ry="3.6" fill="${EYE}"/><ellipse cx="0" cy="10" rx="2.2" ry="1.6" fill="${SHADOW}"/><path d="M -8,22 Q 0,30 8,22" fill="none" stroke="${EYE}" stroke-width="2.2" stroke-linecap="round"/>`;
function afroOldFront(c){
  return `<ellipse cx="0" cy="-30" rx="56" ry="32" fill="${c}"/><circle cx="-50" cy="-12" r="14" fill="${c}"/><circle cx="50" cy="-12" r="14" fill="${c}"/><circle cx="-30" cy="-56" r="13" fill="${c}"/><circle cx="30" cy="-56" r="13" fill="${c}"/><circle cx="0" cy="-62" r="12" fill="${c}"/>`;
}
function afroBack(c){
  return `<circle cx="0" cy="-14" r="55" fill="${c}"/><circle cx="-46" cy="-46" r="13" fill="${c}"/><circle cx="46" cy="-46" r="13" fill="${c}"/><circle cx="-56" cy="-14" r="13" fill="${c}"/><circle cx="56" cy="-14" r="13" fill="${c}"/><circle cx="-48" cy="18" r="12" fill="${c}"/><circle cx="48" cy="18" r="12" fill="${c}"/><circle cx="-22" cy="-62" r="12" fill="${c}"/><circle cx="22" cy="-62" r="12" fill="${c}"/>`;
}
function afroFront(c){
  return `<path d="M -44,-14 Q -50,-58 0,-60 Q 50,-58 44,-14 Q 34,-32 0,-34 Q -34,-32 -44,-14 Z" fill="${c}"/><circle cx="-36" cy="-48" r="11" fill="${c}"/><circle cx="36" cy="-48" r="11" fill="${c}"/><circle cx="-16" cy="-58" r="11" fill="${c}"/><circle cx="16" cy="-58" r="11" fill="${c}"/><circle cx="0" cy="-60" r="10" fill="${c}"/>`;
}
function svg(inner){ return `<svg viewBox="-72 -82 144 200" xmlns="http://www.w3.org/2000/svg">${inner}</svg>`; }
function before(c){ return svg(SHIRTNECK + EARS + HEAD + afroOldFront(c) + FEATURES); }
function after(c){ return svg(SHIRTNECK + afroBack(c) + EARS + HEAD + afroFront(c) + FEATURES); }
const html = `
  <div class="card"><div>${before('#2A1A12')}</div><div class="name">Before</div><div class="meta">front-only, floated</div></div>
  <div class="card"><div>${after('#2A1A12')}</div><div class="name">After</div><div class="meta">halo hugs the head</div></div>
  <div class="card"><div>${after('#5A3A22')}</div><div class="name">After · brown</div><div class="meta">&nbsp;</div></div>`;
document.getElementById('row').innerHTML = html;
</script>
</body>
</html>
